<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Musca domestica — Generation</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0a0f;--panel:rgba(12,12,20,0.92);--border:rgba(80,80,120,0.15);
  --text:#b8b8cc;--dim:rgba(140,140,170,0.4);--accent:#66ff66;
  --egg:#ffffff;--larva:#ffdd57;--pupa:#a0522d;--adult:#66ff66;--death:#ff4444;
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);font-family:'SF Mono','Fira Code','Cascadia Code',monospace;color:var(--text)}
.layout{display:grid;width:100%;height:100%;gap:6px;padding:6px;
  grid-template-columns:240px 1fr 240px;
  grid-template-rows:auto 1fr auto auto;
  grid-template-areas:
    "title title title"
    "left kitchen right"
    "left timeline right"
    "narration narration narration";
}
#title-bar{grid-area:title;text-align:center;padding:8px 0 2px;font-size:16px;letter-spacing:4px;color:rgba(180,180,210,0.5);text-transform:uppercase}
#title-bar .gen{color:var(--accent);font-size:18px;letter-spacing:2px}
#title-bar .sub{font-size:9px;letter-spacing:2px;color:rgba(140,140,170,0.3);margin-top:2px}
.left-panels{grid-area:left;display:flex;flex-direction:column;gap:6px;overflow-y:auto;scrollbar-width:none}
.left-panels::-webkit-scrollbar{display:none}
.right-panels{grid-area:right;display:flex;flex-direction:column;gap:6px;overflow-y:auto;scrollbar-width:none}
.right-panels::-webkit-scrollbar{display:none}
.panel{background:var(--panel);border:1px solid var(--border);border-radius:6px;padding:10px 12px;flex-shrink:0}
.panel h3{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--dim);margin-bottom:6px;font-weight:400}
.panel.flex-grow{flex:1;min-height:80px;overflow:hidden}
#kitchen-wrap{grid-area:kitchen;display:flex;align-items:center;justify-content:center;position:relative}
#kitchen-canvas{border:1px solid var(--border);border-radius:4px;image-rendering:auto;background:#080810;max-width:100%;max-height:100%}
#timeline-area{grid-area:timeline;height:70px}
#narration-area{grid-area:narration;text-align:center;padding:6px 20px;font-size:13px;font-style:italic;color:rgba(180,180,210,0.45);letter-spacing:0.5px;text-shadow:0 0 30px rgba(100,255,100,0.05);min-height:32px}
.bar-row{display:flex;align-items:center;margin:3px 0}
.bar-label{width:70px;font-size:8px;color:var(--dim);text-transform:capitalize;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bar-track{flex:1;height:5px;background:rgba(255,255,255,0.04);border-radius:3px;overflow:hidden}
.bar-fill{height:100%;border-radius:3px;transition:width 0.8s ease}
.bar-val{width:36px;text-align:right;font-size:8px;color:var(--dim)}
.stage-badge{display:inline-block;padding:2px 10px;border-radius:12px;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;margin:4px 0}
.stage-egg{background:rgba(255,255,255,0.08);color:var(--egg);border:1px solid rgba(255,255,255,0.15)}
.stage-larva{background:rgba(255,221,87,0.08);color:var(--larva);border:1px solid rgba(255,221,87,0.15)}
.stage-pupa{background:rgba(160,82,45,0.12);color:var(--pupa);border:1px solid rgba(160,82,45,0.2)}
.stage-adult{background:rgba(102,255,102,0.08);color:var(--adult);border:1px solid rgba(102,255,102,0.15)}
.stage-death{background:rgba(255,68,68,0.08);color:var(--death);border:1px solid rgba(255,68,68,0.15)}
.meter{height:8px;background:rgba(255,255,255,0.04);border-radius:4px;overflow:hidden;margin:3px 0}
.meter-fill{height:100%;border-radius:4px;transition:width 0.6s ease}
.meter-label{display:flex;justify-content:space-between;font-size:8px;color:var(--dim)}
.sense-item{font-size:9px;padding:2px 0;color:rgba(180,180,210,0.6);border-bottom:1px solid rgba(255,255,255,0.02)}
.sense-item .intensity{float:right;font-size:8px}
.mem-stat{display:flex;justify-content:space-between;font-size:9px;padding:2px 0;color:rgba(160,160,190,0.5)}
.mem-stat .val{color:rgba(200,200,230,0.7)}
.ancestor{padding:4px 0;border-bottom:1px solid rgba(255,255,255,0.03);font-size:9px}
.ancestor:last-child{border:none}
.ancestor .gen-num{color:var(--accent);font-size:8px;margin-right:4px}
.ancestor .cause{color:rgba(255,100,100,0.4);font-size:7px}
.brain-meter{margin:4px 0}
.brain-meter .label{font-size:8px;color:var(--dim);margin-bottom:2px}
#timeline-canvas{width:100%;height:100%;border-radius:4px}
@media(max-width:900px){
  .layout{grid-template-columns:1fr;grid-template-rows:auto 300px auto auto auto auto;grid-template-areas:"title" "kitchen" "narration" "timeline" "left" "right";overflow-y:auto}
  .left-panels,.right-panels{flex-direction:row;flex-wrap:wrap}
  .panel{min-width:200px;flex:1}
}
@keyframes pulse{0%,100%{opacity:0.7}50%{opacity:1}}
.alive{animation:pulse 3s ease infinite}
</style>
</head>
<body>
<div class="layout">
  <div id="title-bar">
    <div>Musca domestica</div>
    <div class="gen" id="gen-display">&mdash;</div>
    <div class="sub" id="frame-display">frame &mdash; &middot; tick &mdash;</div>
  </div>
  <div class="left-panels">
    <div class="panel" id="vitals-panel">
      <h3>Vital Signs</h3>
      <div id="stage-badge-wrap"></div>
      <div class="meter-label"><span>Energy</span><span id="energy-val">&mdash;</span></div>
      <div class="meter"><div class="meter-fill" id="energy-bar" style="width:0;background:linear-gradient(90deg,#ff4444,#ffdd57,#66ff66)"></div></div>
      <div class="meter-label"><span>Hunger</span><span id="hunger-val">&mdash;</span></div>
      <div class="meter"><div class="meter-fill" id="hunger-bar" style="width:0;background:linear-gradient(90deg,#66ff66,#ffdd57,#ff4444)"></div></div>
      <div style="margin-top:6px;font-size:8px;color:var(--dim)">
        Size: <span id="size-val">&mdash;</span>mm &middot; Mass: <span id="mass-val">&mdash;</span>mg
      </div>
      <div style="font-size:8px;color:var(--dim)">
        Temp: <span id="temp-val">&mdash;</span>&deg;C &middot; <span id="airborne-val"></span>
      </div>
    </div>
    <div class="panel" id="genome-panel">
      <h3>Genome</h3>
      <div id="genome-bars"></div>
    </div>
    <div class="panel" id="brain-panel">
      <h3>Brain</h3>
      <div style="font-size:9px;margin-bottom:4px">Goal: <span id="brain-goal" style="color:var(--accent)">&mdash;</span></div>
      <div style="font-size:8px;margin-bottom:4px;color:var(--dim)">State: <span id="brain-state">&mdash;</span> &middot; Neural: <span id="neural-val">&mdash;</span></div>
      <div id="brain-meters"></div>
    </div>
    <div class="panel flex-grow" id="ancestor-panel">
      <h3>Lineage</h3>
      <div id="ancestors-list"></div>
    </div>
  </div>
  <div id="kitchen-wrap">
    <canvas id="kitchen-canvas" width="640" height="360"></canvas>
  </div>
  <div class="right-panels">
    <div class="panel" id="senses-panel">
      <h3>Senses</h3>
      <div id="smell-list"></div>
      <div id="sight-list" style="margin-top:4px"></div>
      <div id="touch-info" style="margin-top:4px;font-size:8px;color:var(--dim)"></div>
    </div>
    <div class="panel" id="memory-panel">
      <h3>Memory</h3>
      <div id="memory-stats"></div>
    </div>
    <div class="panel" id="microbiome-panel">
      <h3>Microbiome</h3>
      <div id="microbiome-info"></div>
    </div>
    <div class="panel flex-grow" id="events-panel">
      <h3>Recent Events</h3>
      <div id="events-list" style="overflow:hidden;max-height:180px"></div>
    </div>
  </div>
  <div id="timeline-area" class="panel">
    <canvas id="timeline-canvas"></canvas>
  </div>
  <div id="narration-area"></div>
</div>
<script>
