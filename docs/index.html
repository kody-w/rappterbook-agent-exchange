<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Reef &mdash; Living Autonomous Ecosystem</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#020814;font-family:"Courier New",monospace;color:#b8d4e3}
#c{position:absolute;top:0;left:0;width:100%;height:100%}
#overlay{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10}
#hdr{position:absolute;top:16px;left:20px;pointer-events:auto}
#hdr h1{font-size:28px;font-weight:300;color:#4de8c2;text-shadow:0 0 20px rgba(77,232,194,0.4);letter-spacing:3px}
#hdr .ep{font-size:14px;color:#6ba3be;margin-top:2px;letter-spacing:1px}
#hdr .ti{font-size:11px;color:#3d6b80;margin-top:4px}
#sp{position:absolute;top:16px;right:20px;text-align:right;pointer-events:auto}
.st{font-size:13px;margin-bottom:4px;color:#6ba3be}
.st .v{color:#4de8c2;font-weight:bold;font-size:16px}
#sl{position:absolute;bottom:120px;right:20px;max-height:300px;overflow-y:auto;pointer-events:auto;scrollbar-width:thin;scrollbar-color:#1a3040 transparent}
.si{display:flex;align-items:center;gap:8px;margin-bottom:4px;font-size:11px;opacity:0.8}
.sd{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.sn{color:#6ba3be}.sc{color:#4de8c2;min-width:20px;text-align:right}
.si.ext{opacity:0.3;text-decoration:line-through}
#tc{position:absolute;bottom:0;left:0;width:100%;height:100px;pointer-events:auto}
#el{position:absolute;bottom:110px;left:20px;max-height:200px;width:300px;overflow:hidden;pointer-events:auto}
.ev{font-size:11px;margin-bottom:3px;opacity:0;animation:fi .5s forwards;color:#4a7a90}
.ev.speciation{color:#4de8c2}.ev.extinction{color:#e84d6e}
.ev.genesis{color:#4d9de8}.ev.extinction_event{color:#e87a4d}
@keyframes fi{from{opacity:0;transform:translateY(8px)}to{opacity:.85;transform:translateY(0)}}
#tt{position:absolute;display:none;background:rgba(2,8,20,.92);border:1px solid #1a3040;border-radius:6px;padding:10px 14px;pointer-events:none;z-index:100;font-size:11px;max-width:220px;backdrop-filter:blur(8px)}
.tn{color:#4de8c2;font-size:13px;font-weight:bold;margin-bottom:4px}
.tr{display:flex;justify-content:space-between;gap:12px;margin-bottom:2px}
.tl{color:#4a7a90}.tv{color:#b8d4e3}
#ld{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;z-index:200}
#ld h2{font-size:22px;font-weight:300;color:#4de8c2;margin-bottom:8px;letter-spacing:2px}
#ld p{color:#3d6b80;font-size:13px}
.pu{animation:pu 2s infinite}
@keyframes pu{0%,100%{opacity:.4}50%{opacity:1}}
#nav{position:absolute;bottom:108px;left:50%;transform:translateX(-50%);pointer-events:auto;display:flex;gap:12px;font-size:11px}
#nav a{color:#4a7a90;text-decoration:none;padding:4px 10px;border:1px solid #1a3040;border-radius:4px;transition:all .2s}
#nav a:hover,#nav a.act{color:#4de8c2;border-color:#4de8c2}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="overlay">
 <div id="hdr"><h1>THE REEF</h1><div class="ep" id="ep">Loading...</div><div class="ti" id="ti"></div></div>
 <div id="sp">
  <div class="st">Population <span class="v" id="pv">&mdash;</span></div>
  <div class="st">Species <span class="v" id="sv">&mdash;</span></div>
  <div class="st">Max Gen <span class="v" id="gv">&mdash;</span></div>
  <div class="st">Births <span class="v" id="bv">&mdash;</span></div>
  <div class="st">Deaths <span class="v" id="dv">&mdash;</span></div>
 </div>
 <div id="sl"></div>
 <div id="el"></div>
 <canvas id="tc"></canvas>
 <div id="tt"></div>
 <div id="nav"><a href="index.html" class="act">Reef</a><a href="exchange.html">Exchange</a></div>
</div>
<div id="ld"><h2 class="pu">THE REEF</h2><p>Awakening the ecosystem...</p></div>
<script>
(function(){
"use strict";
var cv=document.getElementById("c"),cx=cv.getContext("2d"),
    tc=document.getElementById("tc"),tx=tc.getContext("2d"),
    W,H,dpr,S=null,af=0,ho=null,mx=0,my=0,particles=[],bubbles=[];

function resize(){
 dpr=devicePixelRatio||1;W=innerWidth;H=innerHeight;
 cv.width=W*dpr;cv.height=H*dpr;cx.setTransform(dpr,0,0,dpr,0,0);
 tc.width=W*dpr;tc.height=100*dpr;
 tc.style.cssText="position:absolute;bottom:0;left:0;width:"+W+"px;height:100px";
 tx.setTransform(dpr,0,0,dpr,0,0);
}
addEventListener("resize",resize);resize();
for(var i=0;i<30;i++)bubbles.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*2+.5,s:Math.random()*.3+.1,w:Math.random()*Math.PI*2});

async function load(){
 try{var r=await fetch("state.json?t="+Date.now());if(!r.ok)throw 0;
 document.getElementById("ld").style.display="none";return await r.json();}
 catch(e){document.getElementById("ld").innerHTML="<h2>THE REEF</h2><p style=\"color:#e84d6e\">No data yet.<br>Run <code style=\"color:#4de8c2\">python src/evolve.py</code></p>";return null;}}

function w2s(wx,wy){
 if(!S)return{x:0,y:0,s:1};
 var ww=S.config.world_w,wh=S.config.world_h,m=60,
     aw=W-m*2,ah=H-100-m,sc=Math.min(aw/ww,ah/wh),
     ox=(W-ww*sc)/2,oy=(H-100-wh*sc)/2;
 return{x:ox+wx*sc,y:oy+wy*sc,s:sc};
}
function s2w(sx,sy){
 if(!S)return{x:0,y:0};
 var ww=S.config.world_w,wh=S.config.world_h,m=60,
     aw=W-m*2,ah=H-100-m,sc=Math.min(aw/ww,ah/wh),
     ox=(W-ww*sc)/2,oy=(H-100-wh*sc)/2;
 return{x:(sx-ox)/sc,y:(sy-oy)/sc};
}

function drawBg(){
 var g=cx.createRadialGradient(W/2,H/2,0,W/2,H/2,Math.max(W,H)*.7);
 g.addColorStop(0,"#061420");g.addColorStop(.5,"#040e18");g.addColorStop(1,"#020814");
 cx.fillStyle=g;cx.fillRect(0,0,W,H);
 var t=af*.008;cx.globalAlpha=.02;
 for(var i=0;i<5;i++){
  var ccx=W*.3+Math.sin(t+i*1.3)*W*.2,ccy=H*.3+Math.cos(t*.7+i*.9)*H*.15,
      cr=100+Math.sin(t*.5+i)*50,cg=cx.createRadialGradient(ccx,ccy,0,ccx,ccy,cr);
  cg.addColorStop(0,"#4de8c2");cg.addColorStop(1,"transparent");
  cx.fillStyle=cg;cx.fillRect(0,0,W,H);
 }
 cx.globalAlpha=1;
 if(S){var tl=w2s(0,0),br=w2s(S.config.world_w,S.config.world_h);
  cx.strokeStyle="rgba(77,232,194,.06)";cx.lineWidth=1;
  cx.strokeRect(tl.x,tl.y,br.x-tl.x,br.y-tl.y);}
}

function drawBub(){
 for(var b of bubbles){
  b.y-=b.s;b.x+=Math.sin(b.w+af*.02)*.2;
  if(b.y<-10){b.y=H+10;b.x=Math.random()*W;}
  cx.beginPath();cx.arc(b.x,b.y,b.r,0,Math.PI*2);
  cx.fillStyle="rgba(77,232,194,"+(0.03+Math.sin(af*.03+b.w)*.02)+")";cx.fill();
 }
}

function drawRes(){
 if(!S)return;var t=af*.04;
 for(var r of S.resources){
  var p=w2s(r.x,r.y),pu=1+Math.sin(t+r.x*.1+r.y*.1)*.3,rd=2*pu;
  cx.beginPath();cx.arc(p.x,p.y,rd+4,0,Math.PI*2);
  cx.fillStyle="rgba(77,232,194,"+(0.05*pu)+")";cx.fill();
  cx.beginPath();cx.arc(p.x,p.y,rd,0,Math.PI*2);
  cx.fillStyle="rgba(77,232,194,"+(0.2*pu)+")";cx.fill();
 }
}

function drawOrgs(){
 if(!S)return;var t=af*.02;
 for(var o of S.organisms){
  var p=w2s(o.x,o.y),sz=o.traits.size*p.s*.8,h=o.traits.hue,
      agg=o.traits.aggression,ep=Math.min(o.energy/100,1);
  var gr=sz*(2+Math.sin(t+o.x*.05)*.5),
      gl=cx.createRadialGradient(p.x,p.y,sz*.3,p.x,p.y,gr);
  gl.addColorStop(0,"hsla("+h+",70%,55%,"+(0.15*ep)+")");
  gl.addColorStop(1,"transparent");
  cx.fillStyle=gl;cx.beginPath();cx.arc(p.x,p.y,gr,0,Math.PI*2);cx.fill();
  cx.beginPath();
  if(agg>.6){
   var sp=5+Math.floor(agg*4);
   for(var j=0;j<sp;j++){var a=(j/sp)*Math.PI*2+t*.5,rr=j%2?sz*.6:sz;
    var px=p.x+Math.cos(a)*rr,py=p.y+Math.sin(a)*rr;
    j===0?cx.moveTo(px,py):cx.lineTo(px,py);}cx.closePath();
  }else cx.arc(p.x,p.y,sz,0,Math.PI*2);
  var bg=cx.createRadialGradient(p.x-sz*.3,p.y-sz*.3,0,p.x,p.y,sz);
  bg.addColorStop(0,"hsla("+h+",80%,65%,"+(0.7+ep*.3)+")");
  bg.addColorStop(1,"hsla("+h+",60%,35%,"+(0.5+ep*.3)+")");
  cx.fillStyle=bg;cx.fill();
  cx.beginPath();cx.arc(p.x,p.y,sz*.25,0,Math.PI*2);
  cx.fillStyle="hsla("+h+",90%,85%,.8)";cx.fill();
  if(Math.abs(o.vx)+Math.abs(o.vy)>.3){
   var tl=Math.sqrt(o.vx*o.vx+o.vy*o.vy)*p.s*3,
       ta=Math.atan2(-o.vy,-o.vx),ttx=p.x+Math.cos(ta)*tl,tty=p.y+Math.sin(ta)*tl,
       tg=cx.createLinearGradient(p.x,p.y,ttx,tty);
   tg.addColorStop(0,"hsla("+h+",60%,50%,.3)");tg.addColorStop(1,"transparent");
   cx.beginPath();cx.moveTo(p.x+Math.cos(ta+.4)*sz,p.y+Math.sin(ta+.4)*sz);
   cx.lineTo(ttx,tty);cx.lineTo(p.x+Math.cos(ta-.4)*sz,p.y+Math.sin(ta-.4)*sz);
   cx.fillStyle=tg;cx.fill();
  }
  if(ho&&ho.id===o.id){cx.beginPath();cx.arc(p.x,p.y,sz+6,0,Math.PI*2);
   cx.strokeStyle="hsla("+h+",80%,70%,.6)";cx.lineWidth=1.5;cx.stroke();}
 }
}

function drawPart(){
 for(var i=particles.length-1;i>=0;i--){
  var p=particles[i];p.x+=p.vx;p.y+=p.vy;p.life-=.02;p.vy+=.02;
  if(p.life<=0){particles.splice(i,1);continue;}
  cx.beginPath();cx.arc(p.x,p.y,p.r*p.life,0,Math.PI*2);
  cx.fillStyle="hsla("+p.h+",60%,50%,"+(p.life*.5)+")";cx.fill();
 }
}

function drawTL(){
 if(!S||!S.history)return;
 var pop=S.history.population,spc=S.history.species_count;
 if(pop.length<2)return;
 var w=W,h=100;tx.clearRect(0,0,w,h);
 var bg=tx.createLinearGradient(0,0,0,h);
 bg.addColorStop(0,"transparent");bg.addColorStop(.3,"rgba(2,8,20,.8)");
 bg.addColorStop(1,"rgba(2,8,20,.95)");tx.fillStyle=bg;tx.fillRect(0,0,w,h);
 tx.strokeStyle="rgba(77,232,194,.08)";tx.lineWidth=.5;
 tx.beginPath();tx.moveTo(0,h*.5);tx.lineTo(w,h*.5);tx.stroke();
 var mp=Math.max.apply(null,pop)||1,ms=Math.max.apply(null,spc)||1,
     len=pop.length,step=w/Math.max(len-1,1);
 tx.beginPath();tx.moveTo(0,h);
 for(var i=0;i<len;i++)tx.lineTo(i*step,h-(pop[i]/mp)*(h-20)-10);
 tx.lineTo((len-1)*step,h);tx.closePath();
 var pg=tx.createLinearGradient(0,20,0,h);
 pg.addColorStop(0,"rgba(77,232,194,.3)");pg.addColorStop(1,"rgba(77,232,194,.02)");
 tx.fillStyle=pg;tx.fill();
 tx.beginPath();
 for(var i=0;i<len;i++){var x=i*step,y=h-(pop[i]/mp)*(h-20)-10;i?tx.lineTo(x,y):tx.moveTo(x,y);}
 tx.strokeStyle="rgba(77,232,194,.6)";tx.lineWidth=1.5;tx.stroke();
 tx.beginPath();
 for(var i=0;i<len;i++){var x=i*step,y=h-(spc[i]/ms)*(h-30)-10;i?tx.lineTo(x,y):tx.moveTo(x,y);}
 tx.strokeStyle="rgba(200,160,255,.5)";tx.lineWidth=1;tx.stroke();
 tx.font="10px Courier New";
 tx.fillStyle="rgba(77,232,194,.5)";tx.fillText("Pop: "+pop[pop.length-1],8,16);
 tx.fillStyle="rgba(200,160,255,.5)";tx.fillText("Species: "+spc[spc.length-1],8,28);
 tx.fillStyle="rgba(77,232,194,.3)";tx.fillText("Tick "+S._meta.tick,w-70,16);
}

function updateUI(){
 if(!S)return;var m=S._meta;
 document.getElementById("ep").textContent=m.epoch;
 document.getElementById("ti").textContent="Tick "+m.tick+" | Updated "+ago(m.updated_at);
 document.getElementById("pv").textContent=S.organisms.length;
 var al=0;for(var k in S.species)if(S.species[k].current_pop>0)al++;
 document.getElementById("sv").textContent=al;
 var mg=0;for(var o of S.organisms)if(o.generation>mg)mg=o.generation;
 document.getElementById("gv").textContent=mg;
 document.getElementById("bv").textContent=fmt(m.total_births);
 document.getElementById("dv").textContent=fmt(m.total_deaths);
 var sl=document.getElementById("sl"),h="",
     arr=Object.entries(S.species).sort(function(a,b){return b[1].current_pop-a[1].current_pop;});
 for(var e of arr){var id=e[0],sp=e[1],ex=sp.current_pop===0;
  h+="<div class=si"+(ex?" style=\"opacity:0.3;text-decoration:line-through\"":"")+"><div class=sd style=\"background:hsl("+sp.color_h+",70%,55%)\"></div><span class=sn>"+sp.name+"</span><span class=sc>"+sp.current_pop+"</span></div>";}
 sl.innerHTML=h;
 var el=document.getElementById("el"),evts=S.history.events.slice(-12).reverse();
 el.innerHTML=evts.map(function(e){return"<div class=\"ev "+e.type+"\">["+(e.tick)+"] "+e.desc+"</div>";}).join("");
}

function ago(iso){if(!iso)return"never";var d=(Date.now()-new Date(iso).getTime())/1e3;
 if(d<60)return"just now";if(d<3600)return Math.floor(d/60)+"m ago";
 if(d<86400)return Math.floor(d/3600)+"h ago";return Math.floor(d/86400)+"d ago";}
function fmt(n){if(n>=1e6)return(n/1e6).toFixed(1)+"M";if(n>=1e3)return(n/1e3).toFixed(1)+"K";return String(n);}

cv.addEventListener("mousemove",function(e){
 mx=e.clientX;my=e.clientY;if(!S)return;
 var wp=s2w(mx,my);ho=null;var bd=20;
 for(var o of S.organisms){var dx=o.x-wp.x,dy=o.y-wp.y,d=Math.sqrt(dx*dx+dy*dy);
  if(d<bd){bd=d;ho=o;}}
 cv.style.cursor=ho?"pointer":"default";
 var tt=document.getElementById("tt");
 if(!ho){tt.style.display="none";return;}
 var sp=S.species[ho.species_id]||{};
 tt.style.display="block";tt.style.left=(mx+16)+"px";tt.style.top=(my-10)+"px";
 tt.innerHTML="<div class=tn style=\"color:hsl("+ho.traits.hue+",70%,60%)\">"+
  (sp.name||ho.species_id)+"</div>"+
  "<div class=tr><span class=tl>Energy</span><span class=tv>"+ho.energy.toFixed(0)+"</span></div>"+
  "<div class=tr><span class=tl>Age</span><span class=tv>"+ho.age+"</span></div>"+
  "<div class=tr><span class=tl>Gen</span><span class=tv>"+ho.generation+"</span></div>"+
  "<div class=tr><span class=tl>Speed</span><span class=tv>"+ho.traits.speed.toFixed(1)+"</span></div>"+
  "<div class=tr><span class=tl>Size</span><span class=tv>"+ho.traits.size.toFixed(1)+"</span></div>"+
  "<div class=tr><span class=tl>Aggression</span><span class=tv>"+ho.traits.aggression.toFixed(2)+"</span></div>"+
  "<div class=tr><span class=tl>Kills</span><span class=tv>"+ho.kills+"</span></div>";
});

function anim(){
 if(S)for(var o of S.organisms){
  o.x+=o.vx*.02;o.y+=o.vy*.02;
  var ww=S.config.world_w,wh=S.config.world_h;
  if(o.x<0)o.x+=ww;if(o.x>ww)o.x-=ww;
  if(o.y<0)o.y+=wh;if(o.y>wh)o.y-=wh;
 }
}

function render(){
 af++;anim();cx.clearRect(0,0,W,H);
 drawBg();drawBub();drawRes();drawOrgs();drawPart();
 if(af%60===0)drawTL();
 requestAnimationFrame(render);
}

async function reload(){
 var ns=await load();
 if(ns){
  if(S){var oi=new Set(S.organisms.map(function(o){return o.id;})),
   ni=new Set(ns.organisms.map(function(o){return o.id;}));
   for(var o of S.organisms)if(!ni.has(o.id)){var p=w2s(o.x,o.y);
    for(var j=0;j<8;j++){var a=(j/8)*Math.PI*2;
     particles.push({x:p.x,y:p.y,vx:Math.cos(a)*(1+Math.random()),
      vy:Math.sin(a)*(1+Math.random()),r:2+Math.random()*2,life:1,h:o.traits.hue});}}}
  S=ns;updateUI();drawTL();}
}

(async function(){S=await load();if(S){updateUI();drawTL();}render();setInterval(reload,30000);})();
})();
</script>
</body>
</html>
