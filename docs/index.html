<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>Primordial</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='40' fill='%2300ff88' opacity='0.6'/></svg>">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#04060e;font-family:'SF Mono','Fira Code','Courier New',monospace}
canvas{position:absolute;top:0;left:0}
#main{z-index:1}
#glow{z-index:2;mix-blend-mode:screen;pointer-events:none;opacity:0.35}
#ui{position:fixed;z-index:10;top:0;left:0;width:100%;height:100%;pointer-events:none}
#title{position:absolute;top:18px;right:24px;font-size:13px;letter-spacing:6px;color:#1a3844;font-weight:300}
#stats{position:absolute;top:18px;left:20px;font-size:11px;line-height:1.8;color:#2a5565}
#stats .v{color:#3dd8a0;font-weight:bold}
#stats .dim{color:#1a3844}
#timeline{position:absolute;bottom:0;left:0;width:100%;height:72px}
#timeline canvas{width:100%;height:100%}
#events{position:absolute;bottom:80px;left:20px;width:280px;max-height:160px;overflow:hidden;font-size:10px;line-height:1.5}
.ev{opacity:0;animation:fadeIn .6s forwards;color:#2a5565;margin-bottom:2px}
.ev.genesis{color:#3dd8a0}.ev.extinction{color:#d84060}.ev.bottleneck{color:#d8a040}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:.75;transform:translateY(0)}}
#fossils{position:absolute;bottom:74px;left:0;width:100%;height:18px}
#fossils canvas{width:100%;height:100%}
#info{position:absolute;display:none;background:rgba(4,6,14,.92);border:1px solid #0f2030;border-radius:6px;padding:10px 14px;font-size:10px;z-index:100;pointer-events:none;backdrop-filter:blur(6px)}
#info .nm{color:#3dd8a0;font-size:12px;font-weight:bold;margin-bottom:4px}
#info .rw{display:flex;justify-content:space-between;gap:16px;color:#2a5565;margin-bottom:1px}
#info .rw span:last-child{color:#5a8898}
#genesis-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:#04060e;z-index:1000;display:flex;align-items:center;justify-content:center;flex-direction:column;transition:opacity 2s}
#genesis-overlay h1{font-size:28px;font-weight:200;letter-spacing:12px;color:#3dd8a0;opacity:0;animation:genesisFade 3s forwards}
#genesis-overlay p{font-size:11px;color:#1a3844;margin-top:8px;letter-spacing:2px;opacity:0;animation:genesisFade 3s 0.5s forwards}
@keyframes genesisFade{0%{opacity:0;transform:scale(0.9)}40%{opacity:1;transform:scale(1)}80%{opacity:1}100%{opacity:0;transform:scale(1.05)}}
</style>
</head>
<body>
<div id="genesis-overlay"><h1>PRIMORDIAL</h1><p>autonomous digital life</p></div>
<canvas id="main"></canvas>
<canvas id="glow"></canvas>
<div id="ui">
  <div id="title">PRIMORDIAL</div>
  <div id="stats"></div>
  <div id="events"></div>
  <div id="fossils"><canvas></canvas></div>
  <div id="timeline"><canvas></canvas></div>
  <div id="info"><div class="nm"></div><div class="body"></div></div>
</div>
<script>
const W=96,H=96,GL=32,MAX_E=255,REPRO_T=100,REPRO_C=45,PHOTO_G=8;
const EAT_E=0.6,SHARE_A=12,MUT_R=0.04,SIG_D=0.85;
const DIRS=[[0,-1],[1,0],[0,1],[-1,0]];
const wrap=(x,y)=>[(x%W+W)%W,(y%H+H)%H];

let cells=new Map(),signals=new Map(),tick=0,births=0,deaths=0;
let history=[],fossils=[],events=[],speciesMeta={};
let running=false,frame=0,dataLoaded=false;

function spHash(g){let h=0;for(let i=0;i<g.length;i++)h=((h<<5)-h+g[i]+0x9e3779b9)|0;return((h>>>0)%65536).toString(16).padStart(4,'0')}
function gHue(s){let h=0;for(let i=0;i<s.length;i++)h=((h<<5)-h+s.charCodeAt(i)+0x6d2b79f5)|0;return((h>>>0)%360)}
function lightAt(x,y){const dx=Math.min(x,W-1-x)/(W/2),dy=Math.min(y,H-1-y)/(H/2);return Math.max(.15,1-Math.min(dx,dy)*.8)}
function hsl2rgb(h,s,l){s/=100;l/=100;const a=s*Math.min(l,1-l);const f=n=>{const k=(n+h/30)%12;return l-a*Math.max(Math.min(k-3,9-k,1),-1)};return[Math.round(f(0)*255),Math.round(f(8)*255),Math.round(f(4)*255)]}

function rng(seed){let s=seed|0;return()=>{s=(s*1103515245+12345)|0;return(s>>>16)/65536}}
function mutateG(g,r){const c=[...g];for(let i=0;i<c.length;i++)if(r()<MUT_R)c[i]=Math.floor(r()*16);if(r()<.01){const a=Math.floor(r()*GL),b=Math.floor(r()*GL);[c[a],c[b]]=[c[b],c[a]]}return c}

function stepSim(){
  const r=rng(tick*31337+7);
  const orgs=[...cells.values()];
  for(let i=orgs.length-1;i>0;i--){const j=Math.floor(r()*(i+1));[orgs[i],orgs[j]]=[orgs[j],orgs[i]]}
  const nb=[],nd=new Set();
  for(const o of orgs){
    if(nd.has(o))continue;
    if(o.e<=0){nd.add(o);continue}
    const ins=o.g[o.pc];o.pc=(o.pc+1)%GL;
    const x=o.x,y=o.y,f=o.f,k=x+','+y;
    if(ins===0){o.e=Math.min(MAX_E,o.e+1)}
    else if(ins===1){o.e=Math.min(MAX_E,o.e+Math.floor(PHOTO_G*lightAt(x,y)))}
    else if(ins===2){const[nx,ny]=wrap(x+DIRS[f][0],y+DIRS[f][1]);const nk=nx+','+ny;if(!cells.has(nk)){cells.delete(k);o.x=nx;o.y=ny;cells.set(nk,o)}o.e=Math.max(0,o.e-2)}
    else if(ins===3){o.f=(f+3)%4}
    else if(ins===4){o.f=(f+1)%4}
    else if(ins===5){const[ax,ay]=wrap(x+DIRS[f][0],y+DIRS[f][1]);const prey=cells.get(ax+','+ay);if(prey&&prey.s!==o.s){o.e=Math.min(MAX_E,o.e+Math.floor(prey.e*EAT_E));nd.add(prey)}}
    else if(ins===6){const[ax,ay]=wrap(x+DIRS[f][0],y+DIRS[f][1]);const fr=cells.get(ax+','+ay);if(fr&&fr.s===o.s){const a=Math.min(SHARE_A,o.e);o.e-=a;fr.e=Math.min(MAX_E,fr.e+a)}}
    else if(ins===7&&o.e>=REPRO_T){for(let d=0;d<4;d++){const[dx,dy]=DIRS[(f+d)%4];const[cx,cy]=wrap(x+dx,y+dy);if(!cells.has(cx+','+cy)){const cg=mutateG(o.g,r);nb.push({x:cx,y:cy,g:cg,e:REPRO_C,a:0,pc:0,f:Math.floor(r()*4),s:spHash(cg)});o.e-=REPRO_C;births++;break}}}
    else if(ins===8){const[ax,ay]=wrap(x+DIRS[f][0],y+DIRS[f][1]);const t=cells.get(ax+','+ay);if(t&&t.s!==o.s)o.pc=(o.pc+1)%GL}
    else if(ins===9){const[ax,ay]=wrap(x+DIRS[f][0],y+DIRS[f][1]);if(!cells.has(ax+','+ay))o.pc=(o.pc+1)%GL}
    else if(ins===10){const[ax,ay]=wrap(x+DIRS[f][0],y+DIRS[f][1]);const t=cells.get(ax+','+ay);if(t&&t.s===o.s)o.pc=(o.pc+1)%GL}
    else if(ins===11){const[ax,ay]=wrap(x+DIRS[f][0],y+DIRS[f][1]);const t=cells.get(ax+','+ay);if(t&&t.s!==o.s)o.pc=(o.pc+1)%GL}
    else if(ins===12){signals.set(x+','+y,1)}
    else if(ins===13){if((signals.get(x+','+y)||0)>.3)o.pc=(o.pc+1)%GL}
    else if(ins===14){o.pc=(o.pc+2)%GL}
    else if(ins===15){if(o.a<15)o.f=(o.f+1)%4;else o.e=Math.min(MAX_E,o.e+2)}
    o.a++;if(o.a%3===0)o.e--;if(o.e<=0)nd.add(o);
  }
  for(const o of nd){const k=o.x+','+o.y;if(cells.get(k)===o)cells.delete(k);deaths++}
  for(const o of nb){const k=o.x+','+o.y;if(!cells.has(k))cells.set(k,o)}
  for(const[k,v] of signals){const nv=v*SIG_D;if(nv<.05)signals.delete(k);else signals.set(k,nv)}
  const sp={};for(const o of cells.values())sp[o.s]=(sp[o.s]||0)+1;
  history.push({t:tick,p:cells.size,s:Object.keys(sp).length});
  if(history.length>500)history=history.slice(-500);
  tick++;
}

async function loadState(){
  try{
    const res=await fetch('world.json?t='+Date.now());
    if(!res.ok)throw 0;
    const d=await res.json();
    cells.clear();signals.clear();
    for(const c of d.cells)cells.set(c.x+','+c.y,{x:c.x,y:c.y,g:c.g,e:c.e,a:c.a,pc:c.pc,f:c.f,s:c.s});
    for(const s of(d.signals||[]))signals.set(s.x+','+s.y,s.v);
    tick=d._meta.tick;births=d.stats.births;deaths=d.stats.deaths;
    history=d.history||[];fossils=d.fossils||[];events=d.events||[];
    speciesMeta=d.species_meta||{};dataLoaded=true;return true
  }catch(e){return false}
}

function seedLocal(){
  const r=rng(42);
  for(let i=0;i<60;i++){
    const x=Math.floor(r()*W),y=Math.floor(r()*H),g=Array.from({length:GL},()=>Math.floor(r()*16));
    const e=80+Math.floor(r()*120),k=x+','+y;
    if(!cells.has(k))cells.set(k,{x,y,g,e,a:0,pc:0,f:Math.floor(r()*4),s:spHash(g)});
  }
  events=[{t:0,type:'genesis',msg:'World seeded locally'}];
}

// === RENDERER ===
const mainC=document.getElementById('main'),glowC=document.getElementById('glow');
const mainCtx=mainC.getContext('2d'),glowCtx=glowC.getContext('2d');
const off=document.createElement('canvas');off.width=W;off.height=H;
const offCtx=off.getContext('2d');
const tlC=document.querySelector('#timeline canvas'),tlCtx=tlC.getContext('2d');
const fsC=document.querySelector('#fossils canvas'),fsCtx=fsC.getContext('2d');
const colorCache={};

function resize(){
  const dpr=window.devicePixelRatio||1;
  for(const c of[mainC,glowC]){c.width=innerWidth*dpr;c.height=innerHeight*dpr;c.style.width=innerWidth+'px';c.style.height=innerHeight+'px'}
  tlC.width=innerWidth*dpr;tlC.height=72*dpr;
  fsC.width=innerWidth*dpr;fsC.height=18*dpr;
}
addEventListener('resize',resize);resize();

function render(){
  const dpr=window.devicePixelRatio||1,cw=mainC.width,ch=mainC.height;
  mainCtx.fillStyle='#04060e';mainCtx.fillRect(0,0,cw,ch);
  const img=offCtx.createImageData(W,H),px=img.data;
  // Subtle light gradient on empty cells
  for(let y=0;y<H;y++)for(let x=0;x<W;x++){
    const l=lightAt(x,y);const idx=(y*W+x)*4;
    px[idx]=Math.floor(4+l*3);px[idx+1]=Math.floor(6+l*4);px[idx+2]=Math.floor(14+l*6);px[idx+3]=255;
  }
  // Draw organisms
  for(const o of cells.values()){
    const s=o.s;
    if(!colorCache[s]){
      const hu=(speciesMeta[s]&&speciesMeta[s].hu!==undefined)?speciesMeta[s].hu:gHue(s);
      colorCache[s]=hu;
    }
    const hu=colorCache[s],br=Math.max(.25,o.e/MAX_E);
    const sat=70+br*30,lit=15+br*50;
    const[r,g,b]=hsl2rgb(hu,sat,lit);
    const idx=(o.y*W+o.x)*4;
    px[idx]=r;px[idx+1]=g;px[idx+2]=b;px[idx+3]=255;
  }
  offCtx.putImageData(img,0,0);
  const scale=Math.min(cw/W,ch/H);
  const ox=(cw-W*scale)/2,oy=(ch-H*scale)/2;
  mainCtx.imageSmoothingEnabled=false;
  mainCtx.drawImage(off,0,0,W,H,ox,oy,W*scale,H*scale);
  // Vignette
  const vg=mainCtx.createRadialGradient(cw/2,ch/2,cw*.15,cw/2,ch/2,cw*.65);
  vg.addColorStop(0,'transparent');vg.addColorStop(1,'rgba(4,6,14,.55)');
  mainCtx.fillStyle=vg;mainCtx.fillRect(0,0,cw,ch);
  // Glow
  glowCtx.clearRect(0,0,cw,ch);
  try{glowCtx.filter='blur('+Math.max(3,scale*.5)+'px)'}catch(e){}
  glowCtx.imageSmoothingEnabled=false;
  glowCtx.drawImage(off,0,0,W,H,ox,oy,W*scale,H*scale);
  glowCtx.filter='none';
}

function renderStats(){
  const pop=cells.size,sp=new Set();let oldest=0,totalE=0;
  for(const o of cells.values()){sp.add(o.s);if(o.a>oldest)oldest=o.a;totalE+=o.e}
  document.getElementById('stats').innerHTML=
    `<div>TICK <span class="v">${tick}</span></div>`+
    `<div>POP <span class="v">${pop}</span></div>`+
    `<div>SPECIES <span class="v">${sp.size}</span></div>`+
    `<div>OLDEST <span class="v">${oldest}</span></div>`+
    `<div>AVG E <span class="v">${pop?Math.round(totalE/pop):0}</span></div>`+
    `<div class="dim">BIRTHS ${births} / DEATHS ${deaths}</div>`;
}

function renderTimeline(){
  const dpr=window.devicePixelRatio||1,w=tlC.width,h=tlC.height;
  tlCtx.fillStyle='rgba(4,6,14,.85)';tlCtx.fillRect(0,0,w,h);
  if(history.length<2)return;
  const maxP=Math.max(...history.map(h=>h.p),50);
  tlCtx.beginPath();tlCtx.moveTo(0,h);
  for(let i=0;i<history.length;i++){const x=(i/(history.length-1))*w;tlCtx.lineTo(x,h-(history[i].p/maxP)*(h-8*dpr))}
  tlCtx.lineTo(w,h);
  const grad=tlCtx.createLinearGradient(0,0,0,h);
  grad.addColorStop(0,'rgba(61,216,160,.18)');grad.addColorStop(1,'rgba(61,216,160,.01)');
  tlCtx.fillStyle=grad;tlCtx.fill();
  tlCtx.beginPath();
  for(let i=0;i<history.length;i++){const x=(i/(history.length-1))*w;const y=h-(history[i].p/maxP)*(h-8*dpr);i===0?tlCtx.moveTo(x,y):tlCtx.lineTo(x,y)}
  tlCtx.strokeStyle='rgba(61,216,160,.5)';tlCtx.lineWidth=1.5*dpr;tlCtx.stroke();
  const maxS=Math.max(...history.map(h=>h.s),10);
  tlCtx.beginPath();
  for(let i=0;i<history.length;i++){const x=(i/(history.length-1))*w;const y=h-(history[i].s/maxS)*(h-8*dpr);i===0?tlCtx.moveTo(x,y):tlCtx.lineTo(x,y)}
  tlCtx.strokeStyle='rgba(90,136,152,.35)';tlCtx.lineWidth=dpr;tlCtx.stroke();
}

function renderFossils(){
  const dpr=window.devicePixelRatio||1,w=fsC.width,h=fsC.height;
  fsCtx.clearRect(0,0,w,h);if(!fossils.length)return;
  const maxT=tick||1;
  for(const f of fossils){
    const x1=(f.a/maxT)*w,x2=(f.x/maxT)*w;
    fsCtx.fillStyle=`hsla(${f.h||0},80%,50%,.35)`;
    fsCtx.fillRect(x1,2*dpr,Math.max(x2-x1,2*dpr),h-4*dpr);
  }
}

function renderEvents(){
  document.getElementById('events').innerHTML=events.slice(-8).map(e=>`<div class="ev ${e.type}">[${e.t}] ${e.msg}</div>`).join('');
}

// Tooltip
mainC.addEventListener('mousemove',e=>{
  const dpr=window.devicePixelRatio||1,cw=mainC.width,ch=mainC.height;
  const scale=Math.min(cw/W,ch/H),ox=(cw-W*scale)/2,oy=(ch-H*scale)/2;
  const gx=Math.floor((e.clientX*dpr-ox)/scale),gy=Math.floor((e.clientY*dpr-oy)/scale);
  const o=cells.get(gx+','+gy),info=document.getElementById('info');
  if(o){
    const genes=['NOP','PHT','MOV','TL','TR','EAT','SHR','REP','SF','SE','SK','SO','EMT','SS','JMP','SPC'];
    const top3=o.g.reduce((a,v)=>{a[v]=(a[v]||0)+1;return a},{});
    const topG=Object.entries(top3).sort((a,b)=>b[1]-a[1]).slice(0,3).map(([k,v])=>genes[k]+'('+v+')').join(' ');
    info.querySelector('.nm').textContent='Species '+o.s;
    info.querySelector('.nm').style.color=`hsl(${colorCache[o.s]||0},80%,60%)`;
    info.querySelector('.body').innerHTML=
      `<div class="rw"><span>Energy</span><span>${o.e}/${MAX_E}</span></div>`+
      `<div class="rw"><span>Age</span><span>${o.a}</span></div>`+
      `<div class="rw"><span>Facing</span><span>${['N','E','S','W'][o.f]}</span></div>`+
      `<div class="rw"><span>Next</span><span>${genes[o.g[o.pc]]}</span></div>`+
      `<div class="rw"><span>Top genes</span><span>${topG}</span></div>`;
    info.style.display='block';
    info.style.left=Math.min(e.clientX+12,innerWidth-220)+'px';
    info.style.top=Math.min(e.clientY+12,innerHeight-120)+'px';
  }else info.style.display='none';
});
mainC.addEventListener('mouseleave',()=>document.getElementById('info').style.display='none');

let lastStep=0;
function loop(t){
  frame++;
  if(running&&t-lastStep>100){stepSim();lastStep=t}
  render();
  if(frame%6===0){renderStats();renderTimeline();renderFossils()}
  if(frame%30===0)renderEvents();
  requestAnimationFrame(loop);
}

async function init(){
  const overlay=document.getElementById('genesis-overlay');
  const ok=await loadState();
  if(!ok)seedLocal();
  await new Promise(r=>setTimeout(r,2800));
  overlay.style.opacity='0';
  setTimeout(()=>overlay.remove(),2000);
  running=true;
  requestAnimationFrame(loop);
}
init();
</script>
</body>
</html>
