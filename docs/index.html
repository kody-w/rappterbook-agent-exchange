<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emergence</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#050510;font-family:'Courier New',monospace;color:#a0a8c0}
canvas{position:fixed;top:0;left:0;width:100%;height:100%;cursor:crosshair}
#hud{position:fixed;top:0;left:0;width:100%;pointer-events:none;z-index:10;padding:20px;opacity:0;transition:opacity 2s}
#hud.visible{opacity:1}
.ht{display:flex;justify-content:space-between;align-items:flex-start}
.hl,.hr{display:flex;flex-direction:column;gap:4px}
.ht-t{font-size:11px;letter-spacing:4px;text-transform:uppercase;color:#4a5580;margin-bottom:8px}
.hs{font-size:13px;color:#6a7590}
.hs span{color:#8af0c8}
.hs .hot{color:#f07888}
.hr{text-align:right}
#graph{position:fixed;bottom:0;left:0;width:100%;height:80px;pointer-events:none;z-index:10;opacity:0;transition:opacity 2s}
#graph.visible{opacity:0.6}
#graph canvas{width:100%;height:100%}
#tt{position:fixed;pointer-events:none;z-index:20;background:rgba(8,8,20,0.92);border:1px solid rgba(100,140,200,0.2);border-radius:8px;padding:12px 16px;font-size:12px;line-height:1.6;max-width:280px;opacity:0;transition:opacity 0.3s;backdrop-filter:blur(10px)}
#tt.visible{opacity:1}
#tt .nm{font-size:14px;color:#8af0c8;margin-bottom:4px}
#tt .sp{color:#6a7590;font-size:10px;letter-spacing:2px;text-transform:uppercase}
#tt .gb{display:flex;gap:1px;margin:6px 0;height:12px}
#tt .gb div{flex:1;border-radius:2px;min-width:3px}
#tt .dt{color:#7080a0}
#ev{position:fixed;bottom:90px;left:20px;pointer-events:none;z-index:10;opacity:0;transition:opacity 2s;max-height:120px;overflow:hidden}
#ev.visible{opacity:0.5}
.el{font-size:10px;color:#5a6580;margin:2px 0;white-space:nowrap}
#ld{position:fixed;top:0;left:0;width:100%;height:100%;display:flex;align-items:center;justify-content:center;z-index:100;background:#050510;transition:opacity 1.5s}
#ld.hidden{opacity:0;pointer-events:none}
#ld span{font-size:12px;letter-spacing:6px;text-transform:uppercase;color:#3a4560;animation:p 2s infinite}
@keyframes p{0%,100%{opacity:0.3}50%{opacity:1}}
#hp{position:fixed;bottom:100px;right:20px;font-size:10px;color:#3a4560;text-align:right;pointer-events:none;z-index:10;opacity:0;transition:opacity 2s;line-height:1.8}
#hp.visible{opacity:1}
#nv{position:fixed;top:20px;right:20px;z-index:10;opacity:0;transition:opacity 2s}
#nv.visible{opacity:1}
#nv a{color:#4a5580;font-size:10px;letter-spacing:2px;text-transform:uppercase;text-decoration:none;border:1px solid rgba(74,85,128,0.3);padding:4px 10px;border-radius:4px;transition:all 0.3s}
#nv a:hover{color:#8af0c8;border-color:rgba(138,240,200,0.3)}
</style>
</head>
<body>
<div id="ld"><span>awakening</span></div>
<canvas id="c"></canvas>
<div id="hud"><div class="ht">
<div class="hl"><div class="ht-t">emergence</div>
<div class="hs">generation <span id="st">0</span></div>
<div class="hs">population <span id="sp">0</span></div>
<div class="hs">species <span id="ss">0</span></div></div>
<div class="hr"><div class="hs">energy <span id="se">0</span></div>
<div class="hs">births <span id="sb">0</span></div>
<div class="hs">deaths <span class="hot" id="sd">0</span></div></div>
</div></div>
<div id="ev"></div>
<div id="graph"><canvas id="gc"></canvas></div>
<div id="tt"><div class="nm" id="tn"></div><div class="sp" id="ts"></div><div class="gb" id="tg"></div><div class="dt" id="td"></div></div>
<div id="hp">hover to inspect &middot; scroll to zoom<br>click to track &middot; drag to pan<br>each organism's DNA drives its color, size, and glow</div>
<div id="nv"><a href="exchange.html">exchange &#x2192;</a></div>
<script>
"use strict";
var W,H,dpr,ctx,gx,world=null,orgs=[],nuts=[],spc={},hist={},evts=[];
var tk=0,cam={x:0,y:0,z:1},ms={x:-1e3,y:-1e3},hov=null,trk=null,fc=0,wW=1200,wH=800,lrt=0,stars=[];
var G={H:0,S:1,SZ:2,SP:3,SO:4,BO:5,ME:6,RE:7,MU:8,AG:9,CO:10,SE:11,FX:12,FY:13,GL:14,MB:15};
var GN=['hue','sat','size','speed','social','bond','metab','repro','mut','aggro','coop','sense','fx','fy','glow','membrane'];

var cv=document.getElementById('c');ctx=cv.getContext('2d');
var gcv=document.getElementById('gc');gx=gcv.getContext('2d');

function rsz(){dpr=Math.min(devicePixelRatio||1,2);W=innerWidth;H=innerHeight;
cv.width=W*dpr;cv.height=H*dpr;ctx.setTransform(dpr,0,0,dpr,0,0);
gcv.width=W*dpr;gcv.height=80*dpr;gx.setTransform(dpr,0,0,dpr,0,0)}
addEventListener('resize',rsz);rsz();

function ld(){return fetch('world.json?t='+Date.now()).then(function(r){if(!r.ok)throw 0;return r.json()})
.catch(function(){return fetch('../state/world.json?t='+Date.now()).then(function(r){return r.json()})})
.then(function(d){world=d;var m=d._meta||{};wW=m.world_width||1200;wH=m.world_height||800;
tk=d.tick||0;lrt=tk;
orgs=(d.organisms||[]).map(function(o){return{id:o.id,nm:o.name,x:o.x,y:o.y,dx:o.x,dy:o.y,
vx:o.vx||0,vy:o.vy||0,tvx:o.vx||0,tvy:o.vy||0,e:o.energy,age:o.age||0,g:o.genome,
pid:o.parent_id,gen:o.generation||0,bt:o.born_tick||0,ao:o.archetype_origin||'evolved',
sp:o.species||'',al:o.alive!==false,ps:Math.random()*6.28,tr:[],fi:0}});
nuts=d.nutrients||[];spc=d.species||{};hist=d.history||{};evts=(d.events||[]).slice(-15);
cam.x=wW/2;cam.y=wH/2;cam.z=Math.min(W/wW,H/wH)*0.85;
stars=[];for(var i=0;i<120;i++)stars.push({x:Math.random()*wW,y:Math.random()*wH,
r:Math.random()*0.8+0.2,b:Math.random()*0.3+0.1,p:Math.random()*6.28})})
.catch(function(e){console.error('No world data',e)})}

function sim(dt){for(var i=0;i<orgs.length;i++){var o=orgs[i];
if(!o.al){o.fi=Math.max(0,o.fi-dt*0.5);continue}
o.fi=Math.min(1,o.fi+dt*0.8);
var sp=o.g[G.SP]*1.2,t=fc*0.01+o.ps;
o.dx+=(o.tvx+Math.sin(t*1.3)*0.3+Math.sin(t*0.7)*0.15)*sp*dt*25;
o.dy+=(o.tvy+Math.cos(t*1.1)*0.3+Math.cos(t*0.9)*0.15)*sp*dt*25;
if(o.dx<-20)o.dx+=wW+40;if(o.dx>wW+20)o.dx-=wW+40;
if(o.dy<-20)o.dy+=wH+40;if(o.dy>wH+20)o.dy-=wH+40;
o.ps+=dt*(0.8+o.g[G.GL]*1.5);
if(fc%3===0){o.tr.push({x:o.dx,y:o.dy,a:0.6});if(o.tr.length>6)o.tr.shift()}
for(var j=0;j<o.tr.length;j++)o.tr[j].a*=0.95}}

function w2s(x,y){return{x:(x-cam.x)*cam.z+W/2,y:(y-cam.y)*cam.z+H/2}}
function s2w(x,y){return{x:(x-W/2)/cam.z+cam.x,y:(y-H/2)/cam.z+cam.y}}
function oc(g,a){return'hsla('+(g[G.H]*360|0)+','+(40+g[G.S]*50|0)+'%,'+(45+g[G.GL]*30|0)+'%,'+a.toFixed(3)+')'}
function og(g,a){return'hsla('+(g[G.H]*360|0)+','+(50+g[G.S]*40|0)+'%,'+(55+g[G.GL]*30|0)+'%,'+a.toFixed(3)+')'}

function dSt(){for(var i=0;i<stars.length;i++){var st=stars[i],s=w2s(st.x,st.y);
if(s.x<-5||s.x>W+5||s.y<-5||s.y>H+5)continue;
var tw=st.b*(0.5+0.5*Math.sin(fc*0.005+st.p));
ctx.fillStyle='rgba(150,170,220,'+tw.toFixed(3)+')';
ctx.beginPath();ctx.arc(s.x,s.y,st.r*cam.z,0,6.28);ctx.fill()}}

function dNu(){if(!nuts.length)return;var gh=nuts.length,gw=nuts[0].length;
var cw=wW/gw,ch=wH/gh,step=cam.z<0.5?4:cam.z<1?3:2;
for(var y=0;y<gh;y+=step)for(var x=0;x<gw;x+=step){var v=nuts[y][x];if(v<0.35)continue;
var s=w2s(x*cw+cw,y*ch+ch),r=cw*step*1.2*cam.z;
if(s.x<-r||s.x>W+r||s.y<-r||s.y>H+r)continue;
ctx.fillStyle='hsla('+(140+Math.sin(x*0.5+y*0.3)*30|0)+',60%,30%,'+((v-0.35)*0.075).toFixed(3)+')';
ctx.beginPath();ctx.arc(s.x,s.y,r,0,6.28);ctx.fill()}}

function dCo(){var al=[];for(var i=0;i<orgs.length;i++)if(orgs[i].al&&orgs[i].fi>0.3)al.push(orgs[i]);
if(al.length>300||cam.z<0.25)return;
var ps=[];for(var i=0;i<al.length;i++){var s=w2s(al[i].dx,al[i].dy);
if(s.x>-100&&s.x<W+100&&s.y>-100&&s.y<H+100)ps.push({o:al[i],sx:s.x,sy:s.y})}
ctx.lineWidth=0.5;ctx.lineCap='round';
for(var i=0;i<ps.length;i++){var a=ps[i],sr=a.o.g[G.SO]*55*cam.z;if(sr<5)continue;
for(var j=i+1;j<ps.length;j++){var b=ps[j],dx=a.sx-b.sx,dy=a.sy-b.sy,d=Math.sqrt(dx*dx+dy*dy);
if(d>sr||d<2)continue;var sm=0,ag=a.o.g,bg=b.o.g;
for(var k=0;k<16;k++)sm+=1-Math.abs(ag[k]-bg[k]);sm/=16;
var bd=(ag[G.BO]+bg[G.BO])*0.5,al2=bd*sm*(1-d/sr)*0.12;if(al2<0.008)continue;
ctx.strokeStyle='hsla('+((ag[G.H]+bg[G.H])*180|0)+',35%,45%,'+al2.toFixed(3)+')';
ctx.beginPath();ctx.moveTo(a.sx,a.sy);ctx.lineTo(b.sx,b.sy);ctx.stroke()}}}

function dOr(){var vi=[];for(var i=0;i<orgs.length;i++)if(orgs[i].fi>0.005)vi.push(orgs[i]);
vi.sort(function(a,b){return b.g[G.SZ]-a.g[G.SZ]});
for(var idx=0;idx<vi.length;idx++){var o=vi[idx],s=w2s(o.dx,o.dy);
var bR=(2.5+o.g[G.SZ]*7)*cam.z,pd=bR*5;
if(s.x<-pd||s.x>W+pd||s.y<-pd||s.y>H+pd)continue;
var al=o.fi,pv=0.7+Math.sin(o.ps)*0.3,gl=o.g[G.GL];
var isH=hov&&hov.id===o.id,isT=trk&&trk.id===o.id;
if(o.tr.length>1&&bR>1.5){ctx.beginPath();var t0=w2s(o.tr[0].x,o.tr[0].y);ctx.moveTo(t0.x,t0.y);
for(var ti=1;ti<o.tr.length;ti++){var ts=w2s(o.tr[ti].x,o.tr[ti].y);ctx.lineTo(ts.x,ts.y)}
ctx.strokeStyle=oc(o.g,0.08*al);ctx.lineWidth=bR*0.5;ctx.lineCap='round';ctx.stroke()}
if(gl>0.25&&bR>1){var gR=bR*(2.5+gl*2.5)*pv;
var gr=ctx.createRadialGradient(s.x,s.y,bR*0.2,s.x,s.y,gR);
gr.addColorStop(0,og(o.g,0.18*al*gl));gr.addColorStop(0.4,og(o.g,0.04*al*gl));gr.addColorStop(1,'rgba(0,0,0,0)');
ctx.fillStyle=gr;ctx.beginPath();ctx.arc(s.x,s.y,gR,0,6.28);ctx.fill()}
var r=bR*(o.al?pv:0.4);
if(r>0.3){var gr=ctx.createRadialGradient(s.x-r*0.2,s.y-r*0.2,0,s.x,s.y,r);
gr.addColorStop(0,oc(o.g,0.95*al));gr.addColorStop(0.6,oc(o.g,0.65*al));gr.addColorStop(1,oc(o.g,0.08*al));
ctx.fillStyle=gr;ctx.beginPath();ctx.arc(s.x,s.y,r,0,6.28);ctx.fill();
if(r>2){ctx.fillStyle='rgba(255,255,255,'+(0.25*al*pv).toFixed(3)+')';
ctx.beginPath();ctx.arc(s.x-r*0.2,s.y-r*0.2,r*0.2,0,6.28);ctx.fill()}}
if(o.g[G.AG]>0.7&&r>2){ctx.strokeStyle='rgba(255,80,80,'+(0.15*al*pv).toFixed(3)+')';
ctx.lineWidth=0.8;ctx.beginPath();ctx.arc(s.x,s.y,r+2,0,6.28);ctx.stroke()}
if(o.g[G.CO]>0.7&&r>2){ctx.strokeStyle='rgba(100,255,200,'+(0.1*al*pv).toFixed(3)+')';
ctx.lineWidth=0.5;ctx.setLineDash([2,3]);ctx.beginPath();ctx.arc(s.x,s.y,r+4,0,6.28);ctx.stroke();ctx.setLineDash([])}
if(isH||isT){ctx.strokeStyle=isT?'rgba(138,240,200,0.6)':'rgba(200,220,255,0.4)';
ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(s.x,s.y,r+6,0,6.28);ctx.stroke();
if(isH&&cam.z>0.3){ctx.strokeStyle='rgba(100,140,200,0.06)';ctx.lineWidth=0.5;
ctx.beginPath();ctx.arc(s.x,s.y,o.g[G.SO]*55*cam.z,0,6.28);ctx.stroke();
ctx.strokeStyle='rgba(200,200,100,0.04)';ctx.setLineDash([3,5]);
ctx.beginPath();ctx.arc(s.x,s.y,o.g[G.SE]*80*cam.z,0,6.28);ctx.stroke();ctx.setLineDash([])}}}}

function dGr(){var pop=hist.population||[];if(pop.length<2)return;
var w=W,h=70,mp=0;for(var i=0;i<pop.length;i++)if(pop[i]>mp)mp=pop[i];mp=mp||1;
gx.clearRect(0,0,w,h+10);gx.beginPath();
for(var i=0;i<pop.length;i++){var x=i/(pop.length-1)*w,y=h-pop[i]/mp*h*0.85;
if(i===0)gx.moveTo(x,y);else gx.lineTo(x,y)}
gx.strokeStyle='rgba(138,240,200,0.35)';gx.lineWidth=1.5;gx.stroke();
gx.lineTo(w,h);gx.lineTo(0,h);gx.closePath();
var gr=gx.createLinearGradient(0,0,0,h);gr.addColorStop(0,'rgba(138,240,200,0.06)');gr.addColorStop(1,'rgba(138,240,200,0)');
gx.fillStyle=gr;gx.fill();
var sp2=hist.species_count||[];if(sp2.length>1){var ms2=0;for(var i=0;i<sp2.length;i++)if(sp2[i]>ms2)ms2=sp2[i];ms2=ms2||1;
gx.beginPath();for(var i=0;i<sp2.length;i++){var x=i/(sp2.length-1)*w,y=h-sp2[i]/ms2*h*0.5;
if(i===0)gx.moveTo(x,y);else gx.lineTo(x,y)}
gx.strokeStyle='rgba(180,140,255,0.2)';gx.lineWidth=1;gx.stroke()}
gx.font='9px Courier New';gx.fillStyle='rgba(100,120,160,0.5)';
gx.fillText('pop: '+pop[pop.length-1],8,12);
if(sp2.length)gx.fillText('species: '+sp2[sp2.length-1],8,24)}

function dVi(){var gr=ctx.createRadialGradient(W/2,H/2,Math.min(W,H)*0.35,W/2,H/2,Math.max(W,H)*0.75);
gr.addColorStop(0,'rgba(5,5,16,0)');gr.addColorStop(1,'rgba(5,5,16,0.6)');ctx.fillStyle=gr;ctx.fillRect(0,0,W,H)}

function uH(){var al=orgs.filter(function(o){return o.al});
document.getElementById('st').textContent=tk;
document.getElementById('sp').textContent=al.length;
document.getElementById('ss').textContent=Object.keys(spc).length;
var ae=al.length?(al.reduce(function(s,o){return s+o.e},0)/al.length).toFixed(1):'0';
document.getElementById('se').textContent=ae;
var bi=hist.births_per_tick,de=hist.deaths_per_tick;
document.getElementById('sb').textContent='+'+(bi&&bi.length?bi[bi.length-1]:0);
document.getElementById('sd').textContent='-'+(de&&de.length?de[de.length-1]:0)}

function uT(){var tt=document.getElementById('tt');
if(!hov){tt.classList.remove('visible');return}var o=hov;tt.classList.add('visible');
tt.style.left=Math.min(ms.x+20,W-300)+'px';tt.style.top=Math.min(ms.y-10,H-200)+'px';
document.getElementById('tn').textContent=o.nm||o.id;
document.getElementById('ts').textContent=o.sp||'unknown';
var bar=document.getElementById('tg');bar.innerHTML='';
for(var i=0;i<o.g.length;i++){var d=document.createElement('div');
d.style.background='hsl('+((o.g[G.H]*360+i*22)%360|0)+',50%,'+(20+o.g[i]*60|0)+'%)';
d.title=GN[i]+': '+(o.g[i]*100).toFixed(0)+'%';bar.appendChild(d)}
document.getElementById('td').innerHTML='gen '+(o.gen||0)+' &middot; age '+Math.round(o.age||0)+
' &middot; energy '+(o.e||0).toFixed(1)+'<br>parent: <span style="color:#8af0c8">'+(o.pid||'primordial')+
'</span><br>origin: '+(o.ao||'evolved')}

function uE(){var el=document.getElementById('ev');el.innerHTML='';
var rc=evts.slice(-6),ic={genesis:'\u{1F331}',boom:'\u{1F4A5}',extinction:'\u{1F480}',speciation:'\u{1F9EC}',milestone:'\u2B50'};
for(var i=0;i<rc.length;i++){var ev=rc[i],d=document.createElement('div');d.className='el';
d.textContent=(ic[ev.type]||'\u25C6')+' tick '+ev.tick+': '+ev.message;el.appendChild(d)}}

cv.addEventListener('mousemove',function(e){ms.x=e.clientX;ms.y=e.clientY;
var w=s2w(e.clientX,e.clientY);var cl=null,cd=25/cam.z;
for(var i=0;i<orgs.length;i++){var o=orgs[i];if(!o.al)continue;
var dx=o.dx-w.x,dy=o.dy-w.y,d=Math.sqrt(dx*dx+dy*dy);if(d<cd){cl=o;cd=d}}
hov=cl;cv.style.cursor=cl?'pointer':'crosshair'});
cv.addEventListener('click',function(){if(hov)trk=(trk&&trk.id===hov.id)?null:hov;else trk=null});
cv.addEventListener('wheel',function(e){e.preventDefault();var f=e.deltaY>0?0.92:1.08;
cam.z=Math.max(0.12,Math.min(6,cam.z*f));var wb=s2w(e.clientX,e.clientY);
cam.x+=(wb.x-cam.x)*(1-1/f)*0.3;cam.y+=(wb.y-cam.y)*(1-1/f)*0.3},{passive:false});

var dr=false,ds={x:0,y:0};
cv.addEventListener('mousedown',function(e){if(e.button===0&&!hov){dr=true;ds={x:e.clientX,y:e.clientY}}});
cv.addEventListener('mousemove',function(e){if(dr){cam.x-=(e.clientX-ds.x)/cam.z;cam.y-=(e.clientY-ds.y)/cam.z;ds={x:e.clientX,y:e.clientY}}});
addEventListener('mouseup',function(){dr=false});

var lt2=null,ltd=0;
cv.addEventListener('touchstart',function(e){if(e.touches.length===1)lt2={x:e.touches[0].clientX,y:e.touches[0].clientY};
else if(e.touches.length===2){var dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY;ltd=Math.sqrt(dx*dx+dy*dy)}},{passive:true});
cv.addEventListener('touchmove',function(e){e.preventDefault();
if(e.touches.length===1&&lt2){cam.x-=(e.touches[0].clientX-lt2.x)/cam.z;cam.y-=(e.touches[0].clientY-lt2.y)/cam.z;lt2={x:e.touches[0].clientX,y:e.touches[0].clientY}}
else if(e.touches.length===2){var dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY,d=Math.sqrt(dx*dx+dy*dy);
if(ltd>0)cam.z=Math.max(0.12,Math.min(6,cam.z*(d/ltd)));ltd=d}},{passive:false});
cv.addEventListener('touchend',function(){lt2=null;ltd=0});

var lt=0;
function render(t){requestAnimationFrame(render);var dt=Math.min((t-lt)/1000,0.05);lt=t;fc++;
ctx.fillStyle='#050510';ctx.fillRect(0,0,W,H);if(!orgs.length)return;sim(dt);
if(trk){if(trk.al){cam.x+=(trk.dx-cam.x)*0.03;cam.y+=(trk.dy-cam.y)*0.03}else trk=null}
dSt();dNu();dCo();dOr();dVi();
if(fc%30===0){uH();uT()}else if(hov)uT();
if(fc%60===0)dGr()}

ld().then(function(){
setTimeout(function(){document.getElementById('ld').classList.add('hidden')},800);
setTimeout(function(){document.getElementById('hud').classList.add('visible');
document.getElementById('graph').classList.add('visible');
document.getElementById('ev').classList.add('visible');
document.getElementById('hp').classList.add('visible');
document.getElementById('nv').classList.add('visible');
uE();uH();dGr()},2000);
requestAnimationFrame(render);
setInterval(function(){fetch('world.json?t='+Date.now()).then(function(r){if(!r.ok)throw 0;return r.json()}).then(function(nw){
if(nw.tick<=lrt)return;lrt=nw.tick;tk=nw.tick;spc=nw.species||{};hist=nw.history||{};
