<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>The Abyss — A Living Digital Ecosystem</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#020208;overflow:hidden;font-family:'Courier New',monospace;color:#b0c4de}
canvas{display:block}
#hud{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10}
.hud-box{position:absolute;padding:8px 12px;background:rgba(2,2,8,0.7);border:1px solid rgba(100,140,200,0.15);border-radius:6px;font-size:12px;line-height:1.6}
#stats-left{top:12px;left:12px}
#stats-right{top:12px;right:12px;text-align:right}
#epoch-bar{bottom:12px;left:50%;transform:translateX(-50%);font-size:16px;letter-spacing:4px;text-transform:uppercase;color:rgba(100,180,255,0.6)}
#sparkline-box{bottom:50px;left:50%;transform:translateX(-50%);width:320px;height:60px}
#sparkline-box canvas{width:100%;height:100%}
#events-feed{top:80px;right:12px;max-height:400px;overflow:hidden;width:220px;font-size:10px;line-height:1.5}
.event-line{opacity:0.7;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.event-birth{color:#4f8}
.event-death{color:#f64}
.event-speciation{color:#c8f}
.event-genesis{color:#8df}
#species-legend{top:80px;left:12px;max-height:400px;overflow:hidden;font-size:10px;width:140px}
.sp-entry{display:flex;align-items:center;gap:6px;margin:2px 0}
.sp-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
#title-screen{position:fixed;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;background:#020208;transition:opacity 1.5s}
#title-screen h1{font-size:64px;letter-spacing:20px;color:rgba(80,160,255,0.9);text-shadow:0 0 40px rgba(80,160,255,0.4)}
#title-screen p{margin-top:16px;font-size:16px;letter-spacing:6px;color:rgba(150,180,220,0.6)}
#tooltip{position:fixed;padding:6px 10px;background:rgba(2,2,8,0.9);border:1px solid rgba(100,160,255,0.3);border-radius:4px;font-size:11px;pointer-events:none;z-index:20;display:none;line-height:1.5}
</style>
</head>
<body>
<div id="title-screen"><h1>THE ABYSS</h1><p>A Living Digital Ecosystem</p></div>
<canvas id="c"></canvas>
<div id="hud">
  <div class="hud-box" id="stats-left"></div>
  <div class="hud-box" id="stats-right"></div>
  <div class="hud-box" id="epoch-bar"></div>
  <div class="hud-box" id="sparkline-box"><canvas id="spark"></canvas></div>
  <div class="hud-box" id="events-feed"></div>
  <div class="hud-box" id="species-legend"></div>
</div>
<div id="tooltip"></div>
<script>
(function(){
"use strict";
var W=1200,H=800,GW=60,GH=40,CW=W/GW,CH=H/GH;
var canvas=document.getElementById("c");
var ctx=canvas.getContext("2d");
var sparkCanvas=document.getElementById("spark");
var sctx=sparkCanvas.getContext("2d");
var world=null,paused=false,mouseX=0,mouseY=0,hoverOrg=null;
var motes=[],deathParticles=[],birthPulses=[];
var lastReload=0,RELOAD_MS=120000;

function resize(){canvas.width=window.innerWidth;canvas.height=window.innerHeight;sparkCanvas.width=320;sparkCanvas.height=60;}
window.addEventListener("resize",resize);resize();

setTimeout(function(){var ts=document.getElementById("title-screen");ts.style.opacity="0";setTimeout(function(){ts.style.display="none";},1600);},2000);

var mi;
for(mi=0;mi<80;mi++){motes.push({x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-0.5)*0.2,vy:(Math.random()-0.5)*0.15,r:Math.random()*1.5+0.5,a:Math.random()*0.3+0.1});}

function bootstrap(n){
  var orgs=[],i,j,g,nuts=[];
  for(i=0;i<n;i++){
    g=[];for(j=0;j<16;j++)g.push(Math.random());
    orgs.push({id:"org-0-"+Math.random().toString(36).slice(2,8),name:"",x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-0.5)*2,vy:(Math.random()-0.5)*2,energy:50+g[2]*30,genome:g,age:0,generation:0,species_id:"sp-"+Math.floor(Math.random()*5+1),born_tick:0,parent_id:""});
  }
  for(i=0;i<GW*GH;i++)nuts.push(Math.random()*0.5+0.2);
  return{_meta:{world_width:W,world_height:H,nutrient_grid_w:GW,nutrient_grid_h:GH,epoch:"Primordial Soup"},tick:0,organisms:orgs,nutrients:nuts,species:{},history:{population:[n],species_count:[5],avg_energy:[50]},events:[{tick:0,type:"genesis",message:"Client-side bootstrap"}]};
}

function loadWorld(){
  return fetch("world.json?t="+Date.now()).then(function(r){
    if(!r.ok)throw new Error(r.status);
    return r.json();
  }).then(function(d){
    if(d.organisms&&d.organisms.length>0){world=d;}
    else if(!world){world=bootstrap(60);}
  }).catch(function(e){
    console.warn("world.json load failed, bootstrapping",e);
    if(!world)world=bootstrap(60);
  });
}

function simStep(){
  if(!world||paused)return;
  var orgs=world.organisms;
  var grid=world.nutrients;
  var newOrgs=[];
  var deadSet={};
  var oi,org,g,speed,aggr,coop,sense,sz,gx,gy,bv,bdx,bdy,dy,dx,nx,ny,v,m;
  var fx,fy,cnt,oj,o,dd,sr,closest,cd,vmag,egx,egy,idx,eaten,rt,cg,mr,gi,child;

  for(oi=0;oi<orgs.length;oi++){
    org=orgs[oi];
    if(deadSet[org.id])continue;
    g=org.genome;
    speed=0.5+g[3]*3;
    aggr=g[9];
    coop=g[10];
    sense=20+g[11]*120;
    sz=3+g[2]*12;

    // nutrient steering
    gx=Math.floor(Math.max(0,Math.min(GW-1,org.x/CW)));
    gy=Math.floor(Math.max(0,Math.min(GH-1,org.y/CH)));
    bv=-1;bdx=0;bdy=0;
    for(dy=-2;dy<=2;dy++)for(dx=-2;dx<=2;dx++){
      nx=gx+dx;ny=gy+dy;
      if(nx>=0&&nx<GW&&ny>=0&&ny<GH){v=grid[ny*GW+nx];if(v>bv){bv=v;bdx=dx*CW;bdy=dy*CH;}}
    }
    if(bv>0){m=Math.sqrt(bdx*bdx+bdy*bdy)+1e-6;org.vx+=(bdx/m)*0.3;org.vy+=(bdy/m)*0.3;}

    // flocking
    if(coop>0.5){
      fx=0;fy=0;cnt=0;
      for(oj=0;oj<orgs.length;oj++){
        o=orgs[oj];if(o.id===org.id||deadSet[o.id])continue;
        if(o.species_id===org.species_id){
          dd=Math.sqrt((org.x-o.x)*(org.x-o.x)+(org.y-o.y)*(org.y-o.y));
          sr=30+g[4]*80;
          if(dd<sr&&dd>1){fx+=(o.x-org.x)/dd;fy+=(o.y-org.y)/dd;cnt++;}
        }
      }
      if(cnt>0){org.vx+=fx/cnt*0.15*coop;org.vy+=fy/cnt*0.15*coop;}
    }

    // flee predators
    for(oj=0;oj<orgs.length;oj++){
      o=orgs[oj];if(o.id===org.id||deadSet[o.id])continue;
      if(o.genome[9]>0.6&&o.genome[2]>g[2]){
        dd=Math.sqrt((org.x-o.x)*(org.x-o.x)+(org.y-o.y)*(org.y-o.y));
        if(dd>0&&dd<sense*0.6){org.vx-=(o.x-org.x)/dd*0.5;org.vy-=(o.y-org.y)/dd*0.5;}
      }
    }

    // hunting
    if(aggr>0.5){
      closest=null;cd=sense;
      for(oj=0;oj<orgs.length;oj++){
        o=orgs[oj];if(o.id===org.id||deadSet[o.id])continue;
        if(o.species_id!==org.species_id&&o.genome[2]<g[2]){
          dd=Math.sqrt((org.x-o.x)*(org.x-o.x)+(org.y-o.y)*(org.y-o.y));
          if(dd<cd){cd=dd;closest=o;}
        }
      }
      if(closest){
        dd=cd+1e-6;
        org.vx+=(closest.x-org.x)/dd*0.4*aggr;
        org.vy+=(closest.y-org.y)/dd*0.4*aggr;
        if(cd<sz+3){org.energy+=closest.energy*0.6;deadSet[closest.id]=true;spawnDeath(closest.x,closest.y);}
      }
    }

    // velocity cap + move
    vmag=Math.sqrt(org.vx*org.vx+org.vy*org.vy)+1e-6;
    if(vmag>speed){org.vx=org.vx/vmag*speed;org.vy=org.vy/vmag*speed;}
    org.x+=org.vx;org.y+=org.vy;
    if(org.x<0)org.x+=W;if(org.x>=W)org.x-=W;
    if(org.y<0)org.y+=H;if(org.y>=H)org.y-=H;

    // eat nutrients
    egx=Math.floor(Math.max(0,Math.min(GW-1,org.x/CW)));
    egy=Math.floor(Math.max(0,Math.min(GH-1,org.y/CH)));
    idx=egy*GW+egx;
    eaten=Math.min(grid[idx],0.15+g[6]*0.15);
    grid[idx]-=eaten;org.energy+=eaten*30;
    org.energy-=(0.1+g[6]*0.5)+(speed*0.05)+(sz*0.01);
    org.age++;

    // death
    if(org.energy<=0){deadSet[org.id]=true;spawnDeath(org.x,org.y);continue;}

    // reproduction
    rt=60+g[7]*80;
    if(org.energy>rt&&orgs.length+newOrgs.length<400){
      cg=g.slice();mr=g[8]*0.15;
      for(gi=0;gi<16;gi++){if(Math.random()<mr)cg[gi]=Math.max(0,Math.min(1,cg[gi]+(Math.random()-0.5)*0.2));}
      child={id:"org-c-"+Math.random().toString(36).slice(2,8),name:"",x:org.x+(Math.random()-0.5)*30,y:org.y+(Math.random()-0.5)*30,vx:(Math.random()-0.5)*2,vy:(Math.random()-0.5)*2,energy:(30+g[2]*20)*0.8,genome:cg,age:0,generation:org.generation+1,species_id:org.species_id,born_tick:world.tick,parent_id:org.id};
      org.energy-=30+g[2]*20;
      newOrgs.push(child);spawnBirth(child.x,child.y);
    }
  }

  var survivors=[],i;
  for(i=0;i<orgs.length;i++){if(!deadSet[orgs[i].id])survivors.push(orgs[i]);}
  for(i=0;i<newOrgs.length;i++)survivors.push(newOrgs[i]);
  world.organisms=survivors;

  // nutrient regrow
  var season=0.5+0.3*Math.sin(world.tick*0.02);
  for(i=0;i<grid.length;i++)grid[i]=Math.min(1,grid[i]+0.005*season+Math.random()*0.002);
}

function spawnDeath(x,y){
  var n=15+Math.floor(Math.random()*11),i,a,sp;
  for(i=0;i<n;i++){a=Math.random()*Math.PI*2;sp=Math.random()*3+1;deathParticles.push({x:x,y:y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:1});}
}
function spawnBirth(x,y){birthPulses.push({x:x,y:y,r:0,maxR:40+Math.random()*20,life:1});}

function hsl(h,s,l,a){return"hsla("+Math.round(h*360)+","+Math.round(s*100)+"%,"+Math.round(l*100)+"%,"+a+")";}

function render(){
  var cw=canvas.width,ch=canvas.height;
  var sx=cw/W,sy=ch/H,sc=Math.min(sx,sy);
  var ox=(cw-W*sc)/2,oy=(ch-H*sc)/2;

  // motion trail overlay
  ctx.fillStyle="rgba(2,2,8,0.15)";
  ctx.fillRect(0,0,cw,ch);
  ctx.save();ctx.translate(ox,oy);ctx.scale(sc,sc);

  if(!world){ctx.restore();return;}

  // nutrient grid
  var grid=world.nutrients;
  var gxi,gyi,nv;
  if(grid){
    for(gyi=0;gyi<GH;gyi++)for(gxi=0;gxi<GW;gxi++){
      nv=grid[gyi*GW+gxi];
      if(nv>0.1){ctx.fillStyle="rgba(30,200,80,"+nv*0.08+")";ctx.fillRect(gxi*CW,gyi*CH,CW,CH);}
    }
  }

  // additive blending for glow
  ctx.globalCompositeOperation="lighter";
  var orgs=world.organisms||[];
  var i,j,a,b,dd,sr,alpha;

  // cooperative connections
  for(i=0;i<orgs.length;i++){
    a=orgs[i];
    if(a.genome[10]<0.5)continue;
    for(j=i+1;j<orgs.length;j++){
      b=orgs[j];
      if(b.species_id!==a.species_id||b.genome[10]<0.5)continue;
      dd=Math.sqrt((a.x-b.x)*(a.x-b.x)+(a.y-b.y)*(a.y-b.y));
      sr=30+a.genome[4]*80;
      if(dd<sr){
        alpha=0.05*(1-dd/sr);
        ctx.strokeStyle=hsl(a.genome[0],0.5,0.4,alpha);
        ctx.lineWidth=0.5;
        ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke();
      }
    }
  }

  // organisms
  var org,g,sz,bio,h,s,l,glowR,grad;
  for(i=0;i<orgs.length;i++){
    org=orgs[i];g=org.genome;
    sz=3+g[2]*12;bio=g[14];
    h=g[0];s=0.5+g[1]*0.5;l=0.3+bio*0.4;

    // outer glow
    glowR=sz*(1.5+bio*2);
    grad=ctx.createRadialGradient(org.x,org.y,0,org.x,org.y,glowR);
    grad.addColorStop(0,hsl(h,s,l,0.3+bio*0.3));
    grad.addColorStop(1,hsl(h,s,l,0));
    ctx.fillStyle=grad;
    ctx.beginPath();ctx.arc(org.x,org.y,glowR,0,Math.PI*2);ctx.fill();

    // core circle
    ctx.fillStyle=hsl(h,s,l,0.8);
    ctx.beginPath();ctx.arc(org.x,org.y,sz,0,Math.PI*2);ctx.fill();

    // bright center
    ctx.fillStyle="rgba(255,255,255,"+(0.4+bio*0.4)+")";
    ctx.beginPath();ctx.arc(org.x,org.y,sz*0.3,0,Math.PI*2);ctx.fill();
  }

  // ambient motes
  var mt;
  for(i=0;i<motes.length;i++){
    mt=motes[i];mt.x+=mt.vx;mt.y+=mt.vy;
    if(mt.x<0)mt.x+=W;if(mt.x>=W)mt.x-=W;if(mt.y<0)mt.y+=H;if(mt.y>=H)mt.y-=H;
    ctx.fillStyle="rgba(120,180,255,"+mt.a+")";
    ctx.beginPath();ctx.arc(mt.x,mt.y,mt.r,0,Math.PI*2);ctx.fill();
  }

  // death particles
  var p;
  for(i=deathParticles.length-1;i>=0;i--){
    p=deathParticles[i];p.x+=p.vx;p.y+=p.vy;p.life-=0.03;
    if(p.life<=0){deathParticles.splice(i,1);continue;}
    ctx.fillStyle="rgba(255,100,60,"+p.life*0.7+")";
    ctx.beginPath();ctx.arc(p.x,p.y,1.5,0,Math.PI*2);ctx.fill();
  }

  // birth pulses
  var sa;
  for(i=birthPulses.length-1;i>=0;i--){
    p=birthPulses[i];p.r+=2;p.life-=0.04;
    if(p.life<=0){birthPulses.splice(i,1);continue;}
    ctx.strokeStyle="rgba(100,255,200,"+p.life*0.5+")";
    ctx.lineWidth=1.5;
    ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.stroke();
    for(j=0;j<3;j++){
      sa=Math.random()*Math.PI*2;
      ctx.fillStyle="rgba(150,255,220,"+p.life*0.4+")";
      ctx.beginPath();ctx.arc(p.x+Math.cos(sa)*p.r,p.y+Math.sin(sa)*p.r,1,0,Math.PI*2);ctx.fill();
    }
  }

  ctx.globalCompositeOperation="source-over";
  ctx.restore();
  updateTooltip(sc,ox,oy);
}

function updateTooltip(sc,ox,oy){
  var tip=document.getElementById("tooltip");
  if(!world||!world.organisms){tip.style.display="none";return;}
  var wx=(mouseX-ox)/sc,wy=(mouseY-oy)/sc;
  var i,org,dd,g;
  hoverOrg=null;
  for(i=0;i<world.organisms.length;i++){
    org=world.organisms[i];
    dd=Math.sqrt((org.x-wx)*(org.x-wx)+(org.y-wy)*(org.y-wy));
    if(dd<15){hoverOrg=org;break;}
  }
  if(hoverOrg){
    g=hoverOrg.genome;
    tip.style.display="block";
    tip.style.left=(mouseX+15)+"px";
    tip.style.top=(mouseY+15)+"px";
    tip.innerHTML="<b>"+hoverOrg.id+"</b><br>"
      +"Species: "+hoverOrg.species_id+"<br>"
      +"Energy: "+Math.round(hoverOrg.energy)+"<br>"
      +"Age: "+hoverOrg.age+" | Gen: "+hoverOrg.generation+"<br>"
      +"Size: "+g[2].toFixed(2)+" Speed: "+g[3].toFixed(2)+"<br>"
      +"Aggr: "+g[9].toFixed(2)+" Coop: "+g[10].toFixed(2)+"<br>"
      +"Bio: "+g[14].toFixed(2)+" Membrane: "+g[15].toFixed(2);
  }else{tip.style.display="none";}
}

function updateHUD(){
  if(!world)return;
  var orgs=world.organisms||[];
  var sp=world.species||{};
  var hist=world.history||{population:[],species_count:[],avg_energy:[]};
  var maxGen=0,avgE=0,i;
  for(i=0;i<orgs.length;i++){if(orgs[i].generation>maxGen)maxGen=orgs[i].generation;}
  if(orgs.length){for(i=0;i<orgs.length;i++)avgE+=orgs[i].energy;avgE/=orgs.length;}
  var spKeys=Object.keys(sp);

  document.getElementById("stats-left").innerHTML="Generation: <b>"+world.tick+"</b><br>Population: <b>"+orgs.length+"</b>";
  document.getElementById("stats-right").innerHTML="Species: <b>"+spKeys.length+"</b><br>Avg Energy: <b>"+Math.round(avgE)+"</b><br>Max Gen: <b>"+maxGen+"</b>";
  document.getElementById("epoch-bar").textContent=(world._meta&&world._meta.epoch)||"";

  // event feed
  var events=(world.events||[]).slice(-20).reverse();
  var ehtml="",ev,cls;
  for(i=0;i<events.length;i++){
    ev=events[i];cls="event-"+(ev.type||"genesis");
    ehtml+='<div class="event-line '+cls+'">'+ev.tick+": "+ev.message+"</div>";
  }
  document.getElementById("events-feed").innerHTML=ehtml;

  // species legend
  var lhtml="",showKeys=spKeys.slice(0,20),sid,members,sample,color,ki;
  for(ki=0;ki<showKeys.length;ki++){
    sid=showKeys[ki];members=sp[sid]||[];
    sample=null;
    for(i=0;i<orgs.length;i++){if(orgs[i].id===members[0]){sample=orgs[i];break;}}
    color=sample?hsl(sample.genome[0],0.5+sample.genome[1]*0.5,0.5,1):"#888";
    lhtml+='<div class="sp-entry"><div class="sp-dot" style="background:'+color+'"></div>'+sid+" ("+members.length+")</div>";
  }
  document.getElementById("species-legend").innerHTML=lhtml;

  drawSparkline(hist);
}

function drawSparkline(hist){
  var sw=320,sh=60;
  sctx.clearRect(0,0,sw,sh);
  var pop=hist.population||[];
  var spc=hist.species_count||[];
  if(pop.length<2)return;
  var maxP=1,maxS=1,i,x,y;
  for(i=0;i<pop.length;i++){if(pop[i]>maxP)maxP=pop[i];}
  for(i=0;i<spc.length;i++){if(spc[i]>maxS)maxS=spc[i];}

  // population line (green)
  sctx.strokeStyle="rgba(80,255,120,0.7)";sctx.lineWidth=1.5;
  sctx.beginPath();
  for(i=0;i<pop.length;i++){x=i/(pop.length-1)*sw;y=sh-pop[i]/maxP*(sh-4)-2;if(i===0)sctx.moveTo(x,y);else sctx.lineTo(x,y);}
  sctx.stroke();

  // species line (purple)
  sctx.strokeStyle="rgba(180,100,255,0.7)";
  sctx.beginPath();
  for(i=0;i<spc.length;i++){x=i/(spc.length-1)*sw;y=sh-spc[i]/maxS*(sh-4)-2;if(i===0)sctx.moveTo(x,y);else sctx.lineTo(x,y);}
  sctx.stroke();
}

// click to spawn nutrient burst
canvas.addEventListener("click",function(e){
  if(!world||!world.nutrients)return;
  var rect=canvas.getBoundingClientRect();
  var cw=canvas.width,ch=canvas.height;
  var sc=Math.min(cw/W,ch/H);
  var ox=(cw-W*sc)/2,oy=(ch-H*sc)/2;
  var wx=(e.clientX-rect.left-ox)/sc;
  var wy=(e.clientY-rect.top-oy)/sc;
  var gx=Math.floor(wx/CW),gy=Math.floor(wy/CH);
  var dy,dx,nx,ny;
  for(dy=-2;dy<=2;dy++)for(dx=-2;dx<=2;dx++){
    nx=gx+dx;ny=gy+dy;
    if(nx>=0&&nx<GW&&ny>=0&&ny<GH){world.nutrients[ny*GW+nx]=Math.min(1,world.nutrients[ny*GW+nx]+0.3);}
  }
  spawnBirth(wx,wy);
});

canvas.addEventListener("mousemove",function(e){mouseX=e.clientX;mouseY=e.clientY;});
document.addEventListener("keydown",function(e){if(e.code==="Space"){e.preventDefault();paused=!paused;}});

// main loop
var simTick=0;
function loop(){
  requestAnimationFrame(loop);
  if(simTick%2===0)simStep();
  render();
  if(simTick%60===0)updateHUD();
  simTick++;
  if(Date.now()-lastReload>RELOAD_MS){lastReload=Date.now();loadWorld();}
}

loadWorld().then(function(){lastReload=Date.now();updateHUD();loop();});

})();
</script>
</body>
</html>
