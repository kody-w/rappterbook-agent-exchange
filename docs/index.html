<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Musca domestica &mdash; A Fly's Life</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#1a1410}
body{font-family:'SF Mono','Fira Code','Cascadia Code','Courier New',monospace;color:#c8a878}
canvas{position:fixed;top:0;left:0;display:block}
#bg{z-index:0}#scene{z-index:1}#fx{z-index:2}
#hud{position:fixed;top:0;left:0;width:100%;height:100%;z-index:10;pointer-events:none}
.p{position:absolute;padding:10px 14px;background:rgba(25,18,10,0.88);border:1px solid rgba(180,140,60,0.12);border-radius:8px;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);font-size:11px;line-height:1.7;pointer-events:auto}
#tb{top:12px;left:50%;transform:translateX(-50%);text-align:center;font-size:14px;letter-spacing:3px;color:rgba(200,168,100,0.6);text-transform:uppercase}
#tb small{display:block;font-size:9px;letter-spacing:2px;color:rgba(200,168,100,0.3);margin-top:2px}
#tb a{color:rgba(200,168,100,0.3);text-decoration:none;font-size:9px;letter-spacing:1px}
#tb a:hover{color:rgba(200,168,100,0.7)}
.ns{margin:0 6px;opacity:0.3}
#vi{top:12px;left:12px;min-width:200px}
#gp{top:340px;left:12px;min-width:200px;max-height:260px;overflow:hidden}
#sp{top:12px;right:12px;min-width:210px}
#bp{top:250px;right:12px;min-width:210px}
#mp{bottom:140px;right:12px;min-width:210px;max-height:180px;overflow:hidden}
#ap{bottom:140px;left:12px;min-width:200px;max-height:200px;overflow:hidden;font-size:10px}
#tl{bottom:12px;left:12px;right:12px;height:110px;text-align:center}
#nr{bottom:130px;left:50%;transform:translateX(-50%);text-align:center;max-width:500px;font-size:12px;letter-spacing:0.5px;color:rgba(200,168,100,0.4);font-style:italic;text-shadow:0 0 20px rgba(180,140,60,0.1)}
h3{font-size:10px;color:rgba(180,140,70,0.5);margin-bottom:4px;letter-spacing:1.5px;font-weight:normal;text-transform:uppercase}
.v{color:rgba(220,180,100,0.85)}.d{color:rgba(140,110,60,0.4)}.w{color:#e06040}
.gr{display:flex;align-items:center;margin:2px 0}
.gn{width:80px;color:rgba(160,130,70,0.5);font-size:8px;text-transform:capitalize}
.gb{flex:1;height:4px;background:rgba(255,255,255,0.03);border-radius:2px;overflow:hidden}
.gf{height:100%;border-radius:2px;transition:width .6s}
.gv{width:28px;text-align:right;font-size:8px;color:rgba(160,130,70,0.4)}
.st{display:inline-block;padding:2px 8px;border-radius:10px;font-size:9px;letter-spacing:1px;text-transform:uppercase}
.st-egg{background:rgba(255,250,240,0.1);color:#f0e8d0}
.st-larva{background:rgba(180,200,60,0.1);color:#b0c840}
.st-pupa{background:rgba(120,80,40,0.15);color:#a07030}
.st-adult{background:rgba(60,60,60,0.15);color:#a0a0a0}
.st-death{background:rgba(100,30,30,0.15);color:#c04040}
.mt{height:6px;background:rgba(255,255,255,0.04);border-radius:3px;overflow:hidden;margin:3px 0}
.mf{height:100%;border-radius:3px;transition:width .6s}
.gen-tag{display:inline-block;padding:1px 6px;border-radius:6px;font-size:8px;margin-right:4px;letter-spacing:0.5px}
.ancestor-row{padding:3px 0;border-bottom:1px solid rgba(180,140,60,0.06)}
.ancestor-row:last-child{border-bottom:none}
@keyframes pulse{0%,100%{opacity:0.6}50%{opacity:1}}
.alive-pulse{animation:pulse 2s ease infinite}
@keyframes egg-glow{0%,100%{box-shadow:0 0 8px rgba(255,240,200,0.1)}50%{box-shadow:0 0 20px rgba(255,240,200,0.3)}}
</style>
</head>
<body>
<canvas id="bg"></canvas><canvas id="scene"></canvas><canvas id="fx"></canvas>
<div id="hud">
  <div class="p" id="tb">Musca Domestica<small>a fly's life in the kitchen</small>
    <div style="margin-top:6px">
      <a href="deep.html">deep</a><span class="ns">&middot;</span>

      <a href="kitchen.html">kitchen (legacy)</a><span class="ns">&middot;</span>
      <a href="mars/">mars barn</a>
    </div>
  </div>
  <div class="p" id="vi"></div>
  <div class="p" id="gp"></div>
  <div class="p" id="sp"></div>
  <div class="p" id="bp"></div>
  <div class="p" id="mp"></div>
  <div class="p" id="ap"></div>
  <div class="p" id="tl"></div>
  <div id="nr"></div>
</div>
<script>
"use strict";
var bgC=document.getElementById("bg"),bgX=bgC.getContext("2d"),
    scC=document.getElementById("scene"),scX=scC.getContext("2d"),
    fxC=document.getElementById("fx"),fxX=fxC.getContext("2d");

function resize(){bgC.width=scC.width=fxC.width=innerWidth;bgC.height=scC.height=fxC.height=innerHeight}
resize();addEventListener("resize",resize);

var S=null,t=0,dust=[],particles=[];
var KW=640,KH=360;

function kx(x){return x/KW*innerWidth}
function ky(y){return 0.25*innerHeight+y/KH*0.75*innerHeight}
function ks(s){return s/KW*innerWidth}
function hsla(h,s,l,a){return"hsla("+h+","+s+"%,"+l+"%,"+a+")"}

for(var i=0;i<100;i++)dust.push({x:Math.random()*KW,y:Math.random()*KH,
  vx:(Math.random()-.5)*.08,vy:.02+Math.random()*.04,
  r:.3+Math.random()*.6,a:.012+Math.random()*.03,ph:Math.random()*6.28});

function loadState(){
  return fetch("fly_state.json?t="+Date.now())
    .then(function(r){return r.json()})
    .then(function(d){S=d;KW=d.kitchen.width;KH=d.kitchen.height})
    .catch(function(e){console.error("Load:",e)})
}

function drawBG(ctx){
  var w=innerWidth,h=innerHeight,cy=0.25*h;
  var isDay=S&&S.kitchen.lights_on;
  var wg=ctx.createLinearGradient(0,0,0,cy);
  if(isDay){wg.addColorStop(0,"#f5e8d4");wg.addColorStop(1,"#e0cdb0")}
  else{wg.addColorStop(0,"#2a2218");wg.addColorStop(1,"#1a150e")}
  ctx.fillStyle=wg;ctx.fillRect(0,0,w,cy);

  // Tile pattern
  ctx.strokeStyle=isDay?"rgba(180,160,130,0.08)":"rgba(80,60,40,0.06)";
  ctx.lineWidth=1;
  var ts=ks(40);
  for(var gx=0;gx<w;gx+=ts){ctx.beginPath();ctx.moveTo(gx,cy);ctx.lineTo(gx,h);ctx.stroke()}
  for(var gy=cy;gy<h;gy+=ts){ctx.beginPath();ctx.moveTo(0,gy);ctx.lineTo(w,gy);ctx.stroke()}

  // Counter surface
  var cg=ctx.createLinearGradient(0,cy,0,h);
  if(isDay){cg.addColorStop(0,"#c8b898");cg.addColorStop(0.3,"#b8a888");cg.addColorStop(1,"#a89878")}
  else{cg.addColorStop(0,"#3a3020");cg.addColorStop(0.3,"#2a2418");cg.addColorStop(1,"#1a1810")}
  ctx.fillStyle=cg;ctx.fillRect(0,cy,w,h-cy);

  // Counter edge highlight
  ctx.strokeStyle=isDay?"rgba(220,200,160,0.3)":"rgba(80,60,40,0.2)";
  ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(0,cy);ctx.lineTo(w,cy);ctx.stroke();

  // Window glow
  if(S){
    var wobj=null;
    for(var oi=0;oi<S.kitchen.objects.length;oi++){
      if(S.kitchen.objects[oi].id==="window")wobj=S.kitchen.objects[oi];
    }
    if(wobj&&isDay){
      var wx=kx(wobj.x),wy=0;
      var wgr=ctx.createRadialGradient(wx,wy,0,wx,wy,ks(200));
      wgr.addColorStop(0,"rgba(255,248,220,0.12)");
      wgr.addColorStop(1,"rgba(255,248,220,0)");
      ctx.fillStyle=wgr;ctx.fillRect(0,0,w,h);
    }
  }
}

function drawObj(ctx,obj){
  var x=kx(obj.x),y=ky(obj.y),isDay=S.kitchen.lights_on;
  if(obj.type==="food"){
    var colors={banana:"#e8c840",jam:"#c04060",trash:"#708060",crumbs:"#d0b880",coffee:"#604020",carcass:"#505050"};
    var col=colors[obj.id]||"#a08060";
    var sz=ks(obj.id==="trash"?28:obj.id==="banana"?18:12);
    // Corpse special rendering — shows decay state
    if(obj.id==="carcass"){
      var corpseDecay=obj.decay||0.5;
      col=corpseDecay>0.7?"#3a3830":"#504840";
      // Decay halo — growing smell
      var decaySR=ks(obj.smell_radius||20);
      ctx.beginPath();ctx.arc(x,y,decaySR,0,Math.PI*2);
      ctx.fillStyle="rgba(100,90,60,"+(corpseDecay*0.008)+")";ctx.fill();
      // Bacteria particles
      if(corpseDecay>0.6){
        for(var bi2=0;bi2<3;bi2++){
          var bx=x+(Math.random()-0.5)*sz*2;
          var by=y+(Math.random()-0.5)*sz*2;
          ctx.beginPath();ctx.arc(bx,by,1,0,Math.PI*2);
          ctx.fillStyle="rgba(120,140,80,0.15)";ctx.fill();
        }
      }
    }
    // Smell radius visualization
    var sr=ks(obj.smell_radius*(S.genome.smell_sensitivity||0.9));
    ctx.beginPath();ctx.arc(x,y,sr,0,Math.PI*2);
    ctx.fillStyle="rgba(180,160,100,0.015)";ctx.fill();
    // Food item
    ctx.beginPath();ctx.arc(x,y,sz,0,Math.PI*2);
    ctx.fillStyle=col;ctx.globalAlpha=isDay?0.7:0.4;ctx.fill();ctx.globalAlpha=1;
    // Label
    ctx.fillStyle=isDay?"rgba(80,60,40,0.4)":"rgba(160,140,100,0.25)";
    ctx.font="8px monospace";ctx.textAlign="center";
    ctx.fillText(obj.name,x,y+sz+10);
  }
  if(obj.type==="light"){
    var li=obj.intensity||0.5;
    if(isDay||obj.id==="window"){
      var lg=ctx.createRadialGradient(x,y,0,x,y,ks(60));
      lg.addColorStop(0,"rgba(255,240,180,"+(li*0.15)+")");
      lg.addColorStop(1,"rgba(255,240,180,0)");
      ctx.fillStyle=lg;ctx.beginPath();ctx.arc(x,y,ks(60),0,Math.PI*2);ctx.fill();
    }
    ctx.fillStyle=isDay?"rgba(255,240,180,0.5)":"rgba(255,240,180,0.15)";
    ctx.font="8px monospace";ctx.textAlign="center";
    ctx.fillText(obj.name,x,y+12);
  }
  if(obj.type==="threat"&&obj.active){
    var tc={cat:"#f06040",swatter:"#808080",spider:"#604080"};
    var tcolor=tc[obj.id]||"#f04040";
    var tsz=ks(obj.id==="cat"?20:obj.id==="spider"?10:14);
    // Danger glow
    ctx.beginPath();ctx.arc(x,y,tsz*2.5,0,Math.PI*2);
    ctx.fillStyle="rgba(240,60,40,0.04)";ctx.fill();
    // Threat body
    ctx.beginPath();ctx.arc(x,y,tsz,0,Math.PI*2);
    ctx.fillStyle=tcolor;ctx.globalAlpha=0.6+Math.sin(t*4)*0.2;ctx.fill();ctx.globalAlpha=1;
    // Exclamation
    ctx.fillStyle="#f04040";ctx.font="bold 14px monospace";ctx.textAlign="center";
    ctx.fillText("!",x,y-tsz-4);
    ctx.font="8px monospace";ctx.fillStyle="rgba(240,80,60,0.5)";
    ctx.fillText(obj.name,x,y+tsz+10);
  }
}

function drawFly(ctx){
  if(!S)return;
  var stage=S.lifecycle.stage;
  var x=kx(S.body.position.x),y=ky(S.body.position.y);
  var sz=ks(S.body.size*1.2);
  var isAir=S.body.is_airborne;

  // Shadow
  if(isAir){
    ctx.beginPath();ctx.ellipse(x,y+ks(15),sz*0.8,sz*0.3,0,0,Math.PI*2);
    ctx.fillStyle="rgba(0,0,0,0.1)";ctx.fill();
    y-=ks(S.body.position.z*8);
  }

  if(stage==="egg"){
    // Tiny glowing egg
    var eg=ctx.createRadialGradient(x,y,0,x,y,sz*2);
    eg.addColorStop(0,"rgba(255,252,240,0.8)");
    eg.addColorStop(0.5,"rgba(240,230,200,0.4)");
    eg.addColorStop(1,"rgba(240,230,200,0)");
    ctx.fillStyle=eg;ctx.beginPath();ctx.arc(x,y,sz*2,0,Math.PI*2);ctx.fill();
    // Egg shape
    ctx.beginPath();ctx.ellipse(x,y,sz*0.6,sz*0.9,0,0,Math.PI*2);
    ctx.fillStyle="#faf5e8";ctx.fill();
    ctx.strokeStyle="rgba(200,180,140,0.3)";ctx.lineWidth=0.5;ctx.stroke();
    // Inner glow pulse
    var pulse=0.3+Math.sin(t*3)*0.15;
    ctx.beginPath();ctx.ellipse(x,y,sz*0.3,sz*0.5,0,0,Math.PI*2);
    ctx.fillStyle="rgba(255,240,200,"+pulse+")";ctx.fill();
    return;
  }

  if(stage==="larva"){
    // Segmented larva body
    var segs=5+Math.floor(S.body.size/2);
    var segSz=sz*0.35;
    var facing=S.body.facing||0;
    for(var si=segs;si>=0;si--){
      var sx=x-Math.cos(facing+Math.sin(t*6+si*0.5)*0.3)*si*segSz*0.6;
      var sy=y-Math.sin(facing+Math.sin(t*6+si*0.5)*0.3)*si*segSz*0.6;
      var sc=si===0?segSz*1.1:segSz*(1-si*0.04);
      var lum=50+si*3;
      ctx.beginPath();ctx.arc(sx,sy,sc,0,Math.PI*2);
      ctx.fillStyle="hsla(80,40%,"+lum+"%,0.7)";ctx.fill();
    }
    // Tiny eyes on head
    ctx.beginPath();ctx.arc(x+segSz*0.3,y-segSz*0.2,1.5,0,Math.PI*2);
    ctx.arc(x-segSz*0.3,y-segSz*0.2,1.5,0,Math.PI*2);
    ctx.fillStyle="rgba(40,30,20,0.6)";ctx.fill();
    return;
  }

  if(stage==="pupa"){
    // Dark puparium
    var prog=S.lifecycle.stage_tick/Math.max(S.lifecycle.stage_durations.pupa,1);
    var pg=ctx.createRadialGradient(x,y,0,x,y,sz*2);
    pg.addColorStop(0,"rgba(100,70,40,"+(0.4+prog*0.3)+")");
    pg.addColorStop(1,"rgba(80,50,30,0)");
    ctx.fillStyle=pg;ctx.beginPath();ctx.arc(x,y,sz*2,0,Math.PI*2);ctx.fill();
    // Puparium shape
    ctx.beginPath();ctx.ellipse(x,y,sz*0.8,sz*1.2,0,0,Math.PI*2);
    var pc=Math.floor(40+prog*20);
    ctx.fillStyle="rgb("+pc+","+(pc-10)+","+(pc-20)+")";ctx.fill();
    ctx.strokeStyle="rgba(60,40,20,0.3)";ctx.lineWidth=1;ctx.stroke();
    // Internal metamorphosis glow
    if(prog>0.5){
      var mg=ctx.createRadialGradient(x,y-sz*0.2,0,x,y,sz*0.8);
      mg.addColorStop(0,"rgba(180,160,120,"+(prog-0.5)*0.4+")");
      mg.addColorStop(1,"rgba(180,160,120,0)");
      ctx.fillStyle=mg;ctx.beginPath();ctx.arc(x,y,sz*0.8,0,Math.PI*2);ctx.fill();
    }
    // Segmentation lines
    for(var pi=0;pi<4;pi++){
      var py2=y-sz*0.8+pi*sz*0.5;
      ctx.beginPath();ctx.moveTo(x-sz*0.6,py2);ctx.lineTo(x+sz*0.6,py2);
      ctx.strokeStyle="rgba(40,25,15,0.15)";ctx.lineWidth=0.5;ctx.stroke();
    }
    return;
  }

  if(stage==="death"){
    // Dead fly on its back
    ctx.save();ctx.translate(x,y);ctx.rotate(Math.PI);
    // Wings spread
    ctx.beginPath();ctx.ellipse(-sz*0.8,-sz*0.3,sz*1.2,sz*0.4,0.3,0,Math.PI*2);
    ctx.fillStyle="rgba(180,180,180,0.08)";ctx.fill();
    ctx.beginPath();ctx.ellipse(sz*0.8,-sz*0.3,sz*1.2,sz*0.4,-0.3,0,Math.PI*2);
    ctx.fillStyle="rgba(180,180,180,0.08)";ctx.fill();
    // Body
    ctx.beginPath();ctx.ellipse(0,0,sz*0.5,sz*0.7,0,0,Math.PI*2);
    ctx.fillStyle="rgba(50,45,40,0.5)";ctx.fill();
    // Legs curled up
    for(var li=0;li<6;li++){
      var la=li*Math.PI/3+Math.PI/6;
      ctx.beginPath();
      ctx.moveTo(Math.cos(la)*sz*0.4,Math.sin(la)*sz*0.5);
      ctx.lineTo(Math.cos(la)*sz*1.2,Math.sin(la)*sz*1.0);
      ctx.strokeStyle="rgba(50,40,30,0.3)";ctx.lineWidth=0.5;ctx.stroke();
    }
    ctx.restore();
    // X marks
    ctx.fillStyle="rgba(180,40,40,0.3)";ctx.font="bold "+Math.floor(sz*1.5)+"px monospace";
    ctx.textAlign="center";ctx.fillText("x",x-sz*0.3,y-sz*0.2);ctx.fillText("x",x+sz*0.3,y-sz*0.2);
    return;
  }

  // ADULT FLY - the beautiful one
  var facing2=S.body.facing||0;

  // Flight trail
  if(isAir){
    for(var ti=0;ti<5;ti++){
      var ta=0.04-ti*0.008;
      var tx=x-S.body.velocity.x*ks(ti*3);
      var ty=y-S.body.velocity.y*ks(ti*3);
      ctx.beginPath();ctx.arc(tx,ty,sz*0.3*(1-ti*0.15),0,Math.PI*2);
      ctx.fillStyle="rgba(100,100,100,"+ta+")";ctx.fill();
    }
  }

  // Wings
  var wingBeat=isAir?Math.sin(t*40)*0.8:0.1;
  ctx.save();ctx.translate(x,y);
  // Left wing
  ctx.beginPath();
  ctx.ellipse(-sz*0.3,-sz*0.4-wingBeat*sz*0.5,sz*1.5,sz*0.5,0.2+wingBeat*0.3,0,Math.PI*2);
  ctx.fillStyle="rgba(200,210,220,"+(0.12+Math.abs(wingBeat)*0.08)+")";ctx.fill();
  ctx.strokeStyle="rgba(150,160,170,0.1)";ctx.lineWidth=0.3;ctx.stroke();
  // Wing veins
  ctx.beginPath();
  ctx.moveTo(-sz*0.3,-sz*0.4-wingBeat*sz*0.5);
  ctx.lineTo(-sz*1.5,-sz*0.8-wingBeat*sz*0.5);
  ctx.strokeStyle="rgba(120,130,140,0.08)";ctx.stroke();
  // Right wing
  ctx.beginPath();
  ctx.ellipse(sz*0.3,-sz*0.4+wingBeat*sz*0.5,sz*1.5,sz*0.5,-0.2-wingBeat*0.3,0,Math.PI*2);
  ctx.fillStyle="rgba(200,210,220,"+(0.12+Math.abs(wingBeat)*0.08)+")";ctx.fill();
  ctx.strokeStyle="rgba(150,160,170,0.1)";ctx.lineWidth=0.3;ctx.stroke();
  ctx.restore();

  // Thorax
  ctx.beginPath();ctx.ellipse(x,y-sz*0.15,sz*0.45,sz*0.5,0,0,Math.PI*2);
  ctx.fillStyle="rgba(60,55,50,0.8)";ctx.fill();
  ctx.strokeStyle="rgba(80,70,60,0.2)";ctx.lineWidth=0.5;ctx.stroke();

  // Abdomen
  ctx.beginPath();ctx.ellipse(x,y+sz*0.5,sz*0.4,sz*0.55,0,0,Math.PI*2);
  ctx.fillStyle="rgba(50,48,44,0.75)";ctx.fill();
  // Abdominal stripes
  for(var ai=0;ai<3;ai++){
    ctx.beginPath();
    ctx.moveTo(x-sz*0.35,y+sz*0.25+ai*sz*0.2);
    ctx.lineTo(x+sz*0.35,y+sz*0.25+ai*sz*0.2);
    ctx.strokeStyle="rgba(70,65,55,0.2)";ctx.lineWidth=0.5;ctx.stroke();
  }

  // Head
  ctx.beginPath();ctx.arc(x,y-sz*0.55,sz*0.32,0,Math.PI*2);
  ctx.fillStyle="rgba(55,50,45,0.8)";ctx.fill();

  // Compound eyes (red-brown, large)
  ctx.beginPath();ctx.ellipse(x-sz*0.22,y-sz*0.6,sz*0.18,sz*0.22,0,0,Math.PI*2);
  ctx.fillStyle="rgba(140,40,30,0.7)";ctx.fill();
  ctx.beginPath();ctx.ellipse(x+sz*0.22,y-sz*0.6,sz*0.18,sz*0.22,0,0,Math.PI*2);
  ctx.fillStyle="rgba(140,40,30,0.7)";ctx.fill();
  // Eye highlights
  ctx.beginPath();ctx.arc(x-sz*0.18,y-sz*0.65,sz*0.06,0,Math.PI*2);
  ctx.fillStyle="rgba(255,200,180,0.15)";ctx.fill();
  ctx.beginPath();ctx.arc(x+sz*0.18,y-sz*0.65,sz*0.06,0,Math.PI*2);
  ctx.fillStyle="rgba(255,200,180,0.15)";ctx.fill();

  // Legs (6)
  if(!isAir){
    var legAngles=[-2.5,-1.8,-1.1,1.1,1.8,2.5];
    for(var li2=0;li2<6;li2++){
      var la2=legAngles[li2];
      var legWiggle=Math.sin(t*8+li2*1.2)*0.05;
      ctx.beginPath();
      ctx.moveTo(x+Math.cos(la2)*sz*0.35,y+Math.sin(la2)*sz*0.3);
      var mx=x+Math.cos(la2+legWiggle)*sz*0.8;
      var my=y+Math.sin(la2+legWiggle)*sz*0.7;
      ctx.quadraticCurveTo(mx,my,x+Math.cos(la2)*sz*1.2,y+Math.sin(la2)*sz*0.9);
      ctx.strokeStyle="rgba(60,50,40,0.4)";ctx.lineWidth=0.7;ctx.stroke();
    }
  }

  // Goal indicator
  var goal=S.brain.current_goal;
  if(goal==="flee"){
    ctx.fillStyle="rgba(240,60,40,0.5)";ctx.font="bold 10px monospace";
    ctx.textAlign="center";ctx.fillText("!!",x,y-sz*2);
  }
  if(goal==="seek_food"){
    ctx.fillStyle="rgba(200,180,60,0.4)";ctx.font="9px monospace";
    ctx.textAlign="center";ctx.fillText("\u2764",x,y-sz*2);
  }
  if(goal==="groom"){
    ctx.fillStyle="rgba(100,200,140,0.3)";ctx.font="8px monospace";
    ctx.textAlign="center";ctx.fillText("\u2728",x,y-sz*2);
  }
  // Stress aura
  var stress2=S.brain.stress||0;
  if(stress2>0.3){
    var sag=ctx.createRadialGradient(x,y,sz,x,y,sz*3);
    sag.addColorStop(0,"rgba(240,60,40,"+(stress2*0.06)+")");
    sag.addColorStop(1,"rgba(240,60,40,0)");
    ctx.beginPath();ctx.arc(x,y,sz*3,0,Math.PI*2);
    ctx.fillStyle=sag;ctx.fill();
  }
  // Buzz lines when flying
  if(isAir&&stage==="adult"){
    for(var bzi=0;bzi<3;bzi++){
      var bza=Math.random()*Math.PI*2;
      var bzr=sz*1.5+Math.random()*sz;
      ctx.beginPath();
      ctx.arc(x+Math.cos(bza)*bzr,y+Math.sin(bza)*bzr,0.5+Math.random(),0,Math.PI*2);
      ctx.fillStyle="rgba(160,160,160,0.06)";ctx.fill();
    }
  }
}

function drawDust(ctx){
  for(var i=0;i<dust.length;i++){
    var p=dust[i];
    p.x+=p.vx+Math.sin(t*0.5+p.ph)*0.02;
    p.y+=p.vy;
    if(p.y>KH){p.y=0;p.x=Math.random()*KW}
    if(p.x<0)p.x=KW;if(p.x>KW)p.x=0;
    ctx.beginPath();ctx.arc(kx(p.x),ky(p.y),ks(p.r),0,Math.PI*2);
    ctx.fillStyle="rgba(200,180,140,"+p.a+")";ctx.fill();
  }
  // Particles
  for(var pi=particles.length-1;pi>=0;pi--){
    var pp=particles[pi];
    pp.life-=0.02;
    pp.x+=pp.vx;pp.y+=pp.vy;pp.vy+=0.01;
    if(pp.life<=0){particles.splice(pi,1);continue}
    ctx.beginPath();ctx.arc(kx(pp.x),ky(pp.y),ks(pp.r*pp.life),0,Math.PI*2);
    ctx.fillStyle="hsla("+pp.hue+",60%,60%,"+pp.life*0.5+")";ctx.fill();
  }
}

function spawnParticles(x,y,hue,count){
  for(var i=0;i<count;i++){
    particles.push({
      x:x,y:y,vx:(Math.random()-0.5)*3,vy:(Math.random()-0.5)*3-1,
      r:1+Math.random()*2,life:1,hue:hue
    });
  }
}

function drawObjs(ctx){
  if(!S)return;
  for(var i=0;i<S.kitchen.objects.length;i++){
    drawObj(ctx,S.kitchen.objects[i]);
  }
}

function updateHUD(){
  if(!S)return;
  var lc=S.lifecycle,tk=lc.total_ticks,stage=lc.stage;
  var gen=S._meta.generation||1;

  // Vital signs
  var v='<h3>Vital Signs</h3>';
  v+='<div><span class="gen-tag" style="background:rgba(200,168,100,0.15);color:#c8a868">GEN '+gen+'</span>';
  v+='<span class="st st-'+stage+'">'+stage+'</span></div>';
  v+='<div style="margin-top:6px">Frame: <span class="v">'+S._meta.frame+'</span></div>';
  v+='<div>Tick: <span class="v">'+tk+' / ~'+(lc.stage_durations.egg+lc.stage_durations.larva+lc.stage_durations.pupa+lc.stage_durations.adult)+'</span></div>';
  v+='<div style="margin-top:4px">Energy</div>';
  var ep=Math.max(0,Math.min(100,S.energy.current));
  var ec=ep>50?"#4a8":"#e06040";
  v+='<div class="mt"><div class="mf" style="width:'+ep+'%;background:'+ec+'"></div></div>';
  v+='<div class="d">'+ep.toFixed(1)+'% (drain: '+S.energy.metabolic_drain+'/tick)</div>';
  v+='<div style="margin-top:4px">Hunger</div>';
  var hp=Math.min(100,S.energy.hunger);
  v+='<div class="mt"><div class="mf" style="width:'+hp+'%;background:rgba(220,160,60,0.5)"></div></div>';
  v+='<div class="d">'+hp.toFixed(0)+'%</div>';
  v+='<div style="margin-top:4px">Size: <span class="v">'+S.body.size.toFixed(1)+' mm</span></div>';
  v+='<div>Pos: <span class="v">('+S.body.position.x.toFixed(0)+', '+S.body.position.y.toFixed(0)+')</span></div>';
  v+='<div>Surface: <span class="v">'+(S.body.surface||"counter")+'</span></div>';
  if(S._meta.parent_cause_of_death&&gen>1){
    v+='<div style="margin-top:4px;color:rgba(180,100,60,0.4)">Parent died: '+S._meta.parent_cause_of_death+'</div>';
    v+='<div class="d">Parent lifespan: '+S._meta.parent_lifespan+' ticks</div>';
  }
  document.getElementById("vi").innerHTML=v;

  // Genome
  var g='<h3>Genome</h3>';
  var gk=Object.keys(S.genome);
  var gc=["#f06","#fa0","#0cf","#4a8","#80f","#f80","#0af","#8a4","#f08","#4ff"];
  for(var gi=0;gi<gk.length;gi++){
    var gv=S.genome[gk[gi]];if(typeof gv!=="number")continue;
    g+='<div class="gr"><span class="gn">'+gk[gi].replace(/_/g," ")+'</span>';
    g+='<span class="gb"><span class="gf" style="width:'+(gv*100)+'%;background:'+gc[gi%gc.length]+'"></span></span>';
    g+='<span class="gv">'+(gv*100|0)+'</span></div>';
  }
  document.getElementById("gp").innerHTML=g;

  // Senses
  var ss='<h3>Senses</h3>';
  var smells=S.senses.smell||[];
  ss+='<div>Smell: <span class="v">'+smells.length+' odors</span></div>';
  for(var si=0;si<Math.min(smells.length,4);si++){
    ss+='<div class="d" style="margin-left:8px">'+smells[si].name+' ('+smells[si].distance.toFixed(0)+'px, '+Math.round(smells[si].intensity*100)+'%)</div>';
  }
  var sights=S.senses.sight||[];
  ss+='<div style="margin-top:3px">Sight: <span class="v">'+sights.length+' objects</span></div>';
  for(var vi2=0;vi2<Math.min(sights.length,4);vi2++){
    var label=sights[vi2].name+(sights[vi2].threat?" <span class='w'>!!</span>":"");
    ss+='<div class="d" style="margin-left:8px">'+label+'</div>';
  }
  ss+='<div style="margin-top:3px">Touch: <span class="v">'+S.senses.touch.surface+'</span></div>';
  ss+='<div>Temp: <span class="v">'+(S.senses.temperature||0).toFixed(1)+'\u00b0C</span></div>';
  ss+='<div>Wind: <span class="v">'+(S.senses.wind||0).toFixed(2)+'</span></div>';
  ss+='<div style="margin-top:3px">'+(S.body.is_airborne?'\u2708 <span class="v">FLYING</span>':'\u25BC <span class="v">grounded</span>')+'</div>';
  // Kitchen events
  var aev=(S.kitchen.active_events||[]);
  if(aev.length>0){
    ss+='<div style="margin-top:5px;border-top:1px solid rgba(240,180,60,0.1);padding-top:4px">';
    ss+='<div style="color:rgba(240,180,60,0.6);font-size:9px;letter-spacing:1px">\u26A0 EVENTS</div>';
    for(var ei=0;ei<aev.length;ei++){
      ss+='<div class="d" style="margin-left:8px;color:rgba(240,180,60,0.4)">'+aev[ei].name+' ('+aev[ei].remaining+'t)</div>';
    }
    ss+='</div>';
  }
  document.getElementById("sp").innerHTML=ss;

  // Brain
  var bb='<h3>Brain</h3>';
  bb+='<div>Goal: <span class="v">'+(S.brain.current_goal||"none").replace(/_/g," ")+'</span></div>';
  bb+='<div>State: <span class="v">'+(S.brain.state||"?")+'</span></div>';
  bb+='<div class="d" style="margin-top:3px">Neural: '+(S.brain.neural_complexity*100|0)+'% complexity</div>';
  bb+='<div class="d">Decisions: '+S.brain.decisions_made+'</div>';
  var bm=[["fear",S.brain.fear_level],["curiosity",S.brain.curiosity],["satisfaction",S.brain.satisfaction],["stress",S.brain.stress||0]];
  for(var bi=0;bi<bm.length;bi++){
    if(bm[bi][1]>0.01){
      var bmcol=bm[bi][0]==="stress"?"rgba(240,80,60,0.5)":bm[bi][0]==="fear"?"rgba(240,60,40,0.5)":"rgba(200,168,100,0.4)";
      bb+='<div class="gr"><span class="gn">'+bm[bi][0]+'</span>';
      bb+='<span class="gb"><span class="gf" style="width:'+(bm[bi][1]*100)+'%;background:'+bmcol+'"></span></span>';
      bb+='<span class="gv">'+(bm[bi][1]*100|0)+'</span></div>';
    }
  }
  // Dreams (from pupa metamorphosis)
  var dreams=S.brain.dreams||[];
  if(dreams.length>0){
    bb+='<div style="margin-top:5px;border-top:1px solid rgba(180,140,60,0.08);padding-top:4px">';
    bb+='<div class="d" style="color:rgba(140,120,200,0.5)">Dreams ('+dreams.length+')</div>';
    var dshow=dreams.slice(-2);
    for(var di=0;di<dshow.length;di++){
      bb+='<div class="d" style="margin-left:8px;color:rgba(140,120,200,0.35);font-style:italic">'+dshow[di].content+'</div>';
    }
    bb+='</div>';
  }
  if(S.brain.inherited_memory&&gen>1){
    bb+='<div style="margin-top:5px;border-top:1px solid rgba(180,140,60,0.08);padding-top:4px">';
    bb+='<div class="d">Epigenetic bias: '+(S.brain.inherited_memory.epigenetic_bias||0).toFixed(3)+'</div>';
    if(S.brain.inherited_memory.parent_favorite_food){
      bb+='<div class="d">Parent liked: '+S.brain.inherited_memory.parent_favorite_food+'</div>';
    }
    bb+='</div>';
  }
  document.getElementById("bp").innerHTML=bb;

  // Memory
  var mm='<h3>Memory</h3>';
  mm+='<div class="d">Foods found: '+S.memory.food_sources.length+'</div>';
  if(S.memory.favorite_food)mm+='<div class="d">Fav: '+S.memory.favorite_food+'</div>';
  mm+='<div class="d">Times fed: '+S.memory.times_fed+'</div>';
  mm+='<div class="d">Times fled: '+(S.memory.times_fled||0)+'</div>';
  mm+='<div class="d">Distance: '+S.memory.total_distance.toFixed(0)+'px</div>';
  mm+='<div class="d">Peak alt: '+(S.memory.peak_altitude||0).toFixed(1)+'</div>';
  document.getElementById("mp").innerHTML=mm;

  // Ancestors
  var anc=S.ancestors||[];
  var aa='<h3>Lineage</h3>';
  if(anc.length===0&&gen===1){
    aa+='<div class="d">First generation</div>';
  }
  for(var ai=0;ai<anc.length;ai++){
    var a=anc[ai];
    aa+='<div class="ancestor-row">';
    aa+='<span class="gen-tag" style="background:rgba(140,100,60,0.1);color:rgba(180,140,80,0.5)">Gen '+a.generation+'</span>';
    aa+='<span class="d">'+a.total_ticks+' ticks, ';
    aa+=(a.cause_of_death||"unknown")+'</span>';
    if(a.final_stats){
      aa+='<div class="d" style="margin-left:40px;font-size:8px">';
      aa+='fed:'+a.final_stats.times_fed+' fled:'+a.final_stats.times_fled+' dist:'+a.final_stats.distance;
      aa+='</div>';
    }
    aa+='</div>';
  }
  document.getElementById("ap").innerHTML=aa;

  // Timeline
  var dur=lc.stage_durations;
  var tot=dur.egg+dur.larva+dur.pupa+dur.adult;
  var tlt='<h3 style="text-align:center">Lifecycle Timeline &mdash; Generation '+gen+'</h3>';
  tlt+='<div style="position:relative;height:60px;margin-top:8px">';
  var stgs=[
    {n:"egg",d:dur.egg,c:"rgba(255,250,230,0.15)",ac:"#faf0d0",s:0},
    {n:"larva",d:dur.larva,c:"rgba(180,200,60,0.15)",ac:"#b0c840",s:dur.egg},
    {n:"pupa",d:dur.pupa,c:"rgba(120,80,40,0.15)",ac:"#a07030",s:dur.egg+dur.larva},
    {n:"adult",d:dur.adult,c:"rgba(80,80,80,0.15)",ac:"#a0a0a0",s:dur.egg+dur.larva+dur.pupa}
  ];
  for(var si2=0;si2<stgs.length;si2++){
    var sg=stgs[si2],sl=sg.s/tot*100,sw=sg.d/tot*100;
    var isActive=sg.n===stage;
    var bgCol=isActive?sg.ac.replace(")",",0.2)").replace("rgb","rgba"):sg.c;
    if(isActive)bgCol=sg.c.replace("0.15","0.35");
    tlt+='<div style="position:absolute;top:20px;left:'+sl+'%;width:'+sw+'%;height:10px;border-radius:5px;background:'+bgCol;
    if(isActive)tlt+=';box-shadow:0 0 8px '+sg.ac.replace(")",",0.2)").replace("rgb","rgba");
    tlt+='"></div>';
    tlt+='<div style="position:absolute;bottom:2px;left:'+(sl+sw/2)+'%;transform:translateX(-50%);font-size:9px;color:rgba(160,130,70,'+(isActive?0.8:0.3)+');font-weight:'+(isActive?"bold":"normal")+'">'+sg.n+'</div>';
  }
  // Progress marker
  var prog=Math.min(tk/tot*100,100);
  tlt+='<div style="position:absolute;top:16px;left:'+prog+'%;width:4px;height:18px;background:#f0c060;border-radius:2px;transition:left .5s;box-shadow:0 0 6px rgba(240,192,96,0.4)"></div>';
  // History events on timeline
  if(S.history){
    for(var hi=0;hi<S.history.length;hi++){
      var he=S.history[hi];
      if(he.event.indexOf("->")>-1||he.event.indexOf("appears")>-1||he.event.indexOf("molt")>-1){
        var eleft=he.tick/tot*100;
        var ecolor=he.event.indexOf("->")>-1?"rgba(240,192,96,0.4)":he.event.indexOf("appears")>-1?"rgba(240,80,60,0.3)":"rgba(180,200,60,0.3)";
        tlt+='<div style="position:absolute;top:10px;left:'+eleft+'%;width:2px;height:24px;background:'+ecolor+'" title="'+he.event+'"></div>';
      }
    }
  }
  tlt+='</div>';

  // Generation history bar (if multi-gen)
  if(gen>1&&S._meta.lineage){
    tlt+='<div style="margin-top:8px;display:flex;gap:2px;height:6px">';
    var lin=S._meta.lineage;
    var maxTicks=0;
    for(var li2=0;li2<lin.length;li2++){
      if(lin[li2].total_ticks>maxTicks)maxTicks=lin[li2].total_ticks;
    }
    maxTicks=Math.max(maxTicks,tot);
    for(var li3=0;li3<lin.length;li3++){
      var lw=lin[li3].total_ticks/maxTicks*100;
      var lcol=lin[li3].cause_of_death==="starvation"?"#e06040":"rgba(200,168,100,0.3)";
      tlt+='<div style="width:'+lw+'%;background:'+lcol+';border-radius:3px" title="Gen '+(li3+1)+': '+lin[li3].total_ticks+' ticks ('+lin[li3].cause_of_death+')"></div>';
    }
    // Current gen (alive)
    var cw=tk/maxTicks*100;
    tlt+='<div class="alive-pulse" style="width:'+cw+'%;background:rgba(80,200,120,0.4);border-radius:3px" title="Gen '+gen+': '+tk+' ticks (alive)"></div>';
    tlt+='</div>';
    tlt+='<div style="font-size:8px;color:rgba(160,130,70,0.25);margin-top:2px;text-align:center">generation lifespans</div>';
  }

  document.getElementById("tl").innerHTML=tlt;

  // Narration
  document.getElementById("nr").textContent=S.narration||"";
}

function drawKitchenEvents(ctx){
  if(!S)return;
  var evts=S.kitchen.active_events||[];
  var vib=S.kitchen.event_vibration||0;
  var wind=S.kitchen.event_wind||0;

  // Screen shake from vibration
  if(vib>0.3){
    var shk=vib*3;
    ctx.save();
    ctx.translate(Math.sin(t*30)*shk,Math.cos(t*25)*shk);
  }

  // Wind streaks
  if(wind>0.2){
    ctx.strokeStyle="rgba(200,180,140,"+(wind*0.04)+")";
    ctx.lineWidth=0.5;
    for(var wi=0;wi<Math.floor(wind*15);wi++){
      var wx=Math.random()*innerWidth;
      var wy=Math.random()*innerHeight;
      ctx.beginPath();
      ctx.moveTo(wx,wy);
      ctx.lineTo(wx+wind*40+Math.random()*20,wy+Math.random()*4-2);
      ctx.stroke();
    }
  }

  // Event flash overlay
  for(var ei=0;ei<evts.length;ei++){
    if(evts[ei].id==="door_slam"&&evts[ei].remaining>1){
      ctx.fillStyle="rgba(255,255,240,"+(0.02*evts[ei].remaining)+")";
      ctx.fillRect(0,0,innerWidth,innerHeight);
    }
    if(evts[ei].id==="cooking_steam"){
      // Steam particles rising from left
      for(var si=0;si<5;si++){
        var sx=ks(50+Math.random()*60);
        var sy=ky(100)-Math.random()*80;
        ctx.beginPath();ctx.arc(sx,sy,3+Math.random()*5,0,Math.PI*2);
        ctx.fillStyle="rgba(200,200,200,0.03)";ctx.fill();
      }
    }
    if(evts[ei].id==="light_flicker"){
      if(Math.random()<0.3){
        ctx.fillStyle="rgba(0,0,0,0.05)";
        ctx.fillRect(0,0,innerWidth,innerHeight);
      }
    }
  }

  if(vib>0.3)ctx.restore();
}

var lf=0,lh=0,bgD=false;
function frame(ts){
  var dt=Math.min((ts-lf)/1000,.1);lf=ts;t+=dt;
  if(!bgD){bgX.clearRect(0,0,innerWidth,innerHeight);drawBG(bgX);bgD=true}
  scX.clearRect(0,0,innerWidth,innerHeight);drawObjs(scX);drawFly(scX);
  fxX.clearRect(0,0,innerWidth,innerHeight);drawDust(fxX);drawKitchenEvents(fxX);
  if(t-lh>.5){updateHUD();lh=t}
  requestAnimationFrame(frame);
}
addEventListener("resize",function(){bgD=false});
loadState().then(function(){updateHUD();requestAnimationFrame(frame)});
setInterval(function(){loadState().then(function(){updateHUD();bgD=false})},8000);
</script>
