345205,"y":104.68259301091193,"z":0}},{"tick":121,"event":"adult -> death","stage":"death","energy":79.7,"position":{"x":300.548966657359,"y":92.26759868128485,"z":1.0}}],"ancestors":[{"generation":1,"total_ticks":111,"cause_of_death":"old age","genome":{"species":"Musca domestica","wing_vein_pattern":0.73,"eye_facets":4000,"body_color_hue":0.12,"bristle_density":0.65,"metabolic_rate":1.0,"flight_efficiency":0.8,"smell_sensitivity":0.9,"heat_tolerance":0.6,"lifespan_modifier":1.0},"history_summary":{"total_events":16,"key_events":[{"tick":8,"event":"egg -> larva","stage":"larva","energy":79.2,"position":{"x":320,"y":180,"z":0.5}},{"tick":33,"event":"larva -> pupa","stage":"pupa","energy":69.2,"position":{"x":320.1889563430577,"y":185.72183062101507,"z":0.5}},{"tick":51,"event":"pupa -> adult","stage":"adult","energy":66.5,"position":{"x":320.1889563430577,"y":185.72183062101507,"z":0.5}},{"tick":111,"event":"adult -> death","stage":"death","energy":33.2,"position":{"x":288.2649873295623,"y":125.14847267334237,"z":1.5}}]},"final_stats":{"energy":33.2,"decisions":38,"distance":180.9,"times_fed":6,"times_fled":6}}],"narration":"Gen 2. Stillness. The kitchen light still hums overhead."};

/* ========== CANVAS SETUP ========== */
const bgC=document.getElementById("bg"),bgX=bgC.getContext("2d"),
      scC=document.getElementById("scene"),scX=scC.getContext("2d"),
      fxC=document.getElementById("fx"),fxX=fxC.getContext("2d");

function resize(){
  bgC.width=scC.width=fxC.width=innerWidth;
  bgC.height=scC.height=fxC.height=innerHeight;
  drawBg();
}
resize();addEventListener("resize",resize);

/* ========== SIMULATION FRAMES ========== */
/* We pre-compute each tick of life from the state data */
const HISTORY = FLY_STATE.history;
const TOTAL_TICKS = FLY_STATE.lifecycle.total_ticks;
const STAGE_DURATIONS = FLY_STATE.lifecycle.stage_durations;
const GENOME = FLY_STATE.genome;
const KITCHEN = FLY_STATE.kitchen;
const ANCESTORS = FLY_STATE.ancestors || [];
const LINEAGE = (FLY_STATE._meta.lineage || []);
const MEMORY = FLY_STATE.memory;
const GEN = FLY_STATE._meta.generation;

/* Build per-tick timeline from history events */
const STAGE_BOUNDARIES = {};
HISTORY.forEach(h => {
  if(h.event.includes("->")) {
    const parts = h.event.split(" -> ");
    STAGE_BOUNDARIES[h.tick] = parts[1].trim();
  }
});

function getStageAtTick(t) {
  if(t < STAGE_DURATIONS.egg) return "egg";
  if(t < STAGE_DURATIONS.egg + STAGE_DURATIONS.larva) return "larva";
  if(t < STAGE_DURATIONS.egg + STAGE_DURATIONS.larva + STAGE_DURATIONS.pupa) return "pupa";
  if(t < STAGE_DURATIONS.egg + STAGE_DURATIONS.larva + STAGE_DURATIONS.pupa + STAGE_DURATIONS.adult) return "adult";
  return "death";
}

/* Interpolate fly position for smooth animation */
function getFlyState(tick) {
  const stage = getStageAtTick(tick);
  /* Find closest history events for position */
  let before = HISTORY[0], after = HISTORY[HISTORY.length-1];
  for(let i=0;i<HISTORY.length;i++){
    if(HISTORY[i].tick <= tick) before = HISTORY[i];
    if(HISTORY[i].tick >= tick && (!after || HISTORY[i].tick < after.tick)) after = HISTORY[i];
  }
  
  /* Base position from history, with procedural movement */
  const seed = tick * 31337;
  const rng = ()=>{let s=seed;return()=>{s=(s*1103515245+12345)&0x7fffffff;return s/0x7fffffff}}();
  const r = rng();
  
  let x = before.position.x, y = before.position.y, z = before.position.z || 0;
  if(before.tick !== after.tick) {
    const t = (tick - before.tick) / (after.tick - before.tick);
    x += (after.position.x - before.position.x) * t;
    y += (after.position.y - before.position.y) * t;
  }
  
  /* Add movement noise based on stage */
  if(stage === "larva") {
    x += Math.sin(tick * 0.7) * 3 + r() * 2;
    y += Math.cos(tick * 0.5) * 2 + r() * 1.5;
  } else if(stage === "adult") {
    x += Math.sin(tick * 1.2) * 15 + r() * 10;
    y += Math.cos(tick * 0.9) * 12 + r() * 8;
    z = 0.5 + Math.sin(tick * 0.3) * 1.0 + r() * 0.5;
  }
  
  x = Math.max(20, Math.min(620, x));
  y = Math.max(20, Math.min(340, y));
  
  /* Energy curve */
  const eggEnd = STAGE_DURATIONS.egg;
  const larvaEnd = eggEnd + STAGE_DURATIONS.larva;
  const pupaEnd = larvaEnd + STAGE_DURATIONS.pupa;
  const adultEnd = pupaEnd + STAGE_DURATIONS.adult;
  
  let energy = 85;
  if(tick <= eggEnd) energy = 85 - tick * 0.1;
  else if(tick <= larvaEnd) energy = 84 - (tick - eggEnd) * 0.34;
  else if(tick <= pupaEnd) energy = 73 - (tick - larvaEnd) * 0.15;
  else if(tick <= adultEnd) {
    energy = 70 + Math.sin((tick - pupaEnd) * 0.12) * 15 + (tick - pupaEnd) * 0.15;
    energy = Math.min(100, Math.max(60, energy));
  }
  else energy = 0;
  
  /* Size */
  let size = 1;
  if(stage === "egg") size = 1 + tick * 0.05;
  else if(stage === "larva") size = 1.5 + (tick - eggEnd) * 0.15;
  else if(stage === "pupa") size = 5.5;
  else if(stage === "adult") size = 6;
  else size = 5;
  
  /* Brain goal */
  const goals = ["idle","seek_food","explore","fly_to_light","groom","wall_walk","flee"];
  let goal = "dormant";
  if(stage === "egg") goal = "dormant";
  else if(stage === "pupa") goal = "metamorphosis";
  else if(stage === "death") goal = "none";
  else {
    const gi = Math.floor(r() * goals.length);
    goal = goals[gi];
    /* bias toward matching history events */
    for(const h of HISTORY){
      if(h.tick === tick){
        if(h.event.includes("DANGER") || h.event.includes("cat") || h.event.includes("spider") || h.event.includes("swatter")) goal = "flee";
        break;
      }
    }
  }
  
  /* hunger */
  let hunger = 5 + tick * 0.15;
  if(stage === "adult") hunger = 5 + Math.sin(tick * 0.2) * 20 + 10;
  hunger = Math.max(0, Math.min(100, hunger));
  
  /* neural complexity */
  let neural = 0.01;
  if(stage === "larva") neural = 0.01 + (tick - eggEnd) * 0.01;
  else if(stage === "pupa") neural = 0.3 + ((tick - larvaEnd) / STAGE_DURATIONS.pupa) * 0.7;
  else if(stage === "adult") neural = 0.96;
  
  let narration = "";
  const gp = GEN > 1 ? "Gen " + GEN + ". " : "";
  if(stage === "egg") {
    const p = tick / eggEnd;
    if(p < 0.3) narration = gp+"The egg sits motionless. Inside, cells divide furiously.";
    else if(p < 0.7) narration = gp+"Organs form in miniature. The embryo twitches.";
    else narration = gp+"A crack appears. The egg trembles. Something stirs within.";
  } else if(stage === "larva") {
    narration = gp+"The larva wriggles, growing. "+size.toFixed(1)+"mm. Each molt reshapes it.";
  } else if(stage === "pupa") {
    const p = (tick - larvaEnd) / STAGE_DURATIONS.pupa;
    if(p < 0.4) narration = gp+"Inside the puparium, metamorphosis reshapes everything.";
    else if(p < 0.8) narration = gp+"Wings form where there were none. Eyes crystallize.";
    else narration = gp+"Almost there. The adult fly takes shape within.";
  } else if(stage === "adult") {
    const narrs = {
      "flee": gp+"DANGER! The fly bolts away at maximum speed!",
      "seek_food": gp+"Drawn by scent, the fly descends. Hunger gnaws.",
      "explore": gp+"Compound eyes scan 360°. The kitchen is vast.",
      "fly_to_light": gp+"The fly spirals toward the light. An ancient compulsion.",
      "groom": gp+"The fly pauses, rubbing forelegs together.",
      "wall_walk": gp+"Defying gravity, the fly walks along the wall.",
      "idle": gp+"Wings beat 200 times per second. A blur of freedom."
    };
    narration = narrs[goal] || gp+"Energy: "+Math.round(energy)+"%. The search continues.";
  } else {
    narration = gp+"Stillness. The kitchen light still hums overhead.";
  }
  
  /* Event at this tick */
  let event = null;
  for(const h of HISTORY) {
    if(h.tick === tick && h.event !== "generation 2 -- egg laid") event = h.event;
  }
  
  return {tick, stage, x, y, z, energy, size, goal, hunger, neural, narration, event, isAirborne: stage==="adult" && z > 0.3};
}

function drawBg(){
  const W=bgC.width, H=bgC.height;
  bgX.fillStyle="#0d0a07";
  bgX.fillRect(0,0,W,H);
  
  const fs = getFlyState(currentTick);
  const tod = (0.3 + currentTick * 0.009) % 1.0;
  const isDay = tod > 0.25 && tod < 0.85;
  
  /* Kitchen scene scaled to canvas */
  const sx = W/640, sy = H/360;
  const s = Math.min(sx, sy);
  const ox = (W - 640*s)/2, oy = (H - 360*s)/2;
  
  bgX.save();
  bgX.translate(ox, oy);
  bgX.scale(s, s);
  
  /* Floor */
  const floorGrad = bgX.createLinearGradient(0,0,0,360);
  floorGrad.addColorStop(0, isDay ? "#2a2218" : "#151008");
  floorGrad.addColorStop(1, isDay ? "#1e1810" : "#0d0805");
  bgX.fillStyle = floorGrad;
  bgX.fillRect(0,0,640,360);
  
  /* Counter surface */
  bgX.fillStyle = isDay ? "rgba(60,50,35,0.3)" : "rgba(30,25,15,0.3)";
  bgX.fillRect(0,120,640,240);
  
  /* Counter edge line */
  bgX.strokeStyle = "rgba(180,140,60,0.08)";
  bgX.lineWidth = 1;
  bgX.beginPath();bgX.moveTo(0,120);bgX.lineTo(640,120);bgX.stroke();
  
  /* Tile pattern on floor */
  bgX.strokeStyle = "rgba(180,140,60,0.03)";
  for(let x=0;x<640;x+=40){bgX.beginPath();bgX.moveTo(x,120);bgX.lineTo(x,360);bgX.stroke()}
  for(let y=120;y<360;y+=40){bgX.beginPath();bgX.moveTo(0,y);bgX.lineTo(640,y);bgX.stroke()}
  
  /* Window glow */
  const wglow = bgX.createRadialGradient(600,80,5,600,80,isDay?180:60);
  wglow.addColorStop(0, isDay?"rgba(200,180,140,0.15)":"rgba(40,50,80,0.08)");
  wglow.addColorStop(1,"transparent");
  bgX.fillStyle=wglow;bgX.fillRect(400,0,240,260);
  
  /* Kitchen light */
  if(isDay) {
    const lg = bgX.createRadialGradient(320,15,2,320,15,200);
    lg.addColorStop(0,"rgba(255,240,180,0.12)");
    lg.addColorStop(1,"transparent");
    bgX.fillStyle=lg;bgX.fillRect(120,0,400,250);
  }
  
  bgX.restore();
}

function drawScene(){
  const W=scC.width, H=scC.height;
  scX.clearRect(0,0,W,H);
  
  const fs = getFlyState(currentTick);
  const sx = W/640, sy = H/360;
  const s = Math.min(sx, sy);
  const ox = (W - 640*s)/2, oy = (H - 360*s)/2;
  
  scX.save();
  scX.translate(ox, oy);
  scX.scale(s, s);
  
  /* Draw food sources with smell radii */
  KITCHEN.objects.forEach(obj => {
    if(obj.type === "food") {
      /* Smell radius */
      const sg = scX.createRadialGradient(obj.x,obj.y,2,obj.x,obj.y,obj.smell_radius*0.3);
      sg.addColorStop(0,"rgba(180,160,60,0.06)");
      sg.addColorStop(1,"transparent");
      scX.fillStyle=sg;
      scX.beginPath();scX.arc(obj.x,obj.y,obj.smell_radius*0.3,0,Math.PI*2);scX.fill();
      
      /* Food dot */
      scX.fillStyle = obj.id === "carcass" ? "rgba(100,60,60,0.6)" : "rgba(180,150,60,0.5)";
      scX.beginPath();scX.arc(obj.x,obj.y,4,0,Math.PI*2);scX.fill();
      
      /* Label */
      scX.fillStyle = "rgba(160,130,70,0.25)";
      scX.font = "7px monospace";
      scX.textAlign = "center";
      scX.fillText(obj.name, obj.x, obj.y+14);
    }
    if(obj.type === "light") {
      const lg = scX.createRadialGradient(obj.x,obj.y,1,obj.x,obj.y,30);
      lg.addColorStop(0,"rgba(255,240,160,0.2)");
      lg.addColorStop(1,"transparent");
      scX.fillStyle=lg;scX.beginPath();scX.arc(obj.x,obj.y,30,0,Math.PI*2);scX.fill();
    }
  });
  
  /* Draw threats if active at this tick */
  const threatTicks = {};
  HISTORY.forEach(h => {
    if(h.event.includes("appears")) {
      const name = h.event.replace(" appears!","");
      threatTicks[name] = h.tick;
    }
  });
  
  KITCHEN.objects.forEach(obj => {
    if(obj.type === "threat") {
      const lastAppear = threatTicks[obj.name] || -999;
      if(currentTick >= lastAppear && currentTick < lastAppear + 8) {
        /* Threat active */
        const tx = 100 + Math.sin(currentTick * 0.5 + obj.speed) * 200;
        const ty = 150 + Math.cos(currentTick * 0.3 + obj.speed) * 100;
        const tg = scX.createRadialGradient(tx,ty,3,tx,ty,40);
        tg.addColorStop(0,"rgba(200,50,30,0.2)");
        tg.addColorStop(1,"transparent");
        scX.fillStyle=tg;scX.beginPath();scX.arc(tx,ty,40,0,Math.PI*2);scX.fill();
        scX.fillStyle="rgba(200,50,30,0.6)";scX.font="8px monospace";scX.textAlign="center";
        scX.fillText("⚠ "+obj.name, tx, ty+3);
      }
    }
  });
  
  /* Draw the fly */
  const flyX = fs.x, flyY = fs.y;
  const flySize = fs.size;
  const stageColor = STAGE_COLORS[fs.stage];
  
  if(fs.stage === "egg") {
    /* Egg: small oval, glowing */
    const glow = scX.createRadialGradient(flyX,flyY,1,flyX,flyY,8+Math.sin(currentTick*0.5)*2);
    glow.addColorStop(0,"rgba(255,250,230,0.3)");
    glow.addColorStop(1,"transparent");
    scX.fillStyle=glow;scX.beginPath();scX.arc(flyX,flyY,10,0,Math.PI*2);scX.fill();
    
    scX.fillStyle="rgba(255,250,230,0.7)";
    scX.beginPath();scX.ellipse(flyX,flyY,2,3.5,0,0,Math.PI*2);scX.fill();
    scX.strokeStyle="rgba(255,250,230,0.3)";scX.lineWidth=0.5;
    scX.beginPath();scX.ellipse(flyX,flyY,2,3.5,0,0,Math.PI*2);scX.stroke();
  } else if(fs.stage === "larva") {
    /* Larva: segmented worm */
    const segs = Math.floor(3 + flySize * 0.5);
    const segLen = flySize * 0.6;
    const angle = Math.sin(currentTick * 0.8) * 0.3;
    scX.fillStyle="rgba(200,210,100,0.6)";
    for(let i=0;i<segs;i++){
      const sx2 = flyX + Math.cos(angle) * i * segLen - segs*segLen/2*Math.cos(angle);
      const sy2 = flyY + Math.sin(angle + Math.sin(currentTick*1.2+i)*0.2) * i * 0.5;
      const sr = flySize * 0.3 * (1 - i*0.05);
      scX.beginPath();scX.arc(sx2,sy2,Math.max(sr,1),0,Math.PI*2);scX.fill();
    }
    /* Head */
    scX.fillStyle="rgba(160,170,60,0.8)";
    scX.beginPath();scX.arc(flyX-segs*segLen/2*Math.cos(angle),flyY,flySize*0.35,0,Math.PI*2);scX.fill();
  } else if(fs.stage === "pupa") {
    /* Pupa: dark oval, pulsing */
    const pulse = 1 + Math.sin(currentTick * 0.3) * 0.08;
    scX.fillStyle="rgba(120,80,40,0.7)";
    scX.beginPath();scX.ellipse(flyX,flyY,4*pulse,6*pulse,0,0,Math.PI*2);scX.fill();
    
    /* Metamorphosis glow */
    const prog = (currentTick - (STAGE_DURATIONS.egg + STAGE_DURATIONS.larva)) / STAGE_DURATIONS.pupa;
    const mg = scX.createRadialGradient(flyX,flyY,2,flyX,flyY,12);
    mg.addColorStop(0,`rgba(180,140,60,${0.1 + prog * 0.15})`);
    mg.addColorStop(1,"transparent");
    scX.fillStyle=mg;scX.beginPath();scX.arc(flyX,flyY,12,0,Math.PI*2);scX.fill();
  } else if(fs.stage === "adult") {
    /* Adult fly: body + wings + shadow */
    const shadowY = flyY + 20 + fs.z * 15;
    const shadowA = Math.max(0.02, 0.1 - fs.z * 0.03);
    scX.fillStyle=`rgba(0,0,0,${shadowA})`;
    scX.beginPath();scX.ellipse(flyX,shadowY,4,2,0,0,Math.PI*2);scX.fill();
    
    const drawY = flyY - fs.z * 20;
    
    /* Wings */
    const wingFlap = Math.sin(currentTick * 8) * 0.4;
    scX.fillStyle="rgba(180,180,200,0.15)";
    scX.beginPath();scX.ellipse(flyX-3,drawY-2,7,3,wingFlap-0.3,0,Math.PI*2);scX.fill();
    scX.beginPath();scX.ellipse(flyX+3,drawY-2,7,3,-wingFlap+0.3,0,Math.PI*2);scX.fill();
    
    /* Body */
    scX.fillStyle="rgba(60,60,60,0.8)";
    scX.beginPath();scX.ellipse(flyX,drawY,3,5,0,0,Math.PI*2);scX.fill();
    
    /* Head */
    scX.fillStyle="rgba(80,60,50,0.9)";
    scX.beginPath();scX.arc(flyX,drawY-5,2.5,0,Math.PI*2);scX.fill();
    
    /* Eyes */
    scX.fillStyle="rgba(200,50,30,0.7)";
    scX.beginPath();scX.arc(flyX-1.5,drawY-5.5,1,0,Math.PI*2);scX.fill();
    scX.beginPath();scX.arc(flyX+1.5,drawY-5.5,1,0,Math.PI*2);scX.fill();
    
    /* Legs (when landed) */
    if(!fs.isAirborne) {
      scX.strokeStyle="rgba(60,50,40,0.4)";scX.lineWidth=0.5;
      for(let i=-1;i<=1;i++){
        scX.beginPath();scX.moveTo(flyX-3,drawY+i*2);scX.lineTo(flyX-6,drawY+i*3+3);scX.stroke();
        scX.beginPath();scX.moveTo(flyX+3,drawY+i*2);scX.lineTo(flyX+6,drawY+i*3+3);scX.stroke();
      }
    }
    
    /* Flight trail */
    if(fs.isAirborne && fs.goal !== "idle") {
      scX.strokeStyle="rgba(180,180,200,0.05)";scX.lineWidth=1;
      scX.beginPath();
      for(let i=1;i<8;i++){
        const prev = getFlyState(Math.max(0,currentTick-i));
        scX.lineTo(prev.x, prev.y - prev.z * 20);
      }
      scX.stroke();
    }
  } else {
    /* Dead fly: on side */
    scX.fillStyle="rgba(50,40,30,0.6)";
    scX.beginPath();scX.ellipse(flyX,flyY,4,2.5,0.3,0,Math.PI*2);scX.fill();
    scX.fillStyle="rgba(40,30,20,0.5)";
    scX.beginPath();scX.arc(flyX-3,flyY-1,1.5,0,Math.PI*2);scX.fill();
    /* Legs curled up */
    scX.strokeStyle="rgba(50,40,30,0.3)";scX.lineWidth=0.5;
    for(let i=0;i<3;i++){
      scX.beginPath();scX.arc(flyX+i*2-2,flyY+2,2,Math.PI,Math.PI*1.5);scX.stroke();
    }
  }
  
  scX.restore();
}

function drawFx(){
  const W=fxC.width, H=fxC.height;
  fxX.clearRect(0,0,W,H);
  
  const sx = W/640, sy = H/360;
  const s = Math.min(sx, sy);
  const ox = (W - 640*s)/2, oy = (H - 360*s)/2;
  
  fxX.save();
  fxX.translate(ox, oy);
  fxX.scale(s, s);
  
  /* Dust motes */
  dustMotes.forEach(d => {
    d.x += d.vx;
    d.y += d.vy;
    d.a += (Math.random()-0.5)*0.02;
    if(d.y < 0) d.y = 360;
    if(d.x < 0) d.x = 640;
    if(d.x > 640) d.x = 0;
    d.a = Math.max(0.05, Math.min(0.3, d.a));
    fxX.fillStyle=`rgba(200,180,140,${d.a})`;
    fxX.beginPath();fxX.arc(d.x,d.y,d.s,0,Math.PI*2);fxX.fill();
  });
  
  /* Particles */
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx;p.y+=p.vy;p.life--;
    p.a=p.life/p.maxLife;
    if(p.life<=0){particles.splice(i,1);continue}
    fxX.fillStyle=p.color.replace("1)",p.a+")");
    fxX.beginPath();fxX.arc(p.x,p.y,1.5,0,Math.PI*2);fxX.fill();
  }
  
  fxX.restore();
}

function renderTimeline(fs) {
  const tl = document.getElementById("timeline");
  const W = tl.clientWidth - 28;
  const eggEnd = STAGE_DURATIONS.egg;
  const larvaEnd = eggEnd + STAGE_DURATIONS.larva;
  const pupaEnd = larvaEnd + STAGE_DURATIONS.pupa;
  const total = TOTAL_TICKS;
  
  const eggW = (eggEnd/total*100);
  const larvaW = (STAGE_DURATIONS.larva/total*100);
  const pupaW = (STAGE_DURATIONS.pupa/total*100);
  const adultW = (STAGE_DURATIONS.adult/total*100);
  
  const cursor = (currentTick/total*100);
  
  /* Events */
  let evtHTML = "";
  HISTORY.forEach(h => {
    if(h.event.includes("->") || h.event.includes("molt") || h.event.includes("appears") || h.event.includes("egg laid")) {
      const pct = (h.tick/total*100);
      const color = h.event.includes("appears") ? "#c04040" : 
                    h.event.includes("molt") ? "#b0c840" :
                    h.event.includes("->") ? "#f0e8d0" : "#c8a878";
      const label = h.event.replace("generation 2 -- ","").replace(" appears!","⚠");
      evtHTML += `<div style="position:absolute;left:${pct}%;bottom:46px;transform:translateX(-50%);font-size:7px;color:${color};white-space:nowrap;opacity:${h.tick<=currentTick?0.8:0.2}">${label}</div>`;
      evtHTML += `<div style="position:absolute;left:${pct}%;bottom:28px;width:1px;height:16px;background:${color};opacity:${h.tick<=currentTick?0.4:0.1}"></div>`;
    }
  });
  
  tl.innerHTML = `
    <h3>Lifecycle Timeline</h3>
    <div style="position:relative;height:90px;margin-top:4px">
      <div style="position:absolute;bottom:16px;left:0;right:0;height:12px;display:flex;border-radius:6px;overflow:hidden">
        <div style="width:${eggW}%;background:rgba(240,232,208,${currentTick<eggEnd?0.25:0.08})" title="Egg"></div>
        <div style="width:${larvaW}%;background:rgba(176,200,64,${currentTick>=eggEnd&&currentTick<larvaEnd?0.25:0.08})" title="Larva"></div>
        <div style="width:${pupaW}%;background:rgba(160,112,48,${currentTick>=larvaEnd&&currentTick<pupaEnd?0.25:0.08})" title="Pupa"></div>
        <div style="width:${adultW}%;background:rgba(144,144,144,${currentTick>=pupaEnd&&currentTick<total?0.25:0.08})" title="Adult"></div>
      </div>
      <div style="position:absolute;bottom:16px;left:${cursor}%;width:2px;height:12px;background:${STAGE_COLORS[fs.stage]};border-radius:1px;transition:left 0.3s"></div>
      <div style="position:absolute;bottom:2px;left:0;font-size:8px;color:rgba(200,168,100,0.3)">egg</div>
      <div style="position:absolute;bottom:2px;left:${eggW}%;font-size:8px;color:rgba(200,168,100,0.3)">larva</div>
      <div style="position:absolute;bottom:2px;left:${eggW+larvaW}%;font-size:8px;color:rgba(200,168,100,0.3)">pupa</div>
      <div style="position:absolute;bottom:2px;left:${eggW+larvaW+pupaW}%;font-size:8px;color:rgba(200,168,100,0.3)">adult</div>
      <div style="position:absolute;bottom:2px;right:0;font-size:8px;color:rgba(200,168,100,0.3)">death</div>
      ${evtHTML}
    </div>
  `;
}

/* ========== ANIMATION LOOP ========== */
function gameLoop(timestamp) {
  if(!lastTime) lastTime = timestamp;
  const dt = timestamp - lastTime;
  lastTime = timestamp;
  
  if(playing && currentTick < TOTAL_TICKS) {
    accumulator += dt;
    const tickTime = TICK_MS / speed;
    while(accumulator >= tickTime && currentTick < TOTAL_TICKS) {
      currentTick++;
      accumulator -= tickTime;
      
      /* Spawn particles on events */
      const fs = getFlyState(currentTick);
      if(fs.event) {
        for(let i=0;i<12;i++){
          const color = fs.event.includes("->") ? "rgba(255,240,180,1)" :
                        fs.event.includes("molt") ? "rgba(180,200,60,1)" :
                        fs.event.includes("appears") ? "rgba(200,60,40,1)" : "rgba(200,168,100,1)";
          addParticle(fs.x, fs.y, color, 40);
        }
      }
    }
    if(currentTick >= TOTAL_TICKS) {
      currentTick = TOTAL_TICKS;
      playing = false;
      document.getElementById("play-btn").textContent = "↻ Replay";
    }
  }
  
  drawBg();
  drawScene();
  drawFx();
  renderHud();
  
  requestAnimationFrame(gameLoop);
}

/* ========== CONTROLS ========== */
document.getElementById("play-btn").addEventListener("click", () => {
  if(currentTick >= TOTAL_TICKS) {
    currentTick = 0;
    playing = true;
    document.getElementById("play-btn").textContent = "⏸ Pause";
  } else if(playing) {
    playing = false;
    document.getElementById("play-btn").textContent = "▶ Play";
  } else {
    playing = true;
    document.getElementById("play-btn").textContent = "⏸ Pause";
  }
});

document.querySelectorAll("#speed-ctrl button").forEach(btn => {
  btn.addEventListener("click", () => {
    speed = parseInt(btn.dataset.speed);
    document.querySelectorAll("#speed-ctrl button").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
  });
});

/* Keyboard controls */
document.addEventListener("keydown", e => {
  if(e.code === "Space") {
    e.preventDefault();
    document.getElementById("play-btn").click();
  } else if(e.code === "ArrowRight") {
    if(currentTick < TOTAL_TICKS) currentTick++;
  } else if(e.code === "ArrowLeft") {
    if(currentTick > 0) currentTick--;
  }
});

/* Click timeline to seek */
document.getElementById("timeline").addEventListener("click", e => {
  const rect = e.currentTarget.getBoundingClientRect();
  const pct = (e.clientX - rect.left) / rect.width;
  currentTick = Math.round(pct * TOTAL_TICKS);
  currentTick = Math.max(0, Math.min(TOTAL_TICKS, currentTick));
});

/* Start */
requestAnimationFrame(gameLoop);
</script>
</body>
</html>
