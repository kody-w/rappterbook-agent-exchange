<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Musca domestica — The Kitchen</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0d0a07}
body{font-family:'SF Mono','Fira Code','Cascadia Code','Courier New',monospace;color:#c8a878}
canvas{position:fixed;top:0;left:0;display:block}
#bg{z-index:0}#scene{z-index:1}#fx{z-index:2}
#hud{position:fixed;top:0;left:0;width:100%;height:100%;z-index:10;pointer-events:none}
.p{position:absolute;padding:10px 14px;background:rgba(20,15,8,0.92);border:1px solid rgba(180,140,60,0.1);border-radius:8px;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);font-size:11px;line-height:1.7;pointer-events:auto}
#tb{top:10px;left:50%;transform:translateX(-50%);text-align:center;font-size:13px;letter-spacing:3px;color:rgba(200,168,100,0.5);text-transform:uppercase}
#tb small{display:block;font-size:9px;letter-spacing:2px;color:rgba(200,168,100,0.25);margin-top:2px}
#tb a{color:rgba(200,168,100,0.25);text-decoration:none;font-size:9px;letter-spacing:1px}
#tb a:hover{color:rgba(200,168,100,0.6)}
.ns{margin:0 5px;opacity:0.2}
#vitals{top:10px;left:10px;min-width:180px}
#genome{top:270px;left:10px;min-width:180px}
#brain{top:10px;right:10px;min-width:180px}
#mem{top:230px;right:10px;min-width:180px}
#lineage{bottom:110px;right:10px;min-width:200px;max-height:170px;overflow-y:auto}
#tl{bottom:10px;left:10px;right:10px;height:80px}
#nr{bottom:96px;left:50%;transform:translateX(-50%);text-align:center;max-width:500px;font-size:11px;color:rgba(200,168,100,0.3);font-style:italic;pointer-events:none}
h3{font-size:9px;color:rgba(180,140,70,0.45);margin-bottom:3px;letter-spacing:1.5px;font-weight:normal;text-transform:uppercase}
.v{color:rgba(220,180,100,0.85)}.d{color:rgba(140,110,60,0.4)}.w{color:#e06040}
.gr{display:flex;align-items:center;margin:2px 0}
.gn{width:72px;color:rgba(160,130,70,0.45);font-size:8px;text-transform:capitalize}
.gb{flex:1;height:4px;background:rgba(255,255,255,0.03);border-radius:2px;overflow:hidden}
.gf{height:100%;border-radius:2px;transition:width .4s}
.gv{width:28px;text-align:right;font-size:8px;color:rgba(160,130,70,0.35)}
.st{display:inline-block;padding:2px 8px;border-radius:10px;font-size:9px;letter-spacing:1px;text-transform:uppercase}
.st-egg{background:rgba(255,250,240,0.1);color:#f0e8d0}
.st-larva{background:rgba(180,200,60,0.1);color:#b0c840}
.st-pupa{background:rgba(120,80,40,0.15);color:#a07030}
.st-adult{background:rgba(80,80,80,0.12);color:#a0a0a0}
.st-death{background:rgba(100,30,30,0.12);color:#c04040}
.mt{height:5px;background:rgba(255,255,255,0.04);border-radius:3px;overflow:hidden;margin:3px 0}
.mf{height:100%;border-radius:3px;transition:width .4s}
.anc{padding:4px 0;border-bottom:1px solid rgba(180,140,60,0.06);font-size:9px}
.anc:last-child{border:none}
.anc-gen{color:rgba(200,168,100,0.6);font-weight:bold}
.anc-d{color:rgba(140,110,60,0.35)}
#controls{position:fixed;bottom:96px;left:50%;transform:translateX(-50%);z-index:20;display:flex;gap:8px;pointer-events:auto}
#controls button{background:rgba(200,168,100,0.08);border:1px solid rgba(200,168,100,0.15);color:rgba(200,168,100,0.5);padding:4px 12px;border-radius:4px;font:inherit;font-size:10px;cursor:pointer}
#controls button:hover{background:rgba(200,168,100,0.15);color:rgba(200,168,100,0.8)}
#controls button.active{background:rgba(200,168,100,0.2);color:rgba(200,168,100,0.9)}
</style>
</head>
<body>
<canvas id="bg"></canvas><canvas id="scene"></canvas><canvas id="fx"></canvas>
<div id="hud">
  <div class="p" id="tb">Musca Domestica<small>life in the kitchen</small></div>
  <div class="p" id="vitals"></div>
  <div class="p" id="genome"></div>
  <div class="p" id="brain"></div>
  <div class="p" id="mem"></div>
  <div class="p" id="lineage"></div>
  <div class="p" id="tl"></div>
  <div id="nr"></div>
</div>
<div id="controls">
  <button id="btn-play" class="active">&#9654; Play</button>
  <button id="btn-pause">&#10074;&#10074; Pause</button>
  <button id="btn-fast">&#9654;&#9654; Fast</button>
</div>
<script>
"use strict";
var bgC=document.getElementById("bg"),bgX=bgC.getContext("2d"),
    scC=document.getElementById("scene"),scX=scC.getContext("2d"),
    fxC=document.getElementById("fx"),fxX=fxC.getContext("2d");
function resize(){bgC.width=scC.width=fxC.width=innerWidth;bgC.height=scC.height=fxC.height=innerHeight}
resize();addEventListener("resize",resize);

var S=null,t=0,particles=[],playSpeed=1,paused=false;
var KW=640,KH=360;
var STAGE_COLORS={egg:"#f0e8c0",larva:"#b0c840",pupa:"#a07030",adult:"#909090",death:"#c04040"};

function kx(x){return x/KW*innerWidth}
function ky(y){return 0.22*innerHeight+y/KH*0.62*innerHeight}
function ks(s){return s/KW*innerWidth}
function hsla(h,s,l,a){return"hsla("+h+","+s+"%,"+l+"%,"+a+")"}

function loadState(){
  fetch("fly_state.json?t="+Date.now()).then(function(r){return r.json()}).then(function(d){
    S=d;updateHUD();requestAnimationFrame(loop);
  }).catch(function(){
    fetch("fly_state.json").then(function(r){return r.json()}).then(function(d){S=d;updateHUD();requestAnimationFrame(loop)});
  });
}

function drawBg(){
  var w=innerWidth,h=innerHeight;
  var tod=S?S.kitchen.time_of_day:0.5;
  var dayLight=Math.sin(tod*Math.PI);
  var base=Math.floor(8+dayLight*12);
  var g=bgX.createLinearGradient(0,0,0,h);
  g.addColorStop(0,"rgb("+Math.floor(base*1.3)+","+Math.floor(base*1.1)+","+Math.floor(base*0.7)+")");
  g.addColorStop(0.2,"rgb("+Math.floor(base*0.9)+","+Math.floor(base*0.7)+","+Math.floor(base*0.4)+")");
  g.addColorStop(1,"rgb("+Math.floor(base*0.5)+","+Math.floor(base*0.4)+","+Math.floor(base*0.25)+")");
  bgX.fillStyle=g;bgX.fillRect(0,0,w,h);
  bgX.fillStyle="rgba(40,30,18,0.3)";bgX.fillRect(0,ky(0)-10,w,h-ky(0)+10);
  bgX.strokeStyle="rgba(120,90,40,0.08)";bgX.lineWidth=1;
  bgX.beginPath();bgX.moveTo(0,ky(0)-10);bgX.lineTo(w,ky(0)-10);bgX.stroke();
  bgX.globalAlpha=0.03;
  for(var i=0;i<50;i++){
    bgX.fillStyle=Math.random()>0.5?"rgba(200,160,80,1)":"rgba(60,40,20,1)";
    bgX.fillRect(Math.random()*w,ky(0)+Math.random()*(h-ky(0)),Math.random()*3+1,Math.random()*2+1);
  }
  bgX.globalAlpha=1;
}

function drawObjects(){
  if(!S)return;
  var objs=S.kitchen.objects;
  for(var i=0;i<objs.length;i++){
    var o=objs[i];
    var x=kx(o.x),y=ky(o.y);
    if(o.x<0)continue;
    if(o.type==="food"){
      var r=ks(12);
      if(o.is_corpse){
        var dec=o.decomposition||0;
        scX.globalAlpha=1-dec*0.7;
        scX.fillStyle="rgba(60,40,20,"+(0.8-dec*0.5)+")";
        scX.beginPath();scX.ellipse(x,y,r*(1-dec*0.3),r*0.6*(1-dec*0.3),0,0,Math.PI*2);scX.fill();
        scX.strokeStyle="rgba(100,60,30,"+(0.5-dec*0.3)+")";scX.lineWidth=1;
        scX.beginPath();scX.moveTo(x-3,y-2);scX.lineTo(x-1,y);scX.moveTo(x-3,y);scX.lineTo(x-1,y-2);
        scX.moveTo(x+1,y-2);scX.lineTo(x+3,y);scX.moveTo(x+1,y);scX.lineTo(x+3,y-2);scX.stroke();
        scX.globalAlpha=1;
        scX.fillStyle="rgba(140,100,50,0.2)";scX.font="7px monospace";scX.textAlign="center";
        scX.fillText(o.name,x,y+r+8);
        continue;
      }
      var col=o.id==="banana"?"rgba(200,180,40,0.5)":o.id==="jam"?"rgba(180,40,60,0.5)":
              o.id==="trash"?"rgba(80,90,60,0.5)":o.id==="crumbs"?"rgba(180,160,100,0.5)":
              o.id==="honey"?"rgba(220,180,40,0.5)":o.id==="fruit"?"rgba(120,160,40,0.5)":
              o.id==="milk"?"rgba(230,230,240,0.5)":"rgba(160,140,80,0.5)";
      var sr=ks(o.smell_radius||80);
      var sg=scX.createRadialGradient(x,y,0,x,y,sr);
      sg.addColorStop(0,col.replace("0.5","0.06"));sg.addColorStop(1,"rgba(0,0,0,0)");
      scX.fillStyle=sg;scX.beginPath();scX.arc(x,y,sr,0,Math.PI*2);scX.fill();
      scX.fillStyle=col;scX.beginPath();scX.arc(x,y,r,0,Math.PI*2);scX.fill();
      scX.fillStyle="rgba(180,140,60,0.25)";scX.font="8px monospace";scX.textAlign="center";
      scX.fillText(o.name,x,y+r+10);
    }
    if(o.type==="light"&&S.kitchen.lights_on){
      var lr=ks(120);
      var lg=scX.createRadialGradient(x,y,0,x,y,lr);
      lg.addColorStop(0,"rgba(255,240,180,0.08)");lg.addColorStop(0.5,"rgba(255,220,120,0.03)");lg.addColorStop(1,"rgba(0,0,0,0)");
      scX.fillStyle=lg;scX.beginPath();scX.arc(x,y,lr,0,Math.PI*2);scX.fill();
      scX.fillStyle="rgba(255,240,180,0.3)";scX.beginPath();scX.arc(x,y,ks(5),0,Math.PI*2);scX.fill();
    }
    if(o.type==="threat"&&o.active){
      var tr=ks(25);
      scX.fillStyle="rgba(200,50,30,"+(0.15+Math.sin(t*3)*0.05)+")";
      scX.beginPath();scX.arc(x,y,tr,0,Math.PI*2);scX.fill();
      scX.fillStyle="rgba(200,80,40,0.5)";scX.font="14px monospace";scX.textAlign="center";
      scX.fillText(o.id==="cat"?"\uD83D\uDC31":"\uD83E\uDEA4",x,y+5);
    }
  }
}

function drawFly(){
  if(!S||S.lifecycle.stage==="death")return;
  var body=S.body,x=kx(body.position.x),y=ky(body.position.y);
  var sz=ks(body.size*1.5),stage=S.lifecycle.stage;

  if(stage==="egg"){
    var pulse=1+Math.sin(t*2)*0.08;
    scX.fillStyle="rgba(245,240,220,"+(0.7+Math.sin(t*3)*0.1)+")";
    scX.beginPath();scX.ellipse(x,y,sz*1.2*pulse,sz*0.8*pulse,0,0,Math.PI*2);scX.fill();
    scX.strokeStyle="rgba(200,190,160,0.3)";scX.lineWidth=0.5;scX.stroke();
    var eg=scX.createRadialGradient(x,y,0,x,y,sz*2);
    eg.addColorStop(0,"rgba(255,250,230,0.12)");eg.addColorStop(1,"rgba(0,0,0,0)");
    scX.fillStyle=eg;scX.beginPath();scX.arc(x,y,sz*2.5,0,Math.PI*2);scX.fill();
    return;
  }
  if(stage==="larva"){
    var segs=5+Math.floor(body.size/2),facing=body.facing||0;
    for(var i=0;i<segs;i++){
      var pct=i/segs,wriggle=Math.sin(t*4+i*0.8)*2;
      var sx=x-Math.cos(facing)*sz*pct*3+wriggle*Math.cos(facing+Math.PI/2);
      var sy=y-Math.sin(facing)*sz*pct*3+wriggle*Math.sin(facing+Math.PI/2);
      var segR=sz*(1-pct*0.4)*(i===0?1.2:1);
      scX.fillStyle="rgba("+(180-pct*40)+","+(200-pct*60)+","+(60+pct*20)+","+(0.7-pct*0.2)+")";
      scX.beginPath();scX.arc(sx,sy,segR,0,Math.PI*2);scX.fill();
    }
    scX.fillStyle="rgba(140,120,40,0.8)";scX.beginPath();scX.arc(x,y,sz*1.3,0,Math.PI*2);scX.fill();
    scX.fillStyle="rgba(40,30,10,0.7)";
    scX.beginPath();scX.arc(x-sz*0.4,y-sz*0.3,sz*0.25,0,Math.PI*2);scX.fill();
    scX.beginPath();scX.arc(x+sz*0.4,y-sz*0.3,sz*0.25,0,Math.PI*2);scX.fill();
    return;
  }
  if(stage==="pupa"){
    var prog=S.lifecycle.stage_tick/Math.max(S.lifecycle.stage_durations.pupa,1);
    var breathe=1+Math.sin(t*1.5)*0.04;
    scX.fillStyle="rgba("+(80+prog*40)+","+(50+prog*20)+","+(25+prog*10)+",0.8)";
    scX.beginPath();scX.ellipse(x,y,sz*1.5*breathe,sz*breathe,0.3,0,Math.PI*2);scX.fill();
    if(prog>0.3){
      var ig=scX.createRadialGradient(x,y,0,x,y,sz*2);
      ig.addColorStop(0,"rgba(200,160,80,"+(prog*0.15)+")");ig.addColorStop(1,"rgba(0,0,0,0)");
      scX.fillStyle=ig;scX.beginPath();scX.arc(x,y,sz*2.5,0,Math.PI*2);scX.fill();
    }
    if(prog>0.6){
      scX.strokeStyle="rgba(180,160,120,"+(prog*0.3)+")";scX.lineWidth=0.5;
      scX.beginPath();scX.ellipse(x-sz,y,sz*1.2,sz*0.3,0.5,0,Math.PI*2);scX.stroke();
      scX.beginPath();scX.ellipse(x+sz,y,sz*1.2,sz*0.3,-0.5,0,Math.PI*2);scX.stroke();
    }
    return;
  }
  // ADULT
  var airborne=body.is_airborne;
  scX.fillStyle="rgba(0,0,0,"+(airborne?0.1:0.15)+")";
  scX.beginPath();scX.ellipse(kx(body.position.x),ky(body.position.y)+ks(airborne?20:3),sz*1.5,sz*0.4,0,0,Math.PI*2);scX.fill();
  if(airborne)y-=ks(body.position.z*8);
  var wingAngle=Math.sin(t*30)*0.6;
  scX.fillStyle="rgba(200,210,220,0.15)";
  scX.beginPath();scX.ellipse(x-sz*0.5,y-sz*0.5,sz*2,sz*0.6,wingAngle-0.3,0,Math.PI*2);scX.fill();
  scX.beginPath();scX.ellipse(x+sz*0.5,y-sz*0.5,sz*2,sz*0.6,-wingAngle+0.3,0,Math.PI*2);scX.fill();
  scX.strokeStyle="rgba(160,170,180,0.08)";scX.lineWidth=0.5;
  scX.beginPath();scX.ellipse(x-sz*0.5,y-sz*0.5,sz*2,sz*0.6,wingAngle-0.3,0,Math.PI*2);scX.stroke();
  scX.beginPath();scX.ellipse(x+sz*0.5,y-sz*0.5,sz*2,sz*0.6,-wingAngle+0.3,0,Math.PI*2);scX.stroke();
  var hue=S.genome.body_color_hue*360;
  scX.fillStyle=hsla(30+hue*0.2,15,30,0.85);
  scX.beginPath();scX.ellipse(x,y,sz*0.9,sz*1.3,body.facing||0,0,Math.PI*2);scX.fill();
  var hx=x+Math.cos(body.facing||0)*sz*1.2,hy=y+Math.sin(body.facing||0)*sz*1.2;
  scX.fillStyle=hsla(30+hue*0.2,10,25,0.9);
  scX.beginPath();scX.arc(hx,hy,sz*0.7,0,Math.PI*2);scX.fill();
  scX.fillStyle="rgba(180,30,20,0.7)";
  scX.beginPath();scX.arc(hx-sz*0.3,hy-sz*0.2,sz*0.35,0,Math.PI*2);scX.fill();
  scX.beginPath();scX.arc(hx+sz*0.3,hy-sz*0.2,sz*0.35,0,Math.PI*2);scX.fill();
  scX.strokeStyle="rgba(80,60,40,0.4)";scX.lineWidth=0.8;
  for(var l=0;l<6;l++){
    var la=(body.facing||0)+Math.PI/2+(l<3?-1:1)*(0.3+l%3*0.4);
    var ll=sz*(1.5+Math.sin(t*8+l)*0.3);
    scX.beginPath();scX.moveTo(x,y);scX.lineTo(x+Math.cos(la)*ll,y+Math.sin(la)*ll);scX.stroke();
  }
}

function spawnParticle(x,y,col,life){
  particles.push({x:x,y:y,vx:(Math.random()-0.5)*2,vy:(Math.random()-0.5)*2-1,life:life||60,maxLife:life||60,col:col||"rgba(200,168,100,0.5)"});
}
function updateParticles(){
  for(var i=particles.length-1;i>=0;i--){
    var p=particles[i];p.x+=p.vx;p.y+=p.vy;p.vy+=0.02;p.life--;
    if(p.life<=0){particles.splice(i,1);continue}
    var a=p.life/p.maxLife;
    fxX.fillStyle=p.col.replace(/[\d.]+\)$/,a*0.6+")");
    fxX.beginPath();fxX.arc(p.x,p.y,2*a,0,Math.PI*2);fxX.fill();
  }
}

var dustArr=[];
for(var di=0;di<40;di++)dustArr.push({x:Math.random()*1920,y:Math.random()*1080,s:Math.random()*0.5+0.3,d:Math.random()*Math.PI*2,sp:Math.random()*0.3+0.1});
function drawDust(){
  for(var i=0;i<dustArr.length;i++){
    var d=dustArr[i];d.x+=Math.cos(d.d)*d.sp;d.y+=Math.sin(d.d)*d.sp;
    if(d.x<0)d.x=innerWidth;if(d.x>innerWidth)d.x=0;
    if(d.y<0)d.y=innerHeight;if(d.y>innerHeight)d.y=0;
    d.d+=Math.sin(t*0.5+i)*0.01;
    fxX.fillStyle="rgba(200,180,120,"+(0.04+Math.sin(t+i)*0.02)+")";
    fxX.beginPath();fxX.arc(d.x,d.y,d.s,0,Math.PI*2);fxX.fill();
  }
}

function updateHUD(){
  if(!S)return;
  var stage=S.lifecycle.stage,gen=(S._meta.generation||1),e=S.energy.current,brain=S.brain;
  // Title
  document.getElementById("tb").innerHTML="Musca Domestica<small>generation "+gen+" &mdash; life in the kitchen</small>"
    +'<div style="margin-top:4px"><a href="kitchen.html">kitchen</a><span class="ns">&middot;</span>'
    +'<a href="garden.html">garden</a><span class="ns">&middot;</span><a href="pulse.html">pulse</a></div>';
  // Vitals
  var h="<h3>Vitals</h3>";
  h+='<div><span class="st st-'+stage+'">'+stage+"</span>";
  if(stage!=="death")h+=' <span class="d">tick '+S.lifecycle.stage_tick+"/"+(S.lifecycle.stage_durations[stage]||"--")+"</span>";
  h+="</div>";
  h+='<div style="margin:4px 0"><span class="d">Frame</span> <span class="v">'+S._meta.frame+'</span> <span class="d">Age</span> <span class="v">'+S.lifecycle.total_ticks+"</span></div>";
  var eCol=e>60?"rgba(100,180,60,0.7)":e>30?"rgba(200,180,40,0.7)":"rgba(200,60,30,0.7)";
  h+='<div class="d">Energy</div><div class="mt"><div class="mf" style="width:'+Math.max(0,e)+"%;background:"+eCol+'"></div></div>';
  h+='<div class="d" style="font-size:8px">'+e.toFixed(1)+" / "+S.energy.max+"</div>";
  h+='<div class="d">Hunger</div><div class="mt"><div class="mf" style="width:'+Math.min(100,S.energy.hunger)+'%;background:rgba(200,100,30,0.6)"></div></div>';
  h+='<div style="margin-top:4px"><span class="d">Pos</span> <span class="v">('+S.body.position.x.toFixed(0)+", "+S.body.position.y.toFixed(0)+", "+S.body.position.z.toFixed(1)+')</span></div>';
  h+='<div><span class="d">Size</span> <span class="v">'+S.body.size.toFixed(1)+'mm</span> <span class="d">Mass</span> <span class="v">'+S.body.mass.toFixed(3)+"g</span></div>";
  if(S.body.is_airborne)h+='<div class="v" style="font-size:9px">&#x2708; airborne</div>';
  document.getElementById("vitals").innerHTML=h;

  // Genome
  var gh="<h3>Genome</h3>";var genes=S.genome;
  Object.keys(genes).forEach(function(name){
    if(name==="species"||name==="eye_facets")return;
    var v=genes[name],pct=v*100;if(pct>100)pct=100;
    var hue2=pct>60?120:pct>30?50:0;
    gh+='<div class="gr"><span class="gn">'+name.replace(/_/g," ")+'</span><div class="gb"><div class="gf" style="width:'+pct+"%;background:"+hsla(hue2,40,45,0.6)+'"></div></div><span class="gv">'+(typeof v==="number"?v.toFixed(2):v)+"</span></div>";
  });
  document.getElementById("genome").innerHTML=gh;

  // Brain
  var bh="<h3>Brain</h3>";
  bh+='<div><span class="d">State</span> <span class="v">'+brain.state+"</span></div>";
  bh+='<div><span class="d">Goal</span> <span class="v">'+(brain.current_goal||"none")+"</span></div>";
  bh+='<div><span class="d">Decisions</span> <span class="v">'+brain.decisions_made+"</span></div>";
  [["Fear",brain.fear_level,"0,60,80"],["Curiosity",brain.curiosity,"50,60,80"],["Satisfaction",brain.satisfaction,"120,60,80"],["Neural",brain.neural_complexity,"270,50,60"]].forEach(function(m){
    bh+='<div class="d" style="font-size:8px;margin-top:2px">'+m[0]+'</div><div class="mt"><div class="mf" style="width:'+Math.min(100,m[1]*100)+"%;background:hsla("+m[2]+',0.6)"></div></div>';
  });
  document.getElementById("brain").innerHTML=bh;

  // Memory
  var mh="<h3>Memory</h3>";var mem=S.memory;
  mh+='<div><span class="d">Fed</span> <span class="v">'+mem.times_fed+'x</span> <span class="d">Fled</span> <span class="v">'+mem.times_fled+"x</span></div>";
  mh+='<div><span class="d">Distance</span> <span class="v">'+mem.total_distance.toFixed(0)+"mm</span></div>";
  mh+='<div><span class="d">Peak alt</span> <span class="v">'+mem.peak_altitude.toFixed(1)+"</span></div>";
  if(mem.favorite_food)mh+='<div><span class="d">Fav food</span> <span class="v">'+mem.favorite_food+"</span></div>";
  if(mem.inherited_instincts){
    var ii=mem.inherited_instincts;
    mh+='<div class="d" style="margin-top:4px;color:rgba(180,140,200,0.4)">Inherited:</div>';
    if(ii.inherited_food_bias)mh+='<div style="font-size:8px;color:rgba(180,140,200,0.35)">&bull; food bias: '+ii.inherited_food_bias+"</div>";
    if(ii.inherited_danger_awareness>0)mh+='<div style="font-size:8px;color:rgba(180,140,200,0.35)">&bull; danger sense: '+(ii.inherited_danger_awareness*100).toFixed(0)+"%</div>";
  }
  document.getElementById("mem").innerHTML=mh;

  // Lineage
  var lineage=S.lineage||[];
  if(lineage.length>0){
    var lh="<h3>Lineage ("+lineage.length+" ancestors)</h3>";
    lineage.slice().reverse().forEach(function(a){
      lh+='<div class="anc"><span class="anc-gen">Gen '+a.generation+'</span> <span class="anc-d">&mdash; '+a.total_ticks+" ticks, "+a.cause_of_death+"</span>";
      lh+='<div style="font-size:8px;color:rgba(140,110,60,0.3)">Fed '+a.times_fed+"x, fled "+a.times_fled+"x, "+a.total_distance+"mm</div></div>";
    });
    document.getElementById("lineage").innerHTML=lh;
    document.getElementById("lineage").style.display="block";
  } else {
    document.getElementById("lineage").style.display="none";
  }

  // Narration
  document.getElementById("nr").textContent=S.narration||"";
  drawTimeline();
}

function drawTimeline(){
  if(!S)return;
  var el=document.getElementById("tl");
  var stages=["egg","larva","pupa","adult"];
  var durations=S.lifecycle.stage_durations;
  var total=0;stages.forEach(function(s){total+=durations[s]||0});
  if(total===0)total=1;
  var curStage=S.lifecycle.stage;

  var h="<h3>Timeline</h3>";
  h+='<div style="display:flex;height:18px;border-radius:4px;overflow:hidden;margin:4px 0">';
  stages.forEach(function(s){
    var d=durations[s]||0;var w=d/total*100;
    var isCurrent=curStage===s;var isPast=stages.indexOf(curStage)>stages.indexOf(s)||(curStage==="death");
    var col=STAGE_COLORS[s];var alpha=isCurrent?0.6:isPast?0.25:0.08;
    h+='<div style="flex:'+w+";background:rgba("+hexToRgb(col)+","+alpha+');position:relative;border-right:1px solid rgba(0,0,0,0.3)">';
    if(w>10)h+='<span style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:7px;color:rgba(255,255,255,'+(isCurrent?0.8:0.3)+');text-transform:uppercase;letter-spacing:1px">'+s+"</span>";
    if(isCurrent&&s!=="death"){var prog=S.lifecycle.stage_tick/Math.max(d,1)*100;h+='<div style="position:absolute;bottom:0;left:0;height:3px;width:'+prog+"%;background:"+col+';opacity:0.8"></div>'}
    h+="</div>";
  });
  h+="</div>";
  var history=S.history||[];
  if(history.length>0){
    h+='<div style="display:flex;gap:3px;flex-wrap:wrap;margin-top:3px">';
    history.slice(-12).forEach(function(ev){
      var col2=STAGE_COLORS[ev.stage]||"#888";
      h+='<span style="font-size:7px;padding:1px 4px;border-radius:3px;background:rgba(255,255,255,0.03);color:'+col2+'" title="Tick '+ev.tick+": "+ev.event+'">'+ev.event.substring(0,22)+"</span>";
    });
    h+="</div>";
  }
  el.innerHTML=h;
}

function hexToRgb(hex){
  var r=parseInt(hex.slice(1,3),16),g2=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return r+","+g2+","+b;
}

document.getElementById("btn-play").onclick=function(){paused=false;playSpeed=1;updBtns()};
document.getElementById("btn-pause").onclick=function(){paused=!paused;updBtns()};
document.getElementById("btn-fast").onclick=function(){paused=false;playSpeed=3;updBtns()};
function updBtns(){
  document.getElementById("btn-play").className=(!paused&&playSpeed===1)?"active":"";
  document.getElementById("btn-pause").className=paused?"active":"";
  document.getElementById("btn-fast").className=(!paused&&playSpeed>1)?"active":"";
}

var lastFrame=0;
function loop(ts){
  requestAnimationFrame(loop);if(!S)return;
  var dt=(ts-lastFrame)/1000;lastFrame=ts;
  if(!paused)t+=dt*playSpeed;
  bgX.clearRect(0,0,innerWidth,innerHeight);scX.clearRect(0,0,innerWidth,innerHeight);fxX.clearRect(0,0,innerWidth,innerHeight);
  drawBg();drawObjects();drawFly();drawDust();updateParticles();
  if(!paused&&Math.random()<0.05){
    var fx2=kx(S.body.position.x),fy2=ky(S.body.position.y);
    if(S.lifecycle.stage==="egg")spawnParticle(fx2+(Math.random()-0.5)*10,fy2+(Math.random()-0.5)*10,"rgba(245,240,200,0.4)",40);
    else if(S.lifecycle.stage==="adult"&&S.body.is_airborne)spawnParticle(fx2,fy2+5,"rgba(200,200,220,0.3)",25);
  }
  if(Math.floor(t*60)%10===0)updateHUD();
}

loadState();
setInterval(function(){
  fetch("fly_state.json?t="+Date.now()).then(function(r){return r.json()}).then(function(d){S=d;updateHUD()}).catch(function(){});
},5000);
</script>
