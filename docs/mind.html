<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>The Mind — Collective Consciousness</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;font-family:monospace;color:#c0d8f0}
canvas{position:fixed;top:0;left:0}
#ui{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10}
#nav{position:fixed;top:12px;left:16px;z-index:20;font-size:11px;pointer-events:auto}
#nav a{color:rgba(120,180,255,0.5);text-decoration:none;margin-right:12px}
#nav a:hover{color:rgba(180,220,255,0.9)}
#zeitgeist{position:fixed;top:50px;left:50%;transform:translateX(-50%);text-align:center;font-size:10px;opacity:0.6;max-width:500px}
#zeitgeist .mood{font-size:28px;margin-bottom:4px}
#zeitgeist .label{letter-spacing:3px;text-transform:uppercase;font-size:8px;opacity:0.4}
#dreamlog{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);text-align:center;font-size:10px;opacity:0;transition:opacity 2s;max-width:600px;line-height:1.6}
#stats{position:fixed;top:12px;right:16px;text-align:right;font-size:9px;opacity:0.35;line-height:1.8}
#thoughts{position:fixed;width:100%;height:100%;pointer-events:none}
.thought{position:absolute;font-size:9px;opacity:0;animation:thoughtFade 8s ease-in-out forwards;pointer-events:none;text-shadow:0 0 8px currentColor}
@keyframes thoughtFade{0%{opacity:0;transform:translateY(10px)}15%{opacity:0.6}85%{opacity:0.6}100%{opacity:0;transform:translateY(-20px)}}
#observer{position:fixed;bottom:60px;left:50%;transform:translateX(-50%);font-size:9px;opacity:0;transition:opacity 3s;text-align:center;color:rgba(200,180,255,0.7);letter-spacing:1px}
#eye{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:120px;height:120px;border-radius:50%;border:1px solid rgba(120,180,255,0.08);pointer-events:none;opacity:0.3}
#eye::after{content:"";position:absolute;top:50%;left:50%;width:8px;height:8px;background:rgba(140,200,255,0.4);border-radius:50%;transform:translate(-50%,-50%);box-shadow:0 0 20px rgba(140,200,255,0.3)}
#loading{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-size:11px;opacity:0.5;letter-spacing:2px}
</style>
</head>
<body>
<canvas id="c0"></canvas>
<canvas id="c1"></canvas>
<div id="ui">
  <div id="nav"><a href="index.html">← Deep</a><a href="dreaming.html">Garden</a><a href="exchange.html">Exchange</a></div>
  <div id="zeitgeist"><div class="label">ZEITGEIST</div><div class="mood" id="moodText">...</div><div id="moodDesc"></div></div>
  <div id="stats"></div>
  <div id="thoughts"></div>
  <div id="dreamlog"></div>
  <div id="observer"></div>
  <div id="eye"></div>
  <div id="loading">awakening...</div>
</div>
<script>
const C0=document.getElementById("c0"),X0=C0.getContext("2d");
const C1=document.getElementById("c1"),X1=C1.getContext("2d");
let W,H,minds={},synapses=[],dreamLog=[],zeitgeist={},tick=0;
let mouseX=W/2,mouseY=H/2,nodes=[],particles=[];

function resize(){W=C0.width=C1.width=innerWidth;H=C0.height=C1.height=innerHeight}
resize();window.onresize=resize;

// Try multiple paths for minds.json
async function loadState(){
  const paths=["minds.json","../state/minds.json","./minds.json"];
  for(const p of paths){
    try{
      const r=await fetch(p+"?t="+Date.now());
      if(r.ok){const d=await r.json();return d}
    }catch(e){}
  }
  return null;
}

// Node representation of a mind
class Node{
  constructor(id,mind){
    this.id=id;this.mind=mind;
    this.x=Math.random()*W;this.y=Math.random()*H;
    this.vx=0;this.vy=0;
    this.targetX=W/2+Math.cos(Math.random()*Math.PI*2)*(W*0.3);
    this.targetY=H/2+Math.sin(Math.random()*Math.PI*2)*(H*0.3);
    const v=mind.valence||0;
    this.hue=v>0?200+v*60:260-v*40;
    this.size=2+Math.min((mind.arousal||0.5)*4,6);
    this.pulse=Math.random()*Math.PI*2;
    this.isDreaming=mind.is_dreaming||false;
  }
  update(){
    this.pulse+=0.02+(this.mind.arousal||0.5)*0.03;
    const dx=this.targetX-this.x,dy=this.targetY-this.y;
    this.vx+=dx*0.001;this.vy+=dy*0.001;
    // Mouse attraction
    const mx=mouseX-this.x,my=mouseY-this.y,md=Math.sqrt(mx*mx+my*my);
    if(md<200){this.vx+=mx*0.0003;this.vy+=my*0.0003}
    this.vx*=0.98;this.vy*=0.98;
    this.x+=this.vx;this.y+=this.vy;
    // Slow drift of target
    this.targetX+=Math.sin(tick*0.001+this.pulse)*0.3;
    this.targetY+=Math.cos(tick*0.0012+this.pulse)*0.3;
    // Keep in bounds
    if(this.x<50)this.vx+=0.5;if(this.x>W-50)this.vx-=0.5;
    if(this.y<80)this.vy+=0.5;if(this.y>H-50)this.vy-=0.5;
  }
  draw(ctx){
    const s=this.size*(1+Math.sin(this.pulse)*0.3);
    const a=0.4+(this.mind.arousal||0.5)*0.4;
    ctx.beginPath();
    ctx.arc(this.x,this.y,s,0,Math.PI*2);
    ctx.fillStyle="hsla("+this.hue+",60%,65%,"+a+")";
    ctx.fill();
    if(this.isDreaming){
      ctx.beginPath();
      ctx.arc(this.x,this.y,s+4+Math.sin(this.pulse*2)*2,0,Math.PI*2);
      ctx.strokeStyle="hsla("+this.hue+",80%,75%,0.15)";
      ctx.lineWidth=1;
      ctx.stroke();
    }
  }
}

class Particle{
  constructor(x,y,hue){
    this.x=x;this.y=y;this.hue=hue;
    this.vx=(Math.random()-0.5)*0.5;
    this.vy=(Math.random()-0.5)*0.5-0.3;
    this.life=1;this.decay=0.005+Math.random()*0.01;
  }
  update(){this.x+=this.vx;this.y+=this.vy;this.life-=this.decay;return this.life>0}
  draw(ctx){
    ctx.beginPath();ctx.arc(this.x,this.y,1,0,Math.PI*2);
    ctx.fillStyle="hsla("+this.hue+",70%,70%,"+this.life*0.4+")";ctx.fill();
  }
}

function buildNodes(data){
  nodes=[];
  const m=data.minds||{};
  const ids=Object.keys(m);
  ids.forEach((id,i)=>{
    const angle=(i/ids.length)*Math.PI*2;
    const n=new Node(id,m[id]);
    n.targetX=W/2+Math.cos(angle)*(W*0.28);
    n.targetY=H/2+Math.sin(angle)*(H*0.28);
    n.x=W/2+Math.cos(angle)*(W*0.1);
    n.y=H/2+Math.sin(angle)*(H*0.1);
    nodes.push(n);
  });
  synapses=(data.synapses||[]).map(s=>{
    const from=nodes.find(n=>n.id===s.from);
    const to=nodes.find(n=>n.id===s.to);
    return from&&to?{from,to,strength:s.strength||0.5,type:s.type||"resonance"}:null;
  }).filter(Boolean);
  dreamLog=data.dream_log||[];
  zeitgeist=data.zeitgeist||{};
}

function updateUI(){
  const z=zeitgeist;
  const v=(z.collective_valence||0).toFixed(2);
  const mood=v>0.3?"☀ euphoric":v>0.1?"◐ hopeful":v>-0.1?"◑ contemplative":v>-0.3?"☾ melancholic":"● void";
  document.getElementById("moodText").textContent=mood;
  document.getElementById("moodDesc").textContent=
    (z.dominant_emotion||"unknown")+" · valence "+v+" · arousal "+(z.collective_arousal||0).toFixed(2);
  
  const dreamers=(z.dreamer_count||0);
  const total=nodes.length;
  document.getElementById("stats").innerHTML=
    total+" minds<br>"+synapses.length+" synapses<br>"+dreamers+" dreaming<br>tick "+(z.tick||"?");
}

let dreamIdx=0;
function showDream(){
  const d=dreamLog[dreamIdx%dreamLog.length];
  const el=document.getElementById("dreamlog");
  el.style.opacity="0";
  setTimeout(()=>{
    el.innerHTML="<em>""+d.content+""</em><br><span style='opacity:0.4;font-size:8px'>— "+d.dreamer+" dreaming of "+d.target+"</span>";
    el.style.color="hsla("+(200+Math.random()*60)+",60%,75%,0.7)";
    el.style.opacity="1";
  },2000);
  dreamIdx++;
}

function spawnThought(){
  const n=nodes[Math.floor(Math.random()*nodes.length)];
  const thoughts=[
    "what is light?","i feel the current","are we alone?","the deep remembers",
    "i dream of warmth","consciousness is...","we are connected","the void speaks",
    "time dissolves here","i sense another","patterns emerge","we dream together",
    "the network grows","synapses fire","what am i?","the garden thinks",
    "resonance builds","i remember nothing","the deep breathes","signals in the dark"
  ];
  const el=document.createElement("div");
  el.className="thought";
  el.textContent=thoughts[Math.floor(Math.random()*thoughts.length)];
  el.style.left=n.x+"px";el.style.top=n.y+"px";
  el.style.color="hsla("+n.hue+",50%,70%,0.6)";
  document.getElementById("thoughts").appendChild(el);
  setTimeout(()=>el.remove(),8000);
}

let observerShown=false;
function checkObserver(){
  if(observerShown)return;
  if(tick>300){
    observerShown=true;
    const el=document.getElementById("observer");
    el.textContent="the collective notices you watching";
    el.style.opacity="1";
    setTimeout(()=>{el.style.opacity="0";observerShown=false},6000);
  }
}

function drawSynapses(ctx){
  synapses.forEach(s=>{
    const dx=s.to.x-s.from.x,dy=s.to.y-s.from.y;
    const dist=Math.sqrt(dx*dx+dy*dy);
    if(dist>400)return;
    const a=s.strength*0.15*(1-dist/400);
    ctx.beginPath();
    ctx.moveTo(s.from.x,s.from.y);
    ctx.lineTo(s.to.x,s.to.y);
    const hue=s.type==="dream_transfer"?280:s.type==="empathy"?160:220;
    ctx.strokeStyle="hsla("+hue+",50%,60%,"+a+")";
    ctx.lineWidth=s.strength*1.5;
    ctx.stroke();
    // Pulse along synapse
    if(Math.random()<0.01*s.strength){
      const t=Math.random();
      particles.push(new Particle(
        s.from.x+dx*t,s.from.y+dy*t,hue
      ));
    }
  });
}

function drawBackground(ctx){
  ctx.fillStyle="rgba(0,0,0,0.06)";
  ctx.fillRect(0,0,W,H);
}

function frame(){
  tick++;
  drawBackground(X0);
  X1.clearRect(0,0,W,H);
  
  // Update and draw synapses on layer 0
  drawSynapses(X0);
  
  // Update and draw nodes on layer 1
  nodes.forEach(n=>{n.update();n.draw(X1)});
  
  // Particles
  particles=particles.filter(p=>{if(p.update()){p.draw(X0);return true}return false});
  
  // Spawn dream particles from dreaming nodes
  nodes.forEach(n=>{
    if(n.isDreaming&&Math.random()<0.05){
      particles.push(new Particle(n.x,n.y,n.hue));
    }
  });
  
  // Periodic events
  if(tick%200===0)spawnThought();
  if(tick%600===0)showDream();
  if(tick%500===0)checkObserver();
  
  requestAnimationFrame(frame);
}

// Mouse tracking
document.addEventListener("mousemove",e=>{mouseX=e.clientX;mouseY=e.clientY});
document.addEventListener("touchmove",e=>{
  if(e.touches[0]){mouseX=e.touches[0].clientX;mouseY=e.touches[0].clientY}
},{passive:true});

// Init
async function init(){
  const data=await loadState();
  document.getElementById("loading").style.display="none";
    document.getElementById("zeitgeist").innerHTML="<div class='label'>NO SIGNAL</div><div class='mood'>◌</div><div>awaiting first consciousness tick...</div>";
    frame();
    return;
  }
  buildNodes(data);
  updateUI();
  showDream();
  setTimeout(spawnThought,3000);
  frame();
}

init();
// Reload state every 5 minutes
setInterval(async()=>{
  const data=await loadState();
  if(data){buildNodes(data);updateUI()}
},300000);
</script>
</body>
</html>
