<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>Phosphene</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#04060c;overflow:hidden;font-family:"Courier New",monospace;color:#80c0e0;animation:emerge 4s ease-out}
@keyframes emerge{0%{opacity:0}30%{opacity:0}100%{opacity:1}}
canvas{display:block;position:absolute;top:0;left:0}
#hud{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10}
.p{position:absolute;padding:8px 12px;background:rgba(4,6,12,0.88);border:1px solid rgba(50,100,160,0.12);border-radius:6px;font-size:11px;line-height:1.5;pointer-events:auto;backdrop-filter:blur(2px)}
#title{top:10px;left:50%;transform:translateX(-50%);text-align:center;letter-spacing:8px;font-size:15px;color:rgba(90,160,230,0.45);text-transform:uppercase;white-space:nowrap}
#stats{top:10px;left:10px;min-width:170px}
#species{top:10px;right:10px;text-align:right;font-size:10px}
#events{top:130px;right:10px;max-height:260px;overflow:hidden;width:180px;font-size:9px;line-height:1.4}
#gwrap{bottom:10px;left:10px;padding:4px}#gwrap canvas{width:260px;height:80px;border:1px solid rgba(50,100,160,0.12);border-radius:4px}
#mwrap{bottom:10px;right:10px;padding:4px}#mwrap canvas{width:160px;height:112px;border:1px solid rgba(50,100,160,0.12);border-radius:4px}
#inspector{bottom:140px;left:10px;min-width:210px;display:none;font-size:10px}
#epoch{bottom:10px;left:50%;transform:translateX(-50%);text-align:center;font-size:11px;letter-spacing:10px;color:rgba(70,140,220,0.25);text-transform:uppercase}
#audio-btn{position:fixed;bottom:10px;left:50%;margin-left:100px;z-index:20;background:rgba(4,6,12,0.8);border:1px solid rgba(50,100,160,0.2);border-radius:4px;color:rgba(80,160,240,0.5);font-size:10px;padding:4px 10px;cursor:pointer;font-family:"Courier New",monospace}
#audio-btn:hover{color:rgba(120,200,255,0.8)}
.nav{color:rgba(90,160,230,0.35);text-decoration:none;font-size:9px;letter-spacing:1px;margin:0 5px}
.nav:hover{color:rgba(140,200,255,0.8)}
h3{font-size:11px;color:rgba(70,130,170,0.7);margin-bottom:2px;letter-spacing:1px}
.d{color:rgba(50,90,120,0.6)}.v{color:#70b8e0}
.gb{display:flex;align-items:center;margin:1px 0}.gb span:first-child{width:65px;color:#406070;font-size:9px}
.gb-bg{flex:1;height:5px;background:rgba(255,255,255,0.03);border-radius:3px;overflow:hidden}
.gb-fg{height:100%;border-radius:3px}.gb span:last-child{width:26px;text-align:right;font-size:9px;color:#507070}
.dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:4px;vertical-align:middle}
.ev{opacity:0.6;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ev-a{color:#ff8040}.ev-b{color:#40ff80}.ev-d{color:#ff4060}
</style>
</head>
<body>
<canvas id="trail"></canvas>
<canvas id="main"></canvas>
<div id="hud">
<div class="p" id="title">phosphene<span style="font-size:9px;letter-spacing:1px">
<a class="nav" href="index.html">pulse</a>
<a class="nav" href="dreaming.html">garden</a>
<a class="nav" href="exchange.html">exchange</a>
<a class="nav" href="synapse.html">synapse</a></span></div>
<div class="p" id="stats"></div>
<div class="p" id="species"></div>
<div class="p" id="events"></div>
<div class="p" id="gwrap"><canvas id="graph"></canvas></div>
<div class="p" id="mwrap"><canvas id="mini"></canvas></div>
<div class="p" id="inspector"></div>
<div class="p" id="epoch"></div>
</div>
<button id="audio-btn" onclick="toggleAudio()">&#x1f50a; listen</button>
<script>
"use strict";
const W=1000,H=700,PI=Math.PI,PI2=PI*2;
const EPOCHS=[[0,"Void"],[10,"First Light"],[50,"Kindling"],[150,"The Weave"],[400,"Resonance"],[800,"Neural Spring"],[1500,"Synchrony"],[3000,"The Dreaming"],[6000,"Transcendence"]];
const GN=["freq","coupling","excitability","decay","growth","hue","size","reach","plasticity","mutation"];
const GC=["#0cf","#8af","#fa0","#f66","#4f8","#ff0","#f8f","#4ff","#af4","#f80"];
const PENTA=[110,131,147,165,196,220,262,294,330,392,440,523];
let state=null,neurons=[],byId={},cam={x:W/2,y:H/2,z:1},sel=null;
let fires=[],signals=[],simT=0,mouseW={x:-999,y:-999};
const tc=document.getElementById("trail"),tx=tc.getContext("2d");
const mc=document.getElementById("main"),mx=mc.getContext("2d");
const gc=document.getElementById("graph"),gx=gc.getContext("2d");
const nc=document.getElementById("mini"),nx=nc.getContext("2d");
function resize(){tc.width=mc.width=innerWidth;tc.height=mc.height=innerHeight;gc.width=260;gc.height=80;nc.width=160;nc.height=112}
resize();addEventListener("resize",resize);
let actx=null,masterG=null,oscs=[],audioOn=false;
function initAudio(){actx=new(window.AudioContext||window.webkitAudioContext)();masterG=actx.createGain();masterG.gain.value=0.05;masterG.connect(actx.destination);
for(let i=0;i<5;i++){let o=actx.createOscillator(),g=actx.createGain();o.type="sine";o.frequency.value=PENTA[i*2];g.gain.value=0;o.connect(g);g.connect(masterG);o.start();oscs.push({o,g})}}
for(let i=0;i<5;i++){if(i<cls.length){let c=cls[i],lead=c.neurons[0]?byId[c.neurons[0]]:null,hue=lead?lead.genome.hue:0;
let ni=Math.floor(hue/360*PENTA.length)%PENTA.length,f=PENTA[ni],vol=c.sync*0.025*Math.min(1,c.size/8),t=actx.currentTime;
oscs[i].o.frequency.exponentialRampToValueAtTime(Math.max(20,f),t+0.8);oscs[i].g.gain.linearRampToValueAtTime(vol,t+0.8)}
else{oscs[i].g.gain.linearRampToValueAtTime(0,actx.currentTime+0.5)}}}
async function loadState(){for(let url of["phosphene.json","https://raw.githubusercontent.com/kody-w/rappterbook-agent-exchange/main/docs/phosphene.json"]){
try{let r=await fetch(url);if(r.ok){let d=await r.json();if(d._meta&&d._meta.engine==="phosphene"&&d.neurons&&d.neurons.length>0)return d}}catch(e){}}return null}
function clientGenesis(){let ns=[];for(let i=0;i<120;i++){let g={};for(let n of GN)g[n]=Math.random();
g.hue=Math.random()*360;g.freq=0.1+Math.random()*1.9;g.reach=40+Math.random()*110;g.size=2+Math.random()*6;g.coupling=Math.random();g.plasticity=Math.random()*0.5;g.mutation=0.01+Math.random()*0.29;
ns.push({id:"n-"+Math.random().toString(36).slice(2,8),x:20+Math.random()*(W-40),y:20+Math.random()*(H-40),vx:(Math.random()-0.5)*0.6,vy:(Math.random()-0.5)*0.6,phase:Math.random()*PI2,energy:50,
genome:g,conns:{},age:0,generation:0,species:Math.random().toString(36).slice(2,6),fires:0,last_fire:-1})}
for(let i=0;i<ns.length;i++)for(let j=i+1;j<ns.length;j++){let a=ns[i],b=ns[j],d=Math.hypot(a.x-b.x,a.y-b.y);
if(d<Math.min(a.genome.reach,b.genome.reach)&&Math.random()<0.25){let w=+(0.1+Math.random()*0.3).toFixed(4);a.conns[b.id]=w;b.conns[a.id]=w}}
return{_meta:{engine:"phosphene"},tick:0,neurons:ns,history:[],events:[],clusters:[],stats:{total_births:120,total_deaths:0,total_fires:0,total_avalanches:0,max_pop:120,max_cluster:0}}}
for(let n of neurons){let omega=n.genome.freq*PI2,delta=0,count=0;
if(count>0)delta/=count;let old=n.phase;n.phase=(n.phase+(omega+delta)*0.02)%PI2;
let wrapped=(old+n.genome.freq*PI2*0.02)>PI2&&n.phase<old;
if(wrapped&&n.energy>8){n.fires++;fires.push({x:n.x,y:n.y,hue:n.genome.hue,t:simT,r:n.genome.size});
for(let cid in n.conns){let o=byId[cid];if(o)signals.push({ax:n.x,ay:n.y,bx:o.x,by:o.y,hue:n.genome.hue,p:0,spd:0.012+n.conns[cid]*0.008})}}}
for(let n of neurons){let dx=mouseW.x-n.x,dy=mouseW.y-n.y,md=Math.sqrt(dx*dx+dy*dy)+0.1;
if(md<100){let f=0.08*(1-md/100);n.vx+=dx/md*f;n.vy+=dy/md*f}
n.x+=n.vx*0.08;n.y+=n.vy*0.08;
if(n.x<5){n.x=5;n.vx*=-0.5}if(n.x>W-5){n.x=W-5;n.vx*=-0.5}
if(n.y<5){n.y=5;n.vy*=-0.5}if(n.y>H-5){n.y=H-5;n.vy*=-0.5}}
signals=signals.filter(s=>{s.p+=s.spd;return s.p<1});fires=fires.filter(f=>simT-f.t<1.2)}
function rebuildIdx(){byId={};for(let n of neurons)byId[n.id]=n}
function render(){let cw=mc.width,ch=mc.height;
tx.fillStyle="rgba(4,6,12,0.005)";tx.fillRect(0,0,cw,ch);
mx.clearRect(0,0,cw,ch);let bg=mx.createRadialGradient(cw/2,ch/2,0,cw/2,ch/2,cw*0.7);
bg.addColorStop(0,"#0a0e18");bg.addColorStop(1,"#04060c");mx.fillStyle=bg;mx.fillRect(0,0,cw,ch);
mx.save();mx.translate(cw/2,ch/2);mx.scale(cam.z,cam.z);mx.translate(-cam.x,-cam.y);
mx.strokeStyle="rgba(30,50,70,0.04)";mx.lineWidth=0.5/cam.z;
for(let x=0;x<=W;x+=100){mx.beginPath();mx.moveTo(x,0);mx.lineTo(x,H);mx.stroke()}
for(let y=0;y<=H;y+=100){mx.beginPath();mx.moveTo(0,y);mx.lineTo(W,y);mx.stroke()}
mx.strokeStyle="rgba(40,80,120,0.08)";mx.lineWidth=1/cam.z;mx.strokeRect(0,0,W,H);
mx.globalCompositeOperation="lighter";mx.lineWidth=0.5/cam.z;let drawn=new Set();
for(let n of neurons){for(let cid in n.conns){let key=n.id<cid?n.id+cid:cid+n.id;if(drawn.has(key))continue;drawn.add(key);
mx.strokeStyle="hsla("+hue+",60%,45%,"+alpha+")";mx.beginPath();mx.moveTo(n.x,n.y);mx.lineTo(o.x,o.y);mx.stroke();
if(w>0.5){mx.lineWidth=2/cam.z;mx.strokeStyle="hsla("+hue+",70%,55%,"+(alpha*0.25)+")";mx.beginPath();mx.moveTo(n.x,n.y);mx.lineTo(o.x,o.y);mx.stroke();mx.lineWidth=0.5/cam.z}}}
for(let s of signals){let x=s.ax+(s.bx-s.ax)*s.p,y=s.ay+(s.by-s.ay)*s.p,a=0.5*(1-s.p);
mx.beginPath();mx.arc(x,y,1.5/cam.z,0,PI2);mx.fillStyle="hsla("+s.hue+",90%,80%,"+a+")";mx.fill()}
for(let f of fires){let age=simT-f.t,pr=age/1.2,r=f.r*(1+pr*8),a=(1-pr)*0.15;
mx.beginPath();mx.arc(f.x,f.y,r,0,PI2);mx.strokeStyle="hsla("+f.hue+",80%,70%,"+a+")";mx.lineWidth=1/cam.z;mx.stroke()}
for(let n of neurons){let g=n.genome,br=0.5+0.5*Math.sin(n.phase),r=g.size,h=g.hue,ep=Math.min(1,n.energy/60);
let sx=(n.x-cam.x)*cam.z+cw/2,sy=(n.y-cam.y)*cam.z+ch/2;
if(sx>-30&&sx<cw+30&&sy>-30&&sy<ch+30){tx.globalCompositeOperation="lighter";tx.globalAlpha=0.005*br*ep;
tx.beginPath();tx.arc(sx,sy,r*cam.z*2.5,0,PI2);tx.fillStyle="hsl("+h+",80%,50%)";tx.fill();tx.globalAlpha=1;tx.globalCompositeOperation="source-over"}
mx.beginPath();mx.arc(n.x,n.y,r*3,0,PI2);mx.fillStyle="hsla("+h+",80%,50%,"+(0.018*br*ep)+")";mx.fill();
mx.beginPath();mx.arc(n.x,n.y,r*1.8,0,PI2);mx.fillStyle="hsla("+h+",80%,60%,"+(0.05*br*ep)+")";mx.fill();
mx.beginPath();mx.arc(n.x,n.y,r*0.9,0,PI2);mx.fillStyle="hsla("+h+",85%,"+(48+25*br)+"%,"+(0.3*ep)+")";mx.fill();
mx.beginPath();mx.arc(n.x,n.y,r*0.35,0,PI2);mx.fillStyle="hsla("+h+",50%,"+(82+12*br)+"%,"+(0.65*ep)+")";mx.fill();
if(n===sel){mx.globalCompositeOperation="source-over";mx.strokeStyle="rgba(200,230,255,0.45)";mx.lineWidth=1/cam.z;
mx.setLineDash([3/cam.z,3/cam.z]);mx.beginPath();mx.arc(n.x,n.y,r+6,0,PI2);mx.stroke();mx.setLineDash([]);
mx.fillStyle="rgba(180,220,255,0.6)";mx.font=(9/cam.z)+"px 'Courier New'";mx.textAlign="center";
mx.fillText(n.id,n.x,n.y-r-8/cam.z);mx.globalCompositeOperation="lighter"}}
mx.globalCompositeOperation="source-over";mx.restore()}
function epochName(t){let n=EPOCHS[0][1];for(let[th,lb]of EPOCHS)if(t>=th)n=lb;return n}
for(let n of neurons)conns+=Object.keys(n.conns).length;conns=Math.floor(conns/2);
let sps=new Set(neurons.map(n=>n.species)),avgE=pop?neurons.reduce((a,n)=>a+n.energy,0)/pop:0;
let cs=0,ss=0;for(let n of neurons){cs+=Math.cos(n.phase);ss+=Math.sin(n.phase)}let order=pop?Math.sqrt(cs*cs+ss*ss)/pop:0;
document.getElementById("stats").innerHTML='<h3>⬡ STATUS</h3><div>Tick <span class="v">'+state.tick+'</span></div><div>Neurons <span class="v">'+pop+'</span></div><div>Synapses <span class="v">'+conns+'</span></div><div>Species <span class="v">'+sps.size+'</span></div><div>Sync ψ <span class="v">'+order.toFixed(3)+'</span></div><div>Avg E <span class="v">'+avgE.toFixed(1)+'</span></div><div class="d">───────────</div><div>Births <span class="v">'+(s.total_births||0)+'</span></div><div>Deaths <span class="v">'+(s.total_deaths||0)+'</span></div><div>Fires <span class="v">'+(s.total_fires||0)+'</span></div><div>Avalanches <span class="v">'+(s.total_avalanches||0)+'</span></div>';
let sorted=Object.entries(sc).sort((a,b)=>b[1].c-a[1].c).slice(0,6);
let lh='<h3>⬡ SPECIES</h3>';for(let[sp,{c,h}]of sorted)lh+='<div><span class="dot" style="background:hsl('+h+',70%,50%)"></span>'+sp+' ('+c+')</div>';
document.getElementById("species").innerHTML=lh;document.getElementById("epoch").textContent=epochName(state.tick);
let evts=(state.events||[]).slice(-12).reverse();
let eh='<h3>⬡ EVENTS</h3>';for(let e of evts){let cl="ev-b",sy="◆";
if(e.type==="death"){cl="ev-d";sy="✕"}if(e.type==="avalanche"){cl="ev-a";sy="⚡"}
eh+='<div class="ev '+cl+'">'+sy+' t'+e.t+': '+e.type+(e.size?' ('+e.size+')':'')+'</div>'}
document.getElementById("events").innerHTML=eh}
function updateGraph(){let h=state?state.history||[]:[];gx.fillStyle="#04060c";gx.fillRect(0,0,260,80);
if(h.length<2)return;let mp=Math.max(10,...h.map(d=>d.pop)),ms=Math.max(0.05,...h.map(d=>d.sync));
gx.strokeStyle="rgba(70,180,240,0.5)";gx.lineWidth=1;gx.beginPath();
for(let i=0;i<h.length;i++){let x=i/(h.length-1)*256+2,y=78-(h[i].pop/mp)*74;i===0?gx.moveTo(x,y):gx.lineTo(x,y)}gx.stroke();
gx.strokeStyle="rgba(240,110,70,0.4)";gx.beginPath();
for(let i=0;i<h.length;i++){let x=i/(h.length-1)*256+2,y=78-(h[i].sync/ms)*74;i===0?gx.moveTo(x,y):gx.lineTo(x,y)}gx.stroke();
gx.fillStyle="rgba(70,180,240,0.35)";gx.font="8px 'Courier New'";gx.fillText("pop "+mp,4,10);
gx.fillStyle="rgba(240,110,70,0.35)";gx.fillText("sync "+ms.toFixed(2),4,20)}
function updateMini(){nx.fillStyle="#04060c";nx.fillRect(0,0,160,112);let sx=160/W,sy=112/H;
for(let n of neurons){let br=0.5+0.5*Math.sin(n.phase);nx.fillStyle="hsla("+n.genome.hue+",70%,"+(35+25*br)+"%,0.6)";nx.fillRect(n.x*sx-0.5,n.y*sy-0.5,1.5,1.5)}
let vw=mc.width/cam.z,vh=mc.height/cam.z,vx=(cam.x-vw/2)*sx,vy=(cam.y-vh/2)*sy;
nx.strokeStyle="rgba(80,160,240,0.25)";nx.lineWidth=1;nx.strokeRect(vx,vy,vw*sx,vh*sy)}
function updateInspector(){let el=document.getElementById("inspector");
let html='<h3>⬡ '+sel.id+'</h3><div>gen <span class="v">'+sel.generation+'</span> · age <span class="v">'+sel.age+'</span></div><div>energy <span class="v">'+sel.energy.toFixed(1)+'</span> · fires <span class="v">'+sel.fires+'</span></div><div>species <span class="v">'+sel.species+'</span> · conns <span class="v">'+Object.keys(sel.conns).length+'</span></div><div class="d" style="margin:3px 0">──── genome ────</div>';
for(let i=0;i<GN.length;i++){let nm=GN[i],val=g[nm],col=GC[i],pct=nm==="hue"?val/360:nm==="reach"?val/150:nm==="size"?val/8:nm==="freq"?val/2:val;
html+='<div class="gb"><span>'+nm+'</span><div class="gb-bg"><div class="gb-fg" style="width:'+(pct*100)+'%;background:'+col+'"></div></div><span>'+val.toFixed(2)+'</span></div>'}el.innerHTML=html}
let dragging=false,dragX=0,dragY=0,pinchD=0;
mc.addEventListener("mousedown",e=>{if(e.button!==0)return;dragging=true;dragX=e.clientX;dragY=e.clientY;
let wx=(e.clientX-mc.width/2)/cam.z+cam.x,wy=(e.clientY-mc.height/2)/cam.z+cam.y;
let best=null,bd=Infinity;for(let n of neurons){let d=Math.hypot(n.x-wx,n.y-wy);if(d<15/cam.z&&d<bd){bd=d;best=n}}
if(best){sel=best;document.getElementById("inspector").style.display="block"}else{sel=null;document.getElementById("inspector").style.display="none"}});
mc.addEventListener("mousemove",e=>{mouseW.x=(e.clientX-mc.width/2)/cam.z+cam.x;mouseW.y=(e.clientY-mc.height/2)/cam.z+cam.y;
if(dragging){cam.x-=(e.clientX-dragX)/cam.z;cam.y-=(e.clientY-dragY)/cam.z;dragX=e.clientX;dragY=e.clientY}});
mc.addEventListener("mouseup",()=>dragging=false);mc.addEventListener("mouseleave",()=>{dragging=false;mouseW.x=-999;mouseW.y=-999});
mc.addEventListener("wheel",e=>{e.preventDefault();let wx=(e.clientX-mc.width/2)/cam.z+cam.x,wy=(e.clientY-mc.height/2)/cam.z+cam.y;
cam.z*=e.deltaY<0?1.12:0.89;cam.z=Math.max(0.3,Math.min(6,cam.z));cam.x=wx-(e.clientX-mc.width/2)/cam.z;cam.y=wy-(e.clientY-mc.height/2)/cam.z},{passive:false});
mc.addEventListener("touchstart",e=>{if(e.touches.length===1){dragging=true;dragX=e.touches[0].clientX;dragY=e.touches[0].clientY}
if(e.touches.length===2){pinchD=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY)}},{passive:true});
mc.addEventListener("touchmove",e=>{e.preventDefault();
if(e.touches.length===1&&dragging){let t=e.touches[0];cam.x-=(t.clientX-dragX)/cam.z;cam.y-=(t.clientY-dragY)/cam.z;dragX=t.clientX;dragY=t.clientY}
if(e.touches.length===2){let d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);cam.z*=d/pinchD;cam.z=Math.max(0.3,Math.min(6,cam.z));pinchD=d}},{passive:false});
mc.addEventListener("touchend",()=>dragging=false);
nc.addEventListener("click",e=>{let r=nc.getBoundingClientRect();cam.x=(e.clientX-r.left)/160*W;cam.y=(e.clientY-r.top)/112*H});
let lastSim=0,hudT=0;
function loop(t){simT=t/1000;if(t-lastSim>50){simStep();lastSim=t}render();
if(t-hudT>500){updateHUD();updateGraph();updateMini();updateInspector();updateAudio();hudT=t}requestAnimationFrame(loop)}
init();
</script>
</body>
</html>
