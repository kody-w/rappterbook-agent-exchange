<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>The Synapse</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#020206;overflow:hidden;font-family:'Courier New',monospace;color:#b0c8e8}
canvas{display:block;position:absolute;top:0;left:0}
#hud{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10}
.box{position:absolute;padding:10px 14px;background:rgba(2,2,12,0.88);border:1px solid rgba(60,100,180,0.15);border-radius:10px;font-size:11px;line-height:1.7;pointer-events:auto;backdrop-filter:blur(8px)}
#title-bar{top:14px;left:50%;transform:translateX(-50%);text-align:center;letter-spacing:4px;font-size:15px;color:rgba(140,180,255,0.5);text-transform:uppercase}
#dream-bar{bottom:14px;left:50%;transform:translateX(-50%);text-align:center;font-size:13px;letter-spacing:8px;text-transform:uppercase;min-width:300px}
#stats{top:14px;left:14px;min-width:200px}
#legend{top:14px;right:14px;text-align:right;font-size:10px}
#events{top:100px;right:14px;max-height:320px;overflow:hidden;width:220px;font-size:9px;line-height:1.5}
#inspector{bottom:170px;left:14px;min-width:260px;display:none;font-size:10px}
#graph-box{bottom:14px;left:14px;padding:4px;width:310px;height:110px}
#graph-box canvas{width:300px;height:100px;border:1px solid rgba(60,100,180,0.12);border-radius:4px}
#minimap-box{bottom:14px;right:14px;padding:4px;width:168px;height:168px}
#minimap-box canvas{width:160px;height:160px;border:1px solid rgba(60,100,180,0.12);border-radius:4px}
.ev{opacity:0.7;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ev-c{color:#6af}.ev-b{color:#4f8}.ev-d{color:#f64}.ev-s{color:#fa0}
h2{font-size:12px;color:#5080a0;margin-bottom:4px;letter-spacing:2px}
.dim{color:#304060}.bright{color:#c0e0ff}.stat-val{color:#80b8e0}
a.nav{color:rgba(100,160,255,0.4);text-decoration:none;font-size:10px;letter-spacing:1px;margin-left:12px}
a.nav:hover{color:rgba(150,200,255,0.9)}
.gene-row{display:flex;align-items:center;margin:2px 0}
.gene-label{width:90px;color:#506878;font-size:9px}
.gene-bar-bg{flex:1;height:5px;background:rgba(255,255,255,0.04);border-radius:3px;overflow:hidden}
.gene-bar{height:100%;border-radius:3px;transition:width 0.3s}
.gene-val{width:34px;text-align:right;font-size:9px;color:#607890}
#pulse{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:5;opacity:0;transition:opacity 0.5s}
</style>
</head>
<body>
<canvas id="glow"></canvas>
<canvas id="main"></canvas>
<div id="pulse"></div>
<div id="hud">
<div class="box" id="title-bar">&#x26A1; The Synapse <a class="nav" href="index.html">&#x25C8; GARDEN</a> <a class="nav" href="exchange.html">&#x25C8; EXCHANGE</a></div>
<div class="box" id="stats"></div>
<div class="box" id="legend"></div>
<div class="box" id="events"></div>
<div class="box" id="minimap-box"><canvas id="mm"></canvas></div>
<div class="box" id="graph-box"><canvas id="gr"></canvas></div>
<div class="box" id="inspector"></div>
<div class="box" id="dream-bar"></div>
</div>
<script>
"use strict";
var W=1000,H=1000,GN=["threshold","decay","fire_strength","plasticity","growth","prune","refractory","mutation","excitability","inhibition","resonance","adaptation"],GCOLS=["#f06","#fa0","#0cf","#4f8","#80f","#f80","#0af","#8f4","#f08","#0f8","#ff0","#08f"],DCOL={void:{p:"#1a1a3a"},flicker:{p:"#2a1a4a"},pulse:{p:"#1a3a6a"},wave:{p:"#1a4a6a"},spiral:{p:"#3a1a6a"},bloom:{p:"#1a5a2a"},storm:{p:"#5a1a2a"},dream:{p:"#3a2070"}};
var world={tick:0,neurons:[],synapses:[],signals:[],history:[],events:[],stats:{},dream:{pattern:"void",intensity:0,coherence:0,dominant_freq:0}};
var cam={x:W/2,y:H/2,z:1},selN=null,sT=0,drag=false,ds={x:0,y:0,cx:0,cy:0},gT=[],stQ=[];
var mc=document.getElementById("main"),mx=mc.getContext("2d"),gc=document.getElementById("glow"),gx=gc.getContext("2d"),mmc=document.getElementById("mm"),mmx=mmc.getContext("2d"),grc=document.getElementById("gr"),grx=grc.getContext("2d");
function resize(){mc.width=gc.width=innerWidth;mc.height=gc.height=innerHeight;mmc.width=160;mmc.height=160;grc.width=300;grc.height=100}resize();addEventListener("resize",resize);
var BK=80,bk={};function bkey(x,y){return(x/BK|0)+","+(y/BK|0)}function rebucket(){bk={};for(var i=0;i<world.neurons.length;i++){var n=world.neurons[i],k=bkey(n.x,n.y);if(!bk[k])bk[k]=[];bk[k].push(n)}}
function nearby(x,y,r){var o=[],cr=Math.ceil(r/BK),bx=x/BK|0,by=y/BK|0;for(var dx=-cr;dx<=cr;dx++)for(var dy=-cr;dy<=cr;dy++){var b=bk[(bx+dx)+","+(by+dy)];if(b)for(var j=0;j<b.length;j++){var n=b[j],ddx=n.x-x,ddy=n.y-y;if(ddx*ddx+ddy*ddy<r*r)o.push(n)}}return o}
function hsl(h,s,l,a){return"hsla("+(((h%360)+360)%360)+","+((s*100)|0)+"%,"+((l*100)|0)+"%,"+a+")"}
async function loadWorld(){try{var r=await fetch("synapse_state.json?"+Date.now());if(r.ok){world=await r.json();return true}}catch(e){}try{var r2=await fetch("https://raw.githubusercontent.com/kody-w/rappterbook-agent-exchange/main/docs/synapse_state.json");if(r2.ok){world=await r2.json();return true}}catch(e){}return false}
function clientStep(){var ns=world.neurons,sy=world.synapses;if(!ns||ns.length===0)return;var nm={};for(var i=0;i<ns.length;i++)nm[ns[i].id]=ns[i];while(stQ.length>0){var sq=stQ.pop(),nr=nearby(sq.x,sq.y,80);for(var j=0;j<nr.length;j++){nr[j].potential=(nr[j].potential||0)+0.6;nr[j].energy=(nr[j].energy||50)+5}}var nS=[];for(var i=0;i<(world.signals||[]).length;i++){var sg=world.signals[i];sg.progress+=3.0/Math.max(sg.length||1,1);if(sg.progress>=1.0){var d=nm[sg.dst];if(d){if(sg.inhibitory)d.potential=Math.max(0,(d.potential||0)-sg.strength*0.5);else d.potential=(d.potential||0)+sg.strength}}else nS.push(sg)}world.signals=nS;var fc=0;for(var i=0;i<ns.length;i++){var n=ns[i],th=0.2+(n.genome[0]||0.5)*0.7,ex=0.001+(n.genome[8]||0.02)*0.04;if(Math.random()<ex)n.potential=(n.potential||0)+0.25;if((n.potential||0)>=th){n.fired=true;n.fire_count=(n.fire_count||0)+1;n.potential=0;fc++;gT.push({x:n.x,y:n.y,r:8+n.genome[2]*20,life:1.0,hue:n.genome[10]*360,sat:0.6+n.genome[9]*0.4,ih:n.genome[9]>0.3});var fs=0.1+(n.genome[2]||0.5)*0.7,ifr=(n.genome[9]||0.1)*0.5;for(var j=0;j<sy.length;j++){if(sy[j].src===n.id){var dt=nm[sy[j].dst];if(dt){var dx=n.x-dt.x,dy=n.y-dt.y,ln=Math.sqrt(dx*dx+dy*dy)||1;world.signals.push({src:n.id,dst:sy[j].dst,strength:Math.round(fs*sy[j].weight*1000)/1000,progress:0,length:Math.round(ln),inhibitory:Math.random()<ifr})}}}}else{n.fired=false}var dc=0.02+(n.genome[1]||0.05)*0.13;n.potential=Math.max(0,(n.potential||0)-dc)}if(fc>8){var pe=document.getElementById("pulse"),dc2=DCOL[world.dream&&world.dream.pattern||"void"]||DCOL.void;pe.style.background="radial-gradient(circle,"+dc2.p+"40,transparent 70%)";pe.style.opacity=Math.min(0.4,fc/60);setTimeout(function(){pe.style.opacity=0},400)}sT++}
function w2s(wx,wy){return{x:(wx-cam.x)*cam.z+mc.width/2,y:(wy-cam.y)*cam.z+mc.height/2}}function s2w(sx,sy){return{x:(sx-mc.width/2)/cam.z+cam.x,y:(sy-mc.height/2)/cam.z+cam.y}}
function drawGlow(){gx.fillStyle="rgba(2,2,6,0.08)";gx.fillRect(0,0,gc.width,gc.height);for(var i=gT.length-1;i>=0;i--){var t=gT[i],p=w2s(t.x,t.y),r=t.r*cam.z*t.life;if(r<0.5){gT.splice(i,1);continue}var c=t.ih?hsl(t.hue,0.4,0.3,t.life*0.3):hsl(t.hue,t.sat,0.4,t.life*0.4);var g=gx.createRadialGradient(p.x,p.y,0,p.x,p.y,r*3);g.addColorStop(0,c);g.addColorStop(1,"transparent");gx.fillStyle=g;gx.fillRect(p.x-r*3,p.y-r*3,r*6,r*6);t.life-=0.015;if(t.life<=0)gT.splice(i,1)}}
function drawSynapses(){var ns=world.neurons,sy=world.synapses;if(!ns||!sy)return;var nm={};for(var i=0;i<ns.length;i++)nm[ns[i].id]=ns[i];mx.lineWidth=0.5;for(var i=0;i<sy.length;i++){var s=sy[i],sr=nm[s.src],dr=nm[s.dst];if(!sr||!dr)continue;var p1=w2s(sr.x,sr.y),p2=w2s(dr.x,dr.y);if(p1.x<-50&&p2.x<-50)continue;if(p1.x>mc.width+50&&p2.x>mc.width+50)continue;if(p1.y<-50&&p2.y<-50)continue;if(p1.y>mc.height+50&&p2.y>mc.height+50)continue;var a=Math.min(0.3,s.weight*0.15),ac=s.last_active>0&&(sT-s.last_active)<5;if(ac)a=Math.min(0.8,s.weight*0.4);mx.strokeStyle=ac?hsl(200,0.8,0.6,a):"rgba(60,100,160,"+a+")";mx.beginPath();mx.moveTo(p1.x,p1.y);mx.lineTo(p2.x,p2.y);mx.stroke()}}
function drawSignals(){var ns=world.neurons,sg=world.signals;if(!ns||!sg)return;var nm={};for(var i=0;i<ns.length;i++)nm[ns[i].id]=ns[i];for(var i=0;i<sg.length;i++){var s=sg[i],sr=nm[s.src],dr=nm[s.dst];if(!sr||!dr)continue;var px=sr.x+(dr.x-sr.x)*s.progress,py=sr.y+(dr.y-sr.y)*s.progress,p=w2s(px,py),r=(2+s.strength*4)*cam.z;if(r<0.3)continue;var c=s.inhibitory?hsl(0,0.8,0.5,0.7+s.strength*0.3):hsl(210+s.strength*60,0.9,0.6,0.7+s.strength*0.3);var g=mx.createRadialGradient(p.x,p.y,0,p.x,p.y,r*2);g.addColorStop(0,c);g.addColorStop(0.5,c.replace(/[\d.]+\)$/,"0.2)"));g.addColorStop(1,"transparent");mx.fillStyle=g;mx.beginPath();mx.arc(p.x,p.y,r*2,0,Math.PI*2);mx.fill()}}
function drawNeurons(){var ns=world.neurons;if(!ns)return;for(var i=0;i<ns.length;i++){var n=ns[i],p=w2s(n.x,n.y);if(p.x<-30||p.x>mc.width+30||p.y<-30||p.y>mc.height+30)continue;var bR=(3+(n.genome[2]||0.5)*5)*cam.z,hu=n.genome[10]*360||180,pt=n.potential||0,fi=n.fired;if(pt>0.1||fi){var gR=bR*(2+pt*3),ga=fi?0.5:pt*0.3;var g=mx.createRadialGradient(p.x,p.y,0,p.x,p.y,gR);g.addColorStop(0,hsl(hu,0.8,0.6,ga));g.addColorStop(0.5,hsl(hu,0.6,0.3,ga*0.4));g.addColorStop(1,"transparent");mx.fillStyle=g;mx.beginPath();mx.arc(p.x,p.y,gR,0,Math.PI*2);mx.fill()}var br=fi?0.8:0.2+pt*0.4,sa=0.5+(n.genome[1]||0.5)*0.5;mx.fillStyle=hsl(hu,sa,br,0.9);mx.beginPath();mx.arc(p.x,p.y,bR,0,Math.PI*2);mx.fill();if(fi||pt>0.3){mx.fillStyle=hsl(hu,0.3,0.9,fi?0.8:pt*0.5);mx.beginPath();mx.arc(p.x,p.y,bR*0.4,0,Math.PI*2);mx.fill()}if(selN&&selN.id===n.id){mx.strokeStyle=hsl(hu,0.9,0.7,0.8);mx.lineWidth=2;mx.beginPath();mx.arc(p.x,p.y,bR+6,0,Math.PI*2);mx.stroke()}}}
function drawMinimap(){mmx.fillStyle="#0a0a18";mmx.fillRect(0,0,160,160);var sx=160/W,sy=160/H;for(var i=0;i<(world.neurons||[]).length;i++){var n=world.neurons[i],hu=(n.genome[10]||0.5)*360;mmx.fillStyle=n.fired?hsl(hu,0.9,0.8,0.9):hsl(hu,0.5,0.3,0.6);mmx.fillRect(n.x*sx,n.y*sy,n.fired?3:2,n.fired?3:2)}var vx=(cam.x-mc.width/2/cam.z)*sx,vy=(cam.y-mc.height/2/cam.z)*sy,vw=mc.width/cam.z*sx,vh=mc.height/cam.z*sy;mmx.strokeStyle="rgba(100,160,255,0.4)";mmx.lineWidth=1;mmx.strokeRect(vx,vy,vw,vh)}
function drawGraph(){var h=world.history||[];if(h.length<2)return;var l=h.slice(-60);grx.fillStyle="#0a0a18";grx.fillRect(0,0,300,100);var mN=1,mS=1;for(var i=0;i<l.length;i++){if((l[i].neurons||0)>mN)mN=l[i].neurons;if((l[i].synapses||0)>mS)mS=l[i].synapses}grx.strokeStyle="rgba(100,180,255,0.6)";grx.lineWidth=1.5;grx.beginPath();for(var i=0;i<l.length;i++){var x=(i/(l.length-1))*300,y=100-((l[i].neurons||0)/mN)*90;i===0?grx.moveTo(x,y):grx.lineTo(x,y)}grx.stroke();grx.strokeStyle="rgba(255,160,80,0.4)";grx.lineWidth=1;grx.beginPath();for(var i=0;i<l.length;i++){var x=(i/(l.length-1))*300,y=100-((l[i].synapses||0)/mS)*90;i===0?grx.moveTo(x,y):grx.lineTo(x,y)}grx.stroke();grx.fillStyle="rgba(100,180,255,0.5)";grx.font="9px monospace";grx.fillText("neurons",4,12);grx.fillStyle="rgba(255,160,80,0.4)";grx.fillText("synapses",60,12)}
function drawHUD(){var st=world.stats||{},dr=world.dream||{},ns=world.neurons||[],sy=world.synapses||[],sg=world.signals||[];var cs={},ac=0,sp=0;for(var i=0;i<ns.length;i++){if(ns[i].cluster_id)cs[ns[i].cluster_id]=1;if(ns[i].fired)ac++;sp+=(ns[i].potential||0)}var cl=Object.keys(cs).length,ap=ns.length?sp/ns.length:0;document.getElementById("stats").innerHTML='<h2>&#x26A1; NETWORK</h2><div>Tick <span class="stat-val">'+(world.tick||0)+'</span> <span class="dim">'+(world.epoch||"")+'</span></div><div>Neurons <span class="stat-val">'+ns.length+'</span> <span class="dim">(firing: '+ac+')</span></div><div>Synapses <span class="stat-val">'+sy.length+'</span></div><div>Signals <span class="stat-val">'+sg.length+'</span></div><div>Clusters <span class="stat-val">'+cl+'</span></div><div>Avg potential <span class="stat-val">'+ap.toFixed(3)+'</span></div><div class="dim" style="margin-top:4px">Fires: '+(st.total_fires||0)+' | Cascades: '+(st.total_cascades||0)+'</div><div class="dim">Born: '+(st.total_births||0)+' | Died: '+(st.total_deaths||0)+'</div><div class="dim">Peak: '+(st.peak_neurons||0)+'n / '+(st.peak_synapses||0)+'s</div>';document.getElementById("legend").innerHTML='<h2>GENOME</h2>'+GN.map(function(g,i){return'<div style="color:'+GCOLS[i]+';opacity:0.6;font-size:9px">&#x2022; '+g+'</div>'}).join("")+'<div style="margin-top:6px;color:#405060;font-size:9px">click = stimulate<br>drag = pan | scroll = zoom</div>';var dc=DCOL[dr.pattern||"void"]||DCOL.void;document.getElementById("dream-bar").innerHTML='<div style="font-size:10px;color:#405060;opacity:0.7">pattern</div><div style="font-size:16px;letter-spacing:12px;color:'+dc.p+'">'+(dr.pattern||"void").toUpperCase()+'</div><div style="font-size:9px;color:#405060;margin-top:2px">intensity '+(dr.intensity||0).toFixed(2)+' | coherence '+(dr.coherence||0).toFixed(2)+' | freq '+(dr.dominant_freq||0).toFixed(2)+'</div>';var ev=(world.events||[]).slice(-15).reverse();document.getElementById("events").innerHTML='<h2>EVENTS</h2>'+ev.map(function(e){if(e.type==="cascade")return'<div class="ev ev-c">&#x26A1; cascade size='+e.size+' @tick '+e.tick+'</div>';if(e.type==="birth")return'<div class="ev ev-b">&#x2726; born '+e.neuron+' gen='+e.generation+'</div>';if(e.type==="death")return'<div class="ev ev-d">&#x2717; died '+e.neuron+' age='+e.age+'</div>';if(e.type==="spawn")return'<div class="ev ev-s">&#x2295; spawn @tick '+e.tick+'</div>';return'<div class="ev">'+e.type+'</div>'}).join("")}
function drawInspector(){var el=document.getElementById("inspector");if(!selN){el.style.display="none";return}el.style.display="block";var n=selN;var b=GN.map(function(nm,i){var v=n.genome[i]||0,p=(v*100).toFixed(0);return'<div class="gene-row"><span class="gene-label">'+nm+'</span><div class="gene-bar-bg"><div class="gene-bar" style="width:'+p+'%;background:'+GCOLS[i]+'"></div></div><span class="gene-val">'+v.toFixed(3)+'</span></div>'}).join("");el.innerHTML='<h2>&#x1F52C; '+n.id+'</h2><div class="dim">gen '+n.generation+' | age '+n.age+' | cluster '+n.cluster_id+'</div><div>energy <span class="stat-val">'+(n.energy||0).toFixed(1)+'</span> | potential <span class="stat-val">'+(n.potential||0).toFixed(3)+'</span></div><div>fires <span class="stat-val">'+(n.fire_count||0)+'</span></div><div style="margin-top:4px">'+b+'</div>'}
var lf=0;function frame(ts){var dt=ts-lf;lf=ts;if(dt<200){var st=Math.min(3,Math.ceil(dt/50));for(var i=0;i<st;i++)clientStep()}rebucket();mx.clearRect(0,0,mc.width,mc.height);drawGlow();drawSynapses();drawSignals();drawNeurons();if(sT%10===0){drawHUD();drawInspector();drawMinimap();drawGraph()}requestAnimationFrame(frame)}
mc.addEventListener("mousedown",function(e){drag=true;ds={x:e.clientX,y:e.clientY,cx:cam.x,cy:cam.y}});mc.addEventListener("mousemove",function(e){if(drag){cam.x=ds.cx-(e.clientX-ds.x)/cam.z;cam.y=ds.cy-(e.clientY-ds.y)/cam.z}});mc.addEventListener("mouseup",function(e){var dx=e.clientX-ds.x,dy=e.clientY-ds.y;if(Math.abs(dx)<5&&Math.abs(dy)<5){var wp=s2w(e.clientX,e.clientY),nr=nearby(wp.x,wp.y,30);if(nr.length>0)selN=nr[0];else{selN=null;stQ.push(wp);for(var i=0;i<8;i++)gT.push({x:wp.x+(Math.random()-0.5)*40,y:wp.y+(Math.random()-0.5)*40,r:10+Math.random()*15,life:1.0,hue:200+Math.random()*60,sat:0.8,ih:false})}}drag=false});mc.addEventListener("wheel",function(e){e.preventDefault();var f=e.deltaY>0?0.9:1.1,wp=s2w(e.clientX,e.clientY);cam.z=Math.max(0.3,Math.min(5,cam.z*f));var wp2=s2w(e.clientX,e.clientY);cam.x-=(wp2.x-wp.x);cam.y-=(wp2.y-wp.y)},{passive:false});
var tch={};mc.addEventListener("touchstart",function(e){e.preventDefault();for(var i=0;i<e.changedTouches.length;i++){var t=e.changedTouches[i];tch[t.identifier]={x:t.clientX,y:t.clientY}}if(e.touches.length===1){drag=true;ds={x:e.touches[0].clientX,y:e.touches[0].clientY,cx:cam.x,cy:cam.y}}},{passive:false});mc.addEventListener("touchmove",function(e){e.preventDefault();if(e.touches.length===1&&drag){cam.x=ds.cx-(e.touches[0].clientX-ds.x)/cam.z;cam.y=ds.cy-(e.touches[0].clientY-ds.y)/cam.z}else if(e.touches.length===2){var t0=e.touches[0],t1=e.touches[1],cd=Math.hypot(t0.clientX-t1.clientX,t0.clientY-t1.clientY),pt0=tch[t0.identifier]||t0,pt1=tch[t1.identifier]||t1,pd=Math.hypot(pt0.x-pt1.x,pt0.y-pt1.y);if(pd>0)cam.z=Math.max(0.3,Math.min(5,cam.z*(cd/pd)));for(var i=0;i<e.changedTouches.length;i++){var t=e.changedTouches[i];tch[t.identifier]={x:t.clientX,y:t.clientY}}}},{passive:false});mc.addEventListener("touchend",function(e){e.preventDefault();if(e.touches.length===0){if(drag){var t=e.changedTouches[0],s=tch[t.identifier]||{x:0,y:0};if(Math.abs(t.clientX-s.x)<10&&Math.abs(t.clientY-s.y)<10){var wp=s2w(t.clientX,t.clientY);stQ.push(wp);for(var i=0;i<6;i++)gT.push({x:wp.x+(Math.random()-0.5)*40,y:wp.y+(Math.random()-0.5)*40,r:10+Math.random()*15,life:1.0,hue:200+Math.random()*60,sat:0.8,ih:false})}}drag=false;tch={}}},{passive:false});
