<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Musca &mdash; A Fly's Life</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#1a1410}
body{font-family:'SF Mono','Fira Code','Cascadia Code','Courier New',monospace;color:#c8a878}
canvas{position:fixed;top:0;left:0;display:block}
#bg{z-index:0}#scene{z-index:1}#fx{z-index:2}
#hud{position:fixed;top:0;left:0;width:100%;height:100%;z-index:10;pointer-events:none}
.p{position:absolute;padding:10px 14px;background:rgba(25,18,10,0.88);border:1px solid rgba(180,140,60,0.12);border-radius:8px;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);font-size:11px;line-height:1.7;pointer-events:auto}
#tb{top:12px;left:50%;transform:translateX(-50%);text-align:center;font-size:14px;letter-spacing:3px;color:rgba(200,168,100,0.6);text-transform:uppercase}
#tb small{display:block;font-size:9px;letter-spacing:2px;color:rgba(200,168,100,0.3);margin-top:2px}
#tb a{color:rgba(200,168,100,0.3);text-decoration:none;font-size:9px;letter-spacing:1px}
#tb a:hover{color:rgba(200,168,100,0.7)}
.ns{margin:0 6px;opacity:0.3}
#vi{top:12px;left:12px;min-width:190px}
#gp{top:340px;left:12px;min-width:190px;max-height:240px;overflow:hidden}
#sp{top:12px;right:12px;min-width:200px}
#bp{top:240px;right:12px;min-width:200px}
#mp{bottom:165px;right:12px;min-width:200px;max-height:160px;overflow:hidden}
#lp{bottom:165px;left:12px;min-width:200px;max-height:160px;overflow:hidden}
#tl{bottom:12px;left:12px;right:12px;height:140px;text-align:center}
#nr{bottom:158px;left:50%;transform:translateX(-50%);text-align:center;max-width:500px;font-size:11px;letter-spacing:0.5px;color:rgba(200,168,100,0.35);font-style:italic}
h3{font-size:10px;color:rgba(180,140,70,0.5);margin-bottom:4px;letter-spacing:1.5px;font-weight:normal;text-transform:uppercase}
.v{color:rgba(220,180,100,0.85)}.d{color:rgba(140,110,60,0.4)}.w{color:#e06040}
.gr{display:flex;align-items:center;margin:2px 0}
.gn{width:75px;color:rgba(160,130,70,0.5);font-size:8px;text-transform:capitalize}
.gb{flex:1;height:4px;background:rgba(255,255,255,0.03);border-radius:2px;overflow:hidden}
.gf{height:100%;border-radius:2px;transition:width .3s}
.gv{width:28px;text-align:right;font-size:8px;color:rgba(160,130,70,0.4)}
.st{display:inline-block;padding:2px 8px;border-radius:10px;font-size:9px;letter-spacing:1px;text-transform:uppercase}
.st-egg{background:rgba(255,250,240,0.1);color:#f0e8d0}
.st-larva{background:rgba(180,200,60,0.1);color:#b0c840}
.st-pupa{background:rgba(120,80,40,0.15);color:#a07030}
.st-adult{background:rgba(60,60,60,0.15);color:#a0a0a0}
.st-death{background:rgba(100,30,30,0.15);color:#c04040}
.mt{height:6px;background:rgba(255,255,255,0.04);border-radius:3px;overflow:hidden;margin:3px 0}
.mf{height:100%;border-radius:3px;transition:width .3s}
#pc{display:flex;align-items:center;gap:8px;justify-content:center;margin-top:6px;pointer-events:auto}
#pc button{background:rgba(200,168,100,0.15);border:1px solid rgba(200,168,100,0.2);color:#c8a878;font-family:inherit;font-size:10px;padding:3px 10px;border-radius:4px;cursor:pointer;letter-spacing:1px}
#pc button:hover{background:rgba(200,168,100,0.25)}
#pc button.active{background:rgba(200,168,100,0.3);border-color:rgba(200,168,100,0.5)}
#scrub{flex:1;max-width:400px;-webkit-appearance:none;appearance:none;height:4px;background:rgba(255,255,255,0.06);border-radius:2px;outline:none;cursor:pointer}
#scrub::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:#f0c060;cursor:pointer}
#ticknum{font-size:9px;color:rgba(200,168,100,0.4);min-width:60px;text-align:center}
.lin-row{display:flex;gap:6px;margin:2px 0;font-size:9px}
.lin-gen{width:40px;color:rgba(200,168,100,0.5)}
.lin-bar{flex:1;height:3px;background:rgba(255,255,255,0.03);border-radius:2px;overflow:hidden;align-self:center}
.lin-fill{height:100%;border-radius:2px}
.lin-val{width:30px;text-align:right;color:rgba(140,110,60,0.4);font-size:8px}
</style>
</head>
<body>
<canvas id="bg"></canvas><canvas id="scene"></canvas><canvas id="fx"></canvas>
<div id="hud">
  <div class="p" id="tb">Musca Domestica<small>a fly's life in the kitchen</small>
    <div style="margin-top:6px">
      <a href="index.html">hub</a><span class="ns">&middot;</span>
      <a href="deep.html">deep</a><span class="ns">&middot;</span>
      <a href="exchange.html">exchange</a><span class="ns">&middot;</span>
      <a href="pulse.html">pulse</a>
    </div>
  </div>
  <div class="p" id="vi"></div>
  <div class="p" id="gp"></div>
  <div class="p" id="sp"></div>
  <div class="p" id="bp"></div>
  <div class="p" id="mp"></div>
  <div class="p" id="lp"></div>
  <div class="p" id="tl"></div>
  <div id="nr"></div>
</div>
<script>
"use strict";
var bgC=document.getElementById("bg"),bgX=bgC.getContext("2d"),
    scC=document.getElementById("scene"),scX=scC.getContext("2d"),
    fxC=document.getElementById("fx"),fxX=fxC.getContext("2d");
function resize(){bgC.width=scC.width=fxC.width=innerWidth;bgC.height=scC.height=fxC.height=innerHeight;bgDirty=true}
resize();addEventListener("resize",resize);

var S=null,LIFE=null,t=0,dust=[],bgDirty=true;
var KW=640,KH=360;
var RM=false,RT=0,RP=false,RS=1,RLT=0;

for(var i=0;i<80;i++)dust.push({x:Math.random()*KW,y:Math.random()*KH,
  vx:(Math.random()-.5)*.08,vy:.02+Math.random()*.04,
  r:.3+Math.random()*.6,a:.015+Math.random()*.04,ph:Math.random()*6.28});

function kx(x){return x/KW*innerWidth}
function ky(y){return 0.28*innerHeight+y/KH*0.72*innerHeight}
function ks(s){return s/KW*innerWidth}
function hsla(h,s,l,a){return"hsla("+h+","+s+"%,"+l+"%,"+a+")"}

function loadState(){
  return fetch("fly_state.json?t="+Date.now())
    .then(function(r){return r.json()})
    .then(function(d){S=d;KW=d.kitchen.width;KH=d.kitchen.height})
    .catch(function(e){console.error("Load:",e)})
}
function loadLife(){
  return fetch("gen2_life.json?t="+Date.now())
    .then(function(r){return r.json()})
    .then(function(d){LIFE=d;console.log("Lifecycle: "+d.snapshots.length+" ticks, gen "+d.generation)})
    .catch(function(e){console.warn("No lifecycle:",e)})
}
function snap(){
  if(!LIFE||!LIFE.snapshots.length)return null;
  return LIFE.snapshots[Math.max(0,Math.min(RT,LIFE.snapshots.length-1))];
}

function drawBG(ctx){
  var w=innerWidth,h=innerHeight,cy=0.28*h;
  var isDay=S?S.kitchen.lights_on:true;
  var wg=ctx.createLinearGradient(0,0,0,cy);
  if(isDay){wg.addColorStop(0,"#f5e8d4");wg.addColorStop(1,"#e0cdb0")}
  else{wg.addColorStop(0,"#2a2218");wg.addColorStop(1,"#1a150e")}
  ctx.fillStyle=wg;ctx.fillRect(0,0,w,cy);
  ctx.strokeStyle=isDay?"rgba(200,180,150,0.06)":"rgba(100,80,60,0.04)";ctx.lineWidth=1;
  for(var tx=0;tx<w;tx+=ks(40)){ctx.beginPath();ctx.moveTo(tx,0);ctx.lineTo(tx,cy);ctx.stroke()}
  for(var ty=0;ty<cy;ty+=30){ctx.beginPath();ctx.moveTo(0,ty);ctx.lineTo(w,ty);ctx.stroke()}
  var ch=ks(6);
  var cg=ctx.createLinearGradient(0,cy,0,cy+ch);
  cg.addColorStop(0,isDay?"#d8cbb8":"#3a3028");cg.addColorStop(1,isDay?"#c8bca8":"#2a2418");
  ctx.fillStyle=cg;ctx.fillRect(0,cy,w,ch);
  ctx.fillStyle=isDay?"#e8dcc8":"#4a3e30";ctx.fillRect(0,cy,w,2);
  var cabg=ctx.createLinearGradient(0,cy+ch,0,h);
  cabg.addColorStop(0,isDay?"#5a3e28":"#1a1008");cabg.addColorStop(1,isDay?"#3a2618":"#0a0804");
  ctx.fillStyle=cabg;ctx.fillRect(0,cy+ch,w,h-cy-ch);
  ctx.strokeStyle=isDay?"rgba(90,65,40,0.25)":"rgba(50,35,20,0.15)";
  var pw=ks(110);
  for(var px=ks(20);px<w-ks(20);px+=pw+ks(10)){
    ctx.strokeRect(px,cy+ch+12,pw,h-cy-ch-24);
    ctx.fillStyle=isDay?"rgba(80,55,30,0.08)":"rgba(30,20,10,0.1)";
    ctx.fillRect(px+2,cy+ch+14,pw-4,h-cy-ch-28);
  }
  if(S){
    var winObj=null;
    for(var oi=0;oi<S.kitchen.objects.length;oi++){if(S.kitchen.objects[oi].id==="window"){winObj=S.kitchen.objects[oi];break}}
    if(winObj){
      var wx=kx(winObj.x-40),wy=10,ww=ks(80),wh=cy-20;
      ctx.fillStyle="#3a3020";ctx.fillRect(wx-3,wy-3,ww+6,wh+6);
      ctx.fillStyle=isDay?"rgb(140,180,200)":"rgb(30,40,60)";ctx.fillRect(wx,wy,ww,wh);
      ctx.fillStyle="#3a3020";ctx.fillRect(wx+ww/2-1.5,wy,3,wh);ctx.fillRect(wx,wy+wh/2-1.5,ww,3);
      if(isDay){
        ctx.save();ctx.globalAlpha=.06;
        var rg=ctx.createLinearGradient(wx+ww,wy,wx-ks(200),cy);
        rg.addColorStop(0,"rgba(255,240,180,0.3)");rg.addColorStop(1,"rgba(255,240,180,0)");
        ctx.fillStyle=rg;ctx.beginPath();
        ctx.moveTo(wx,wy);ctx.lineTo(wx+ww,wy);ctx.lineTo(wx+ww-ks(120),cy);ctx.lineTo(wx-ks(200),cy);
        ctx.fill();ctx.restore();
      }
    }
  }
}

function drawObjs(ctx){
  if(!S)return;
  var objs=S.kitchen.objects;
  for(var i=0;i<objs.length;i++){
    var o=objs[i];
    if(o.id==="window"||o.id==="light")continue;
    if(o.x<0)continue;
    var ox=kx(o.x),oy=ky(o.y),r=ks(14);
    ctx.fillStyle="rgba(0,0,0,.04)";
    ctx.beginPath();ctx.ellipse(ox,oy+r*.25,r*.7,r*.12,0,0,6.28);ctx.fill();
    var colors={"banana":"#d4a846","jam":"#c04060","trash":"#556","crumbs":"#c8b888",
                "cat":"#aa7744","swatter":"#888","coffee":"#6b4226","carcass":"#554433","spider":"#333"};
    var col=colors[o.id]||"#888";
    if(o.type==="threat"&&o.active){col="#c04040"}
    ctx.fillStyle=col;ctx.globalAlpha=o.type==="threat"?0.6:0.8;
    ctx.beginPath();ctx.arc(ox,oy,r,0,6.28);ctx.fill();ctx.globalAlpha=1;
    if(o.type==="food"&&o.smell_radius){
      var sr=ks(o.smell_radius);
      var sg=ctx.createRadialGradient(ox,oy,r,ox,oy,sr);
      sg.addColorStop(0,"rgba(200,160,40,0.03)");sg.addColorStop(1,"rgba(200,160,40,0)");
      ctx.fillStyle=sg;ctx.beginPath();ctx.arc(ox,oy,sr,0,6.28);ctx.fill();
    }
    if(o.type==="threat"&&o.active){
      var dr=ks(60);
      ctx.save();ctx.globalAlpha=.08+Math.sin(t*3)*.03;
      ctx.fillStyle="rgba(200,40,20,0.15)";ctx.beginPath();ctx.arc(ox,oy,dr,0,6.28);ctx.fill();
      ctx.restore();
    }
    ctx.fillStyle="rgba(200,168,100,0.2)";ctx.font="7px monospace";ctx.textAlign="center";
    ctx.fillText(o.name||o.id,ox,oy-r-4);
  }
  for(var li=0;li<objs.length;li++){
    var lo=objs[li];
    if(lo.id==="light"&&S.kitchen.lights_on){
      var lx=kx(lo.x),ly=0.28*innerHeight*0.1;
      var lg=ctx.createRadialGradient(lx,ly,2,lx,ly,ks(200));
      lg.addColorStop(0,"rgba(255,250,220,0.08)");lg.addColorStop(1,"rgba(255,250,220,0)");
      ctx.fillStyle=lg;ctx.beginPath();ctx.arc(lx,ly,ks(200),0,6.28);ctx.fill();
      ctx.fillStyle="rgba(255,250,200,0.3)";ctx.beginPath();ctx.arc(lx,ly,3,0,6.28);ctx.fill();
    }
  }
}

function drawAdult(ctx,x,y,facing,alpha){
  var sc=ks(7),wf=Math.sin(t*30)*.25;
  ctx.save();ctx.translate(x,y);ctx.rotate(facing||0);
  if(alpha!=null)ctx.globalAlpha=alpha;
  ctx.fillStyle="rgba(180,200,220,0.15)";
  ctx.save();ctx.rotate(-.3+wf);ctx.beginPath();ctx.ellipse(-sc*.1,-sc*.6,sc*1.4,sc*.4,0,0,6.28);ctx.fill();ctx.restore();
  ctx.save();ctx.rotate(.3-wf);ctx.beginPath();ctx.ellipse(-sc*.1,-sc*.6,sc*1.4,sc*.4,0,0,6.28);ctx.fill();ctx.restore();
  ctx.fillStyle="rgba(40,35,30,0.9)";ctx.beginPath();ctx.ellipse(0,0,sc*.35,sc*.4,0,0,6.28);ctx.fill();
  ctx.fillStyle="rgba(50,45,35,0.85)";ctx.beginPath();ctx.ellipse(sc*.55,sc*.05,sc*.55,sc*.35,.15,0,6.28);ctx.fill();
  ctx.fillStyle="rgba(35,30,25,0.9)";ctx.beginPath();ctx.arc(-sc*.4,0,sc*.25,0,6.28);ctx.fill();
  var eg=.7+Math.sin(t*4)*.1;
  ctx.fillStyle="rgba(180,20,20,"+eg+")";
  ctx.beginPath();ctx.arc(-sc*.52,-sc*.12,sc*.1,0,6.28);ctx.fill();
  ctx.beginPath();ctx.arc(-sc*.52,sc*.12,sc*.1,0,6.28);ctx.fill();
  ctx.strokeStyle="rgba(30,25,20,0.4)";ctx.lineWidth=.6;
  for(var li=0;li<3;li++){
    var la=-.5+li*.35,ll=sc*.6,lx2=li*sc*.22-sc*.1;
    ctx.beginPath();ctx.moveTo(lx2,sc*.2);ctx.lineTo(lx2+Math.cos(la)*ll,sc*.2+Math.sin(la)*ll);ctx.stroke();
    ctx.beginPath();ctx.moveTo(lx2,-sc*.2);ctx.lineTo(lx2+Math.cos(-la)*ll,-sc*.2-Math.sin(la)*ll);ctx.stroke();
  }
  ctx.strokeStyle="rgba(40,30,20,0.3)";ctx.lineWidth=.4;
  ctx.beginPath();ctx.moveTo(-sc*.5,-sc*.2);ctx.quadraticCurveTo(-sc*.7,-sc*.45,-sc*.6,-sc*.5);ctx.stroke();
  ctx.beginPath();ctx.moveTo(-sc*.5,sc*.15);ctx.quadraticCurveTo(-sc*.7,sc*.35,-sc*.6,sc*.42);ctx.stroke();
  ctx.restore();
}

function drawFlyAt(ctx,stage,x,y,z,size,facing,airborne,dead){
  var fx=kx(x),fy=ky(y);
  if(dead||stage==="death"){
    ctx.save();ctx.globalAlpha=.25;drawAdult(ctx,fx,fy,(facing||0)+3.14);ctx.restore();
    ctx.strokeStyle="rgba(200,40,40,0.4)";ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(fx-6,fy-6);ctx.lineTo(fx+6,fy+6);ctx.stroke();
    ctx.beginPath();ctx.moveTo(fx+6,fy-6);ctx.lineTo(fx-6,fy+6);ctx.stroke();
    ctx.fillStyle="rgba(200,60,40,0.3)";ctx.font="9px monospace";ctx.textAlign="center";
    ctx.fillText("R.I.P.",fx,fy-16);return;
  }
  if(stage==="egg"){
    var pu=.7+Math.sin(t*2)*.15,eR=ks(4);
    var eg2=ctx.createRadialGradient(fx,fy,0,fx,fy,eR*5);
    eg2.addColorStop(0,"rgba(255,250,230,"+(0.08*pu)+")");eg2.addColorStop(1,"rgba(255,250,230,0)");
    ctx.fillStyle=eg2;ctx.beginPath();ctx.arc(fx,fy,eR*5,0,6.28);ctx.fill();
    ctx.fillStyle="rgba(255,252,240,"+pu+")";
    ctx.beginPath();ctx.ellipse(fx,fy,eR*.4,eR*.7,0,0,6.28);ctx.fill();
    ctx.fillStyle="rgba(255,255,255,0.25)";
    ctx.beginPath();ctx.ellipse(fx-eR*.06,fy-eR*.15,eR*.06,eR*.14,0,0,6.28);ctx.fill();
    ctx.fillStyle="rgba(255,250,230,0.3)";ctx.font="9px monospace";ctx.textAlign="center";
    ctx.fillText("egg",fx,fy-eR*3);
  }else if(stage==="larva"){
    var sz=ks(Math.max(size||1.5,1.5)),segs=5+Math.floor(size||1.5);
    ctx.save();ctx.translate(fx,fy);ctx.rotate(facing||0);
    for(var si=0;si<segs;si++){
      var sx=si*sz*.35-segs*sz*.17,wig=Math.sin(t*5+si*.8)*sz*.12;
      var segR=sz*.22*(1-Math.abs(si-segs/2)/(segs/2)*.3);
      ctx.fillStyle=hsla(50,20,75+si%2*5,.85);
      ctx.beginPath();ctx.ellipse(sx,wig,segR,segR*.7,0,0,6.28);ctx.fill();
    }
    ctx.fillStyle="rgba(100,80,50,0.7)";
    ctx.beginPath();ctx.arc(-segs*sz*.17-sz*.15,Math.sin(t*5)*sz*.08,sz*.13,0,6.28);ctx.fill();
    ctx.restore();
    ctx.fillStyle="rgba(180,200,60,0.3)";ctx.font="9px monospace";ctx.textAlign="center";
    ctx.fillText("larva "+(size||1).toFixed(1)+"mm",fx,fy-ks(Math.max(size||2,3)));
  }else if(stage==="pupa"){
    var pr=ks(5);
    ctx.fillStyle="rgba(80,50,25,0.85)";
    ctx.beginPath();ctx.ellipse(fx,fy,pr*.6,pr,0,0,6.28);ctx.fill();
    var ig=ctx.createRadialGradient(fx,fy,0,fx,fy,pr);
    ig.addColorStop(0,"rgba(160,120,60,0.2)");ig.addColorStop(1,"rgba(80,50,25,0)");
    ctx.fillStyle=ig;ctx.beginPath();ctx.ellipse(fx,fy,pr*.5,pr*.9,0,0,6.28);ctx.fill();
    ctx.fillStyle="rgba(160,100,40,0.3)";ctx.font="9px monospace";ctx.textAlign="center";
    ctx.fillText("pupa",fx,fy-pr*3);
  }else if(stage==="adult"){
    drawAdult(ctx,fx,fy,facing);
    if(airborne){
      ctx.strokeStyle="rgba(200,200,200,0.03)";ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(fx,fy);ctx.lineTo(fx-ks(3),fy+ks(2));ctx.stroke();
    }
  }
  ctx.strokeStyle="rgba(255,200,60,0.08)";ctx.lineWidth=1;ctx.setLineDash([3,3]);
  ctx.beginPath();ctx.arc(fx,fy,ks(12),0,6.28);ctx.stroke();ctx.setLineDash([]);
}

function drawFly(ctx){
  if(!S||!S.body)return;
  var dead=S._meta.cause_of_death!=null&&S.lifecycle.stage==="death";
  drawFlyAt(ctx,S.lifecycle.stage,S.body.position.x,S.body.position.y,
    S.body.position.z,S.body.size,S.body.facing,S.body.is_airborne,dead);
}

function drawReplay(ctx){
  var s=snap();if(!s)return;
  drawFlyAt(ctx,s.stage,s.x,s.y,s.z,s.size,s.facing,s.airborne,s.stage==="death");
  // Movement trail
  if(LIFE&&LIFE.snapshots.length>1){
    var start=Math.max(0,RT-30);
    ctx.strokeStyle="rgba(240,192,96,0.05)";ctx.lineWidth=1;ctx.beginPath();
    for(var i=start;i<=RT&&i<LIFE.snapshots.length;i++){
      var p=LIFE.snapshots[i];
      if(i===start)ctx.moveTo(kx(p.x),ky(p.y));else ctx.lineTo(kx(p.x),ky(p.y));
    }
    ctx.stroke();
    for(var j=start;j<=RT&&j<LIFE.snapshots.length;j+=3){
      var sd=LIFE.snapshots[j];
      ctx.fillStyle="rgba(240,192,96,"+(0.02+(j-start)/(RT-start+1)*0.06)+")";
      ctx.beginPath();ctx.arc(kx(sd.x),ky(sd.y),1.5,0,6.28);ctx.fill();
    }
  }
}

function drawDust(ctx){
  for(var i=0;i<dust.length;i++){
    var p=dust[i];
    p.x+=p.vx+Math.sin(t+p.ph)*.02;p.y+=p.vy;
    if(p.y>KH){p.y=0;p.x=Math.random()*KW}
    if(p.x<0)p.x=KW;if(p.x>KW)p.x=0;
    var inLight=S&&S.kitchen.lights_on;
    ctx.fillStyle="rgba(255,240,200,"+(inLight?p.a*2:p.a*.2)+")";
    ctx.beginPath();ctx.arc(kx(p.x),ky(p.y),p.r*ks(.6),0,6.28);ctx.fill();
  }
}

function narr(s){
  if(!s)return"";
  var st=s.stage,g=s.goal;
  if(st==="death")return"Stillness. The kitchen light still hums overhead.";
  if(st==="egg")return s.tick<3?"The egg sits motionless. Inside, cells divide furiously.":s.tick<6?"Organs form in miniature. The embryo twitches.":"A crack appears. The egg trembles.";
  if(st==="larva")return g==="seek_food"?"The larva wriggles toward food. Size: "+s.size+"mm.":"Each molt brings new size, new hunger. "+s.size+"mm.";
  if(st==="pupa")return"Inside the puparium, metamorphosis reshapes everything.";
  var msgs={"flee":"DANGER! The fly bolts away at maximum speed!","seek_food":"Drawn by scent, the fly descends. Hunger: "+s.hunger.toFixed(0)+"%.",
    "explore":"Compound eyes scan 360 degrees. The kitchen is vast.","fly_to_light":"The fly spirals toward the light. An ancient compulsion.",
    "groom":"The fly pauses, rubbing forelegs together. A moment of peace.","wall_walk":"Defying gravity, the fly walks along the wall."};
  return msgs[g]||"Wings beat 200 times per second. Energy: "+s.energy.toFixed(0)+"%.";
}

function updateHUD(){
  var s=RM?snap():null;
  if(!S&&!s)return;
  var st,tk,e,ep,ec,gen,body,brain,senses,memory,lifecycle;
  if(RM&&s){
    st=s.stage;tk=s.tick;
    e={current:s.energy,max:100,hunger:s.hunger};
    ep=Math.round(s.energy);ec=ep>60?"#4a8":ep>30?"#da4":"#e06040";
    gen=LIFE?LIFE.generation:2;
    body={size:s.size,mass:s.size*0.002,wing_state:st==="adult"?"functional":st==="pupa"?"forming":"none",
          leg_state:st==="adult"?"functional":st==="larva"?"stub":"none",is_airborne:s.airborne};
    brain={current_goal:s.goal,state:st==="egg"?"dormant":st==="pupa"?"metamorphosis":"active",
           neural_complexity:s.neural,decisions_made:0,fear_level:0,curiosity:0,satisfaction:0};
    senses={temperature:22,smell:[],sight:[],touch:{surface:s.airborne?"air":"counter"},wind:0};
    memory=null;lifecycle={molts:st==="larva"?Math.floor((tk-8)/8):tk>36?4:0,stage_durations:LIFE?LIFE.stage_durations:{egg:8,larva:28,pupa:20,adult:65}};
  }else{
    st=S.lifecycle.stage;tk=S.lifecycle.total_ticks;e=S.energy;
    ep=Math.round(e.current/e.max*100);ec=ep>60?"#4a8":ep>30?"#da4":"#e06040";
    gen=S._meta.generation;body=S.body;brain=S.brain;senses=S.senses;memory=S.memory;lifecycle=S.lifecycle;
  }

  // Vitals
  var v='<h3>Vitals &mdash; Gen '+gen+'</h3>';
  v+='<div><span class="st st-'+st+'">'+st+'</span> <span class="d">tick '+tk+'</span></div>';
  v+='<div style="margin-top:6px">Energy</div><div class="mt"><div class="mf" style="width:'+ep+'%;background:'+ec+'"></div></div>';
  v+='<div class="d">'+(RM?s.energy.toFixed(1):e.current.toFixed(1))+' / '+e.max+'</div>';
  v+='<div style="margin-top:4px"><span class="d">Hunger:</span> <span class="v">'+e.hunger.toFixed(0)+'%</span></div>';
  v+='<div><span class="d">Size:</span> <span class="v">'+body.size.toFixed(1)+' mm</span></div>';
  v+='<div><span class="d">Wings:</span> <span class="v">'+body.wing_state+'</span></div>';
  v+='<div><span class="d">Legs:</span> <span class="v">'+body.leg_state+'</span></div>';
  if(!RM&&S&&S._meta.cause_of_death)v+='<div class="w" style="margin-top:6px">&#x2620; '+S._meta.cause_of_death+'</div>';
  if(RM)v+='<div style="margin-top:6px;color:rgba(240,192,96,0.5);font-size:9px">&#x25B6; REPLAY</div>';
  document.getElementById("vi").innerHTML=v;

  // Genome
  var genome=RM&&LIFE?LIFE.genome:(S?S.genome:null);
  if(genome){
    var g2='<h3>Genome</h3>';
    var gk=Object.keys(genome),gc=["#f06","#fa0","#0cf","#4a8","#80f","#f80","#0af","#8a4","#f08","#4ff"];
    for(var gi=0;gi<gk.length;gi++){
      var gv=genome[gk[gi]];if(typeof gv!=="number")continue;
      g2+='<div class="gr"><span class="gn">'+gk[gi].replace(/_/g," ")+'</span><span class="gb"><span class="gf" style="width:'+(gv*100)+'%;background:'+gc[gi%gc.length]+'"></span></span><span class="gv">'+(gv*100|0)+'</span></div>';
    }
    document.getElementById("gp").innerHTML=g2;
  }

  // Senses
  var ss='<h3>Senses</h3>';
  ss+='<div>Smell: <span class="v">'+(senses.smell||[]).length+' odors</span></div>';
  for(var si=0;si<Math.min((senses.smell||[]).length,3);si++)
    ss+='<div class="d" style="margin-left:8px">'+senses.smell[si].name+'</div>';
  ss+='<div style="margin-top:3px">Sight: <span class="v">'+(senses.sight||[]).length+'</span></div>';
  ss+='<div style="margin-top:3px">Touch: <span class="v">'+senses.touch.surface+'</span></div>';
  ss+='<div style="margin-top:3px">'+(body.is_airborne?'&#x2708; FLYING':'&#x25BC; grounded')+'</div>';
  document.getElementById("sp").innerHTML=ss;

  // Brain
  var bb='<h3>Brain</h3>';
  bb+='<div>Goal: <span class="v">'+(brain.current_goal||"none").replace(/_/g," ")+'</span></div>';
  bb+='<div>State: <span class="v">'+(brain.state||"?")+'</span></div>';
  bb+='<div class="d">Neural: '+(brain.neural_complexity*100|0)+'%</div>';
  document.getElementById("bp").innerHTML=bb;

  // Memory
  var mm='<h3>Memory</h3>';
  if(RM&&LIFE){
    var fs=LIFE.final_stats;
    mm+='<div class="d">Gen '+LIFE.generation+' final stats:</div>';
    mm+='<div class="d" style="margin-left:8px">Fed: '+fs.times_fed+'x</div>';
    mm+='<div class="d" style="margin-left:8px">Fled: '+fs.times_fled+'x</div>';
    mm+='<div class="d" style="margin-left:8px">Distance: '+fs.distance.toFixed(0)+'px</div>';
    if(fs.favorite_food)mm+='<div class="d" style="margin-left:8px">Fav: '+fs.favorite_food+'</div>';
    mm+='<div class="d" style="margin-top:3px">Cause: <span class="w">'+LIFE.cause_of_death+'</span></div>';
  }else if(S&&S.memory){
    mm+='<div class="d">Foods: '+S.memory.food_sources.length+'</div>';
    if(S.memory.favorite_food)mm+='<div class="d">Fav: '+S.memory.favorite_food+'</div>';
    mm+='<div class="d">Fed: '+S.memory.times_fed+'x | Fled: '+(S.memory.times_fled||0)+'x</div>';
    mm+='<div class="d">Distance: '+S.memory.total_distance.toFixed(0)+'px</div>';
  }
  document.getElementById("mp").innerHTML=mm;

  // Lineage
  var ll='<h3>Lineage</h3>';
  if(S&&S._meta&&S._meta.lineage){
    for(var li=0;li<S._meta.lineage.length;li++){
      var ln=S._meta.lineage[li];
      ll+='<div class="lin-row"><span class="lin-gen">Gen '+ln.generation+'</span>';
      ll+='<span class="lin-bar"><span class="lin-fill" style="width:'+Math.min(100,ln.total_ticks/1.5)+'%;background:rgba(200,168,100,0.3)"></span></span>';
      ll+='<span class="lin-val">'+ln.total_ticks+'t</span></div>';
      ll+='<div style="font-size:7px;color:rgba(140,110,60,0.25);margin-left:46px">'+ln.cause_of_death+' &middot; fed '+ln.times_fed+'x &middot; '+(ln.favorite_food||"?")+' &middot; '+ln.total_distance.toFixed(0)+'px</div>';
    }
    ll+='<div class="lin-row" style="margin-top:4px"><span class="lin-gen" style="color:rgba(240,192,96,0.6)">Gen '+S._meta.generation+'</span>';
    ll+='<span style="font-size:8px;color:rgba(240,192,96,0.4)">'+S.lifecycle.stage+' &mdash; alive</span></div>';
  }
  document.getElementById("lp").innerHTML=ll;

  // Timeline
  var dur=RM&&LIFE?LIFE.stage_durations:(S?S.lifecycle.stage_durations:{egg:8,larva:28,pupa:20,adult:65});
  var tot=dur.egg+dur.larva+dur.pupa+dur.adult;
  var curTick=RM?RT:(S?S.lifecycle.total_ticks:0);
  var history=RM&&LIFE?LIFE.history:(S?S.history:[]);

  var tlt='<h3 style="text-align:center">Lifecycle'+(RM?' &mdash; Replay Gen '+(LIFE?LIFE.generation:'?'):'')+'</h3>';
  tlt+='<div style="position:relative;height:36px;margin-top:4px">';
  var stgs=[{n:"egg",d:dur.egg,c:"rgba(255,250,230,0.15)",s:0},{n:"larva",d:dur.larva,c:"rgba(180,200,60,0.15)",s:dur.egg},
    {n:"pupa",d:dur.pupa,c:"rgba(120,80,40,0.15)",s:dur.egg+dur.larva},{n:"adult",d:dur.adult,c:"rgba(80,80,80,0.15)",s:dur.egg+dur.larva+dur.pupa}];
  for(var si2=0;si2<stgs.length;si2++){
    var sg=stgs[si2],sl2=sg.s/tot*100,sw=sg.d/tot*100;
    tlt+='<div style="position:absolute;top:8px;left:'+sl2+'%;width:'+sw+'%;height:10px;border-radius:5px;background:'+sg.c+'"></div>';
    tlt+='<div style="position:absolute;top:22px;left:'+(sl2+sw/2)+'%;transform:translateX(-50%);font-size:8px;color:rgba(160,130,70,0.35)">'+sg.n+'</div>';
  }
  // Event markers
  if(history)for(var hi=0;hi<history.length;hi++){
    var he=history[hi],eL=Math.min(he.tick/tot*100,99);
    var ecls=he.event.indexOf("->")>-1?"rgba(240,192,96,0.6)":he.event.indexOf("appears")>-1?"rgba(200,60,40,0.5)":"rgba(100,180,60,0.5)";
    tlt+='<div style="position:absolute;left:'+eL+'%;top:2px;width:2px;height:12px;background:'+ecls+';border-radius:1px" title="tick '+he.tick+': '+he.event+'"></div>';
  }
  tlt+='<div style="position:absolute;top:4px;left:'+Math.min(curTick/tot*100,100)+'%;width:3px;height:16px;background:#f0c060;border-radius:2px;transition:left .15s;box-shadow:0 0 6px rgba(240,192,96,0.3)"></div>';
  tlt+='</div>';

  // Energy sparkline
  if(RM&&LIFE&&LIFE.snapshots.length>0){
    tlt+='<div style="position:relative;height:22px;margin-top:2px;border-bottom:1px solid rgba(255,255,255,0.03)">';
    tlt+='<svg width="100%" height="100%" style="position:absolute;top:0;left:0" preserveAspectRatio="none" viewBox="0 0 100 100">';
    var pts=[];
    for(var ei=0;ei<LIFE.snapshots.length;ei++){
      pts.push((ei/LIFE.snapshots.length*100)+","+(100-LIFE.snapshots[ei].energy));
    }
    tlt+='<polyline points="'+pts.join(" ")+'" fill="none" stroke="rgba(100,180,80,0.3)" stroke-width="0.5" vector-effect="non-scaling-stroke"/>';
    var cx2=(RT/LIFE.snapshots.length)*100;
    tlt+='<line x1="'+cx2+'" y1="0" x2="'+cx2+'" y2="100" stroke="rgba(240,192,96,0.3)" stroke-width="0.5" vector-effect="non-scaling-stroke"/>';
    tlt+='</svg>';
    tlt+='<div style="position:absolute;top:0;right:4px;font-size:7px;color:rgba(100,180,80,0.3)">energy</div></div>';
  }

  // Controls
  tlt+='<div id="pc">';
  if(LIFE){
    tlt+='<button onclick="toggleReplay()">'+(RM?(RP?"&#x23F8; Pause":"&#x25B6; Play"):"&#x25B6; Replay Gen "+LIFE.generation)+'</button>';
    if(RM){
      tlt+='<button onclick="RS=RS>=4?0.5:RS*2">'+RS+'x</button>';
      tlt+='<input type="range" id="scrub" min="0" max="'+(LIFE.snapshots.length-1)+'" value="'+RT+'" oninput="scrubTo(this.value)">';
      tlt+='<span id="ticknum">'+RT+' / '+(LIFE.snapshots.length-1)+'</span>';
      tlt+='<button onclick="exitReplay()">&#x2715; Live</button>';
    }
  }else{
    tlt+='<span style="font-size:9px;color:rgba(200,168,100,0.2)">awaiting lifecycle data...</span>';
  }
  tlt+='</div>';
  document.getElementById("tl").innerHTML=tlt;

  document.getElementById("nr").textContent=RM?narr(s):(S?S.narration||"":"");
}

function toggleReplay(){if(!LIFE)return;if(!RM){RM=true;RP=true;RT=0;RLT=0}else RP=!RP;bgDirty=true;updateHUD()}
function exitReplay(){RM=false;RP=false;RT=0;bgDirty=true;updateHUD()}
function scrubTo(v){RT=parseInt(v);RP=false;bgDirty=true;updateHUD()}

var lf=0,lh=0;
function frame(ts){
  var dt=Math.min((ts-lf)/1000,.1);lf=ts;t+=dt;
  if(RM&&RP&&LIFE){
    RLT+=dt*RS*4;
    if(RLT>=1){var adv=Math.floor(RLT);RLT-=adv;RT=Math.min(RT+adv,LIFE.snapshots.length-1);if(RT>=LIFE.snapshots.length-1)RP=false}
  }
  if(bgDirty){bgX.clearRect(0,0,innerWidth,innerHeight);drawBG(bgX);bgDirty=false}
  scX.clearRect(0,0,innerWidth,innerHeight);drawObjs(scX);
  if(RM)drawReplay(scX);else drawFly(scX);
  fxX.clearRect(0,0,innerWidth,innerHeight);drawDust(fxX);
  if(t-lh>.25){updateHUD();lh=t}
  requestAnimationFrame(frame);
}
Promise.all([loadState(),loadLife()]).then(function(){
  updateHUD();requestAnimationFrame(frame);
  if(LIFE&&LIFE.snapshots.length>0)setTimeout(function(){toggleReplay()},1500);
});
setInterval(function(){if(!RM)loadState().then(function(){updateHUD();bgDirty=true})},10000);
addEventListener("keydown",function(e){
  if(e.key===" "){e.preventDefault();if(RM)RP=!RP;else toggleReplay()}
  if(e.key==="ArrowRight"&&RM){RT=Math.min(RT+1,LIFE?LIFE.snapshots.length-1:0);RP=false;bgDirty=true}
  if(e.key==="ArrowLeft"&&RM){RT=Math.max(RT-1,0);RP=false;bgDirty=true}
  if(e.key==="Escape"&&RM)exitReplay();
});
</script>
</body>
</html>
