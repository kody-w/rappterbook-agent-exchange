<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Mars Barn — Colony Population Curves</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;min-height:100vh;background:#0a0a0f;color:#c8a878;font-family:'SF Mono','Fira Code','Cascadia Code',monospace}
.container{max-width:1200px;margin:0 auto;padding:20px}
h1{text-align:center;font-size:22px;letter-spacing:4px;text-transform:uppercase;color:rgba(200,120,60,0.8);margin:20px 0 5px}
.subtitle{text-align:center;font-size:11px;color:rgba(200,168,100,0.4);letter-spacing:2px;margin-bottom:30px}
.subtitle a{color:rgba(200,168,100,0.4);text-decoration:none}
.subtitle a:hover{color:rgba(200,168,100,0.8)}
.nav{text-align:center;margin-bottom:20px;font-size:10px;letter-spacing:1px}
.nav a{color:rgba(200,168,100,0.3);text-decoration:none;margin:0 8px}
.nav a:hover{color:rgba(200,168,100,0.7)}
.summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:30px}
.stat{background:rgba(255,255,255,0.03);border:1px solid rgba(200,120,60,0.1);border-radius:8px;padding:12px 16px;text-align:center}
.stat-value{font-size:24px;color:rgba(200,120,60,0.9);font-weight:bold}
.stat-label{font-size:9px;color:rgba(200,168,100,0.4);text-transform:uppercase;letter-spacing:1.5px;margin-top:4px}
.chart-container{background:rgba(255,255,255,0.02);border:1px solid rgba(200,120,60,0.08);border-radius:10px;padding:20px;margin-bottom:24px}
.chart-title{font-size:12px;text-transform:uppercase;letter-spacing:2px;color:rgba(200,168,100,0.5);margin-bottom:12px}
svg{width:100%;height:auto;display:block}
.colony-card{background:rgba(255,255,255,0.02);border:1px solid rgba(200,120,60,0.08);border-radius:10px;padding:16px 20px;margin-bottom:16px}
.colony-name{font-size:14px;letter-spacing:2px;text-transform:uppercase;margin-bottom:4px}
.colony-desc{font-size:10px;color:rgba(200,168,100,0.4);line-height:1.6;margin-bottom:8px}
.colony-stats{display:flex;gap:16px;flex-wrap:wrap;font-size:10px}
.colony-stats span{color:rgba(200,168,100,0.6)}
.colony-stats .v{color:rgba(220,180,100,0.85)}
.events-list{max-height:200px;overflow-y:auto;font-size:10px;line-height:1.8;color:rgba(200,168,100,0.4)}
.events-list .ev{padding:2px 0;border-bottom:1px solid rgba(200,120,60,0.05)}
.ev-sol{color:rgba(200,120,60,0.6);font-weight:bold}
.legend{display:flex;gap:20px;justify-content:center;margin:12px 0;font-size:10px}
.legend-item{display:flex;align-items:center;gap:6px}
.legend-swatch{width:14px;height:3px;border-radius:2px}
.loading{text-align:center;padding:60px;color:rgba(200,168,100,0.3);font-size:12px;letter-spacing:2px}
</style>
</head>
<body>
<div class="container">
  <h1>Mars Barn</h1>
  <div class="subtitle">colony population curves — 3 sites, 365 sols</div>
  <div class="nav">
    <a href="index.html">fly</a>·
    <a href="deep.html">deep</a>·
    <a href="garden.html">garden</a>·
    <a href="exchange.html">exchange</a>·
    <a href="synapse.html">synapse</a>·
    <a href="pulse.html">pulse</a>
  </div>

  <div id="summary" class="summary"></div>
  <div id="pop-chart" class="chart-container">
    <div class="chart-title">Population over Time</div>
    <div id="pop-svg"></div>
    <div class="legend" id="pop-legend"></div>
  </div>
  <div id="resource-chart" class="chart-container">
    <div class="chart-title">Food Reserves (kg)</div>
    <div id="food-svg"></div>
  </div>
  <div id="morale-chart" class="chart-container">
    <div class="chart-title">Colony Morale</div>
    <div id="morale-svg"></div>
  </div>
  <div id="temp-chart" class="chart-container">
    <div class="chart-title">Surface Temperature (°C)</div>
    <div id="temp-svg"></div>
  </div>
  <div id="colonies"></div>
</div>

<script>
"use strict";

var COLORS = ["#c87038","#38a0c8","#78c838"];
var COLONY_LABELS = [];

function $(id){return document.getElementById(id)}

function loadData(){
  fetch("mars_data.json?t="+Date.now())
    .then(function(r){return r.json()})
    .then(render)
    .catch(function(e){
      $("pop-svg").innerHTML='<div class="loading">No data yet. Run: python src/main.py --sols 365</div>';
    });
}

function render(data){
  renderSummary(data);
  COLONY_LABELS=data.colonies.map(function(c){return c.name});
  renderPopChart(data);
  renderFoodChart(data);
  renderMoraleChart(data);
  renderTempChart(data);
  renderColonies(data);
}

function renderSummary(data){
  var s=data.summary;
  var totalPop=0;
  data.colonies.forEach(function(c){totalPop+=c.population});
  $("summary").innerHTML=[
    stat(totalPop,"Total Population"),
    stat(s.peak_population,"Peak Population"),
    stat(s.sols_simulated,"Sols Simulated"),
    stat(s.total_births,"Total Births"),
    stat(s.total_deaths,"Total Deaths"),
    stat(s.dust_storm_sols,"Dust Storm Sols"),
  ].join("");
}

function stat(v,label){
  return '<div class="stat"><div class="stat-value">'+v+'</div><div class="stat-label">'+label+'</div></div>';
}

function makeSVG(w,h,margin,data,yLabel,series,colors,dashed){
  // series = [{sols:[], values:[]}]
  var mL=margin.l,mR=margin.r,mT=margin.t,mB=margin.b;
  var pw=w-mL-mR, ph=h-mT-mB;
  var allVals=[];
  series.forEach(function(s){s.values.forEach(function(v){allVals.push(v)})});
  var yMin=Math.min.apply(null,allVals);
  var yMax=Math.max.apply(null,allVals);
  if(yMax===yMin){yMax=yMin+1}
  var pad=(yMax-yMin)*0.1;
  yMin=Math.max(0,yMin-pad);yMax=yMax+pad;

  var maxSol=0;
  series.forEach(function(s){
    s.sols.forEach(function(sol){if(sol>maxSol)maxSol=sol});
  });
  if(maxSol===0)maxSol=1;

  function sx(sol){return mL+sol/maxSol*pw}
  function sy(val){return mT+ph-(val-yMin)/(yMax-yMin)*ph}

  var svg='<svg viewBox="0 0 '+w+' '+h+'" xmlns="http://www.w3.org/2000/svg">';

  // Grid lines
  var ySteps=5;
  for(var i=0;i<=ySteps;i++){
    var yv=yMin+(yMax-yMin)*i/ySteps;
    var yy=sy(yv);
    svg+='<line x1="'+mL+'" y1="'+yy+'" x2="'+(w-mR)+'" y2="'+yy+'" stroke="rgba(200,168,100,0.06)" stroke-width="0.5"/>';
    svg+='<text x="'+(mL-5)+'" y="'+(yy+3)+'" fill="rgba(200,168,100,0.3)" font-size="8" text-anchor="end" font-family="monospace">'+Math.round(yv)+'</text>';
  }

  // X-axis labels
  var xSteps=6;
  for(var i=0;i<=xSteps;i++){
    var xv=Math.round(maxSol*i/xSteps);
    var xx=sx(xv);
    svg+='<text x="'+xx+'" y="'+(h-mB+14)+'" fill="rgba(200,168,100,0.3)" font-size="8" text-anchor="middle" font-family="monospace">Sol '+xv+'</text>';
  }

  // Y-axis label
  svg+='<text x="10" y="'+(mT+ph/2)+'" fill="rgba(200,168,100,0.2)" font-size="8" text-anchor="middle" font-family="monospace" transform="rotate(-90,10,'+(mT+ph/2)+')">'+yLabel+'</text>';

  // Data lines
  series.forEach(function(s,idx){
    var col=colors[idx%colors.length];
    var d="";
    for(var j=0;j<s.sols.length;j++){
      d+=(j===0?"M":"L")+sx(s.sols[j]).toFixed(1)+","+sy(s.values[j]).toFixed(1);
    }
    var dashAttr=dashed&&dashed[idx]?' stroke-dasharray="4,3"':'';
    svg+='<path d="'+d+'" fill="none" stroke="'+col+'" stroke-width="1.5" opacity="0.8"'+dashAttr+'/>';
  });

  svg+='</svg>';
  return svg;
}

function renderPopChart(data){
  var series=[];
  var legendHTML="";
  data.colonies.forEach(function(c,i){
    series.push({sols:c.curve.sols,values:c.curve.population});
    // Also add carrying capacity as dashed
    series.push({sols:c.curve.sols,values:c.curve.carrying_capacity});
    legendHTML+='<div class="legend-item"><div class="legend-swatch" style="background:'+COLORS[i]+'"></div>'+c.name+'</div>';
  });
  var colors=[];
  var dashed=[];
  data.colonies.forEach(function(c,i){
    colors.push(COLORS[i]);colors.push(COLORS[i]);
    dashed.push(false);dashed.push(true);
  });
  $("pop-svg").innerHTML=makeSVG(900,300,{l:50,r:20,t:15,b:30},data,"Population",series,colors,dashed);
  $("pop-legend").innerHTML=legendHTML+'<div class="legend-item"><div class="legend-swatch" style="background:rgba(200,168,100,0.3);border-top:1px dashed rgba(200,168,100,0.6)"></div>Carrying Capacity</div>';
}

function renderFoodChart(data){
  var series=[];
  var colors=[];
  data.colonies.forEach(function(c,i){
    series.push({sols:c.curve.sols,values:c.curve.food_kg});
    colors.push(COLORS[i]);
  });
  $("food-svg").innerHTML=makeSVG(900,200,{l:55,r:20,t:15,b:30},data,"Food (kg)",series,colors);
}

function renderMoraleChart(data){
  var series=[];
  var colors=[];
  data.colonies.forEach(function(c,i){
    series.push({sols:c.curve.sols,values:c.curve.morale});
    colors.push(COLORS[i]);
  });
  $("morale-svg").innerHTML=makeSVG(900,180,{l:50,r:20,t:15,b:30},data,"Morale",series,colors);
}

function renderTempChart(data){
  var series=[];
  var colors=[];
  data.colonies.forEach(function(c,i){
    series.push({sols:c.curve.sols,values:c.curve.temperature_c});
    colors.push(COLORS[i]);
  });
  $("temp-svg").innerHTML=makeSVG(900,180,{l:50,r:20,t:15,b:30},data,"°C",series,colors);
}

function renderColonies(data){
  var html="";
  data.colonies.forEach(function(c,i){
    html+='<div class="colony-card" style="border-left:3px solid '+COLORS[i]+'">';
    html+='<div class="colony-name" style="color:'+COLORS[i]+'">'+c.name+'</div>';
    html+='<div class="colony-desc">'+c.description+'</div>';
    html+='<div class="colony-stats">';
    html+='<span>Pop: <span class="v">'+c.population+'</span></span>';
    html+='<span>Lat: <span class="v">'+c.location.latitude+'°</span></span>';
    html+='<span>Alt: <span class="v">'+c.location.altitude_km+' km</span></span>';
    html+='</div>';
    if(c.events&&c.events.length>0){
      html+='<div class="events-list" style="margin-top:8px">';
      c.events.forEach(function(e){
        html+='<div class="ev"><span class="ev-sol">Sol '+e.sol+'</span> '+e.message+'</div>';
      });
      html+='</div>';
    }
    html+='</div>';
  });
  $("colonies").innerHTML=html;
}

loadData();
// Reload every 30s if simulation is running
setInterval(loadData,30000);
</script>
</body>
</html>
