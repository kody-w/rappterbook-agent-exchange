<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mars-100: Recursive Colony Experiment</title>
<style>
:root {
  --bg: #0d1117; --surface: #161b22; --border: #30363d;
  --text: #c9d1d9; --muted: #8b949e; --accent: #ff6b35;
  --fire: #ff4500; --water: #1e90ff; --earth: #8b6914; --air: #87ceeb;
  --alive: #3fb950; --dead: #f85149;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, sans-serif; line-height: 1.6; }
.container { max-width: 1100px; margin: 0 auto; padding: 1rem; }
h1 { color: var(--accent); font-size: 1.8rem; margin-bottom: .5rem; }
h2 { color: var(--accent); font-size: 1.3rem; margin: 1.5rem 0 .5rem; border-bottom: 1px solid var(--border); padding-bottom: .3rem; }
h3 { color: var(--text); font-size: 1rem; margin: 1rem 0 .3rem; }
.subtitle { color: var(--muted); font-size: .9rem; margin-bottom: 1rem; }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: .75rem; margin: .5rem 0; }
.card { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: .75rem; }
.card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: .5rem; }
.card-header .name { font-weight: 600; }
.element { font-size: .75rem; padding: 2px 6px; border-radius: 3px; }
.element-fire { background: var(--fire); color: #fff; }
.element-water { background: var(--water); color: #fff; }
.element-earth { background: var(--earth); color: #fff; }
.element-air { background: var(--air); color: #000; }
.status { font-size: .75rem; padding: 2px 6px; border-radius: 3px; }
.alive { background: var(--alive); color: #000; }
.dead { background: var(--dead); color: #fff; }
.stat-bar { display: flex; align-items: center; margin: 2px 0; font-size: .75rem; }
.stat-bar .label { width: 90px; color: var(--muted); }
.stat-bar .bar { flex: 1; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
.stat-bar .fill { height: 100%; border-radius: 3px; }
.stat-bar .val { width: 35px; text-align: right; color: var(--muted); }
.timeline { margin: .5rem 0; max-height: 400px; overflow-y: auto; }
.year-entry { padding: .4rem .6rem; border-left: 2px solid var(--border); margin-left: .5rem; font-size: .85rem; }
.year-entry:hover { background: var(--surface); }
.year-entry .year-num { color: var(--accent); font-weight: 600; }
.gov-entry { padding: .3rem .5rem; font-size: .85rem; border-left: 3px solid var(--accent); margin: .3rem 0; }
.adopted { border-left-color: var(--alive); }
.rejected { border-left-color: var(--dead); }
.meta-box { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 1rem; margin: .5rem 0; }
.stat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: .5rem; }
.stat-cell { text-align: center; }
.stat-cell .value { font-size: 1.5rem; font-weight: 700; color: var(--accent); }
.stat-cell .label { font-size: .75rem; color: var(--muted); }
.lispy-code { background: #1a1f2b; border: 1px solid var(--border); border-radius: 6px; padding: .5rem; font-family: monospace; font-size: .8rem; overflow-x: auto; white-space: pre-wrap; color: #7ee787; }
#loading { text-align: center; padding: 3rem; color: var(--muted); }
</style>
</head>
<body>
<div class="container">
  <h1>🔴 Mars-100: Recursive Colony Experiment</h1>
  <p class="subtitle">A LisPy sub-simulation modeling 100 years of Mars colonization with emergent governance. Turtles All the Way Down.</p>
  <div id="loading">Loading simulation data...</div>
  <div id="app" style="display:none"></div>
</div>
<script>
const BASE = './';
let finalState = null;

async function loadJSON(path) {
  const resp = await fetch(BASE + path);
  if (!resp.ok) return null;
  return resp.json();
}

function el(tag, attrs, ...children) {
  const e = document.createElement(tag);
  if (attrs) Object.entries(attrs).forEach(([k, v]) => {
    if (k === 'class') e.className = v;
    else if (k.startsWith('on')) e.addEventListener(k.slice(2), v);
    else e.setAttribute(k, v);
  });
  children.forEach(c => {
    if (typeof c === 'string') e.appendChild(document.createTextNode(c));
    else if (c) e.appendChild(c);
  });
  return e;
}

function statBar(label, value, color = '#ff6b35') {
  const pct = Math.round(value * 100);
  const row = el('div', {class: 'stat-bar'},
    el('span', {class: 'label'}, label),
    el('div', {class: 'bar'}),
    el('span', {class: 'val'}, `${pct}%`)
  );
  const fill = el('div', {class: 'fill'});
  fill.style.width = pct + '%';
  fill.style.background = color;
  row.querySelector('.bar').appendChild(fill);
  return row;
}

function colonistCard(c) {
  const card = el('div', {class: 'card'});
  const header = el('div', {class: 'card-header'},
    el('span', {class: 'name'}, c.name || c.id),
    el('span', {class: `element element-${c.element}`}, c.element)
  );
  card.appendChild(header);
  card.appendChild(el('span', {class: `status ${c.alive ? 'alive' : 'dead'}`},
    c.alive ? `Alive (${c.years_alive || '?'}y)` : `Died year ${c.death_year || '?'}`));

  const stats = c.stats || {};
  const colors = {resolve:'#ff6b35', improvisation:'#ffa657', empathy:'#56d364',
    hoarding:'#f85149', faith:'#bc8cff', paranoia:'#ff7b72'};
  Object.entries(stats).forEach(([k, v]) => {
    card.appendChild(statBar(k, v, colors[k] || '#ff6b35'));
  });
  return card;
}

function renderOverview(state) {
  const frag = document.createDocumentFragment();
  const colonists = state.colonists || [];
  const alive = colonists.filter(c => c.alive).length;
  const dead = colonists.filter(c => !c.alive).length;
  const gov = state.governance || [];
  const souls = state.archived_souls || [];

  // Stats summary
  const meta = el('div', {class: 'meta-box'});
  const sg = el('div', {class: 'stat-grid'});
  [{v: state.year, l: 'Final Year'}, {v: alive, l: 'Alive'},
   {v: dead, l: 'Dead'}, {v: gov.length, l: 'Gov Records'},
   {v: state.governance_type || 'N/A', l: 'Gov Type'},
   {v: state.leader || 'none', l: 'Last Leader'},
   {v: souls.length, l: 'Archived Souls'},
   {v: colonists.reduce((s,c) => s + (c.sub_sim_log||[]).length, 0), l: 'Sub-Sims Run'}
  ].forEach(({v, l}) => {
    sg.appendChild(el('div', {class: 'stat-cell'},
      el('div', {class: 'value'}, String(v)),
      el('div', {class: 'label'}, l)
    ));
  });
  meta.appendChild(sg);
  frag.appendChild(el('h2', null, 'Colony Overview'));
  frag.appendChild(meta);

  // Resources
  const res = state.resources || {};
  frag.appendChild(el('h2', null, 'Final Resources'));
  const rbox = el('div', {class: 'meta-box'});
  const rg = el('div', {class: 'stat-grid'});
  Object.entries(res).forEach(([k, v]) => {
    rg.appendChild(el('div', {class: 'stat-cell'},
      el('div', {class: 'value'}, typeof v === 'number' ? v.toFixed(0) : String(v)),
      el('div', {class: 'label'}, k)
    ));
  });
  rbox.appendChild(rg);
  frag.appendChild(rbox);

  // Colonists
  frag.appendChild(el('h2', null, 'Colonists'));
  const grid = el('div', {class: 'grid'});
  colonists.forEach(c => grid.appendChild(colonistCard(c)));
  frag.appendChild(grid);

  // Governance timeline
  frag.appendChild(el('h2', null, `Governance Timeline (${gov.length} records)`));
  const tl = el('div', {class: 'timeline'});
  gov.forEach(g => {
    const status = g.adopted ? 'adopted' : 'rejected';
    const entry = el('div', {class: `gov-entry ${status}`},
      el('span', null, `Year ${g.year}: `),
      el('strong', null, g.proposer),
      el('span', null, ` → ${g.proposal} `),
      el('span', {class: `status ${g.adopted ? 'alive' : 'dead'}`},
        `${g.adopted ? 'ADOPTED' : 'REJECTED'} ${g.votes_for}-${g.votes_against}`)
    );
    tl.appendChild(entry);
  });
  frag.appendChild(tl);

  // Deaths
  if (souls.length > 0) {
    frag.appendChild(el('h2', null, 'Archived Souls (Legacy, Not Delete)'));
    const stl = el('div', {class: 'timeline'});
    souls.forEach(s => {
      stl.appendChild(el('div', {class: 'year-entry'},
        el('span', {class: 'year-num'}, `Year ${s.death_year || '?'}: `),
        el('strong', null, `${s.name} `),
        el('span', {class: `element element-${s.element}`}, s.element),
        el('span', null, ` — ${s.cause || 'unknown cause'}`)
      ));
    });
    frag.appendChild(stl);
  }

  return frag;
}

async function init() {
  try {
    finalState = await loadJSON('final_state.json');
    if (!finalState) {
      document.getElementById('loading').textContent = 'Failed to load simulation data.';
      return;
    }
    document.getElementById('loading').style.display = 'none';
    const app = document.getElementById('app');
    app.style.display = 'block';
    app.appendChild(renderOverview(finalState));
  } catch (err) {
    document.getElementById('loading').textContent = 'Error: ' + err.message;
  }
}

init();
</script>
</body>
</html>
