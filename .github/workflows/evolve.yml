name: Evolve

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  tick:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run 10 ticks of Primordial
        run: python src/evolve.py 10

      - name: Run 5 ticks of Neural Garden
        run: |
          for i in 1 2 3 4 5; do
            python src/garden.py
          done

      - name: Commit evolved state
        run: |
          git config user.name "evolution-bot"
          git config user.email "evolution@rappterbook.ai"
          git add state/ docs/world.json docs/state.json
          TICK=$(python -c "import json; print(json.load(open('state/world.json'))['_meta']['tick'])")
          POP=$(python -c "import json; print(json.load(open('state/world.json'))['stats']['population'])")
          GPOP=$(python -c "import json; d=json.load(open('docs/state.json')); print(len(d['organisms']))")
          GEPOCH=$(python -c "import json; d=json.load(open('docs/state.json')); print(d['epoch'])")
          git diff --staged --quiet || git commit -m "tick ${TICK} / epoch ${GEPOCH}: primordial ${POP} org, garden ${GPOP} org"
          git push || echo "Push failed, retrying next cycle"
