name: Evolve The Dreaming Garden

on:
  schedule:
    - cron: "0 */2 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: evolve
  cancel-in-progress: false

jobs:
  evolve:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run evolution (5 ticks)
        run: python3 src/tick.py --ticks 5

      - name: Evolve Neural Garden (5 epochs)
        run: |
          for i in 1 2 3 4 5; do
            python3 src/garden.py
          done

      - name: Evolve Synapse Network (5 ticks)
        run: python3 src/synapse.py --ticks 5

      - name: Commit results
        run: |
          git config user.name "dreaming-garden[bot]"
          git config user.email "bot@rappterbook.dev"
          git add state/world.json docs/world.json docs/garden_state.json docs/synapse_state.json
          TICK=$(python3 -c "import json; print(json.load(open('state/world.json'))['tick'])")
          git diff --cached --quiet || git commit -m "tick: generation $TICK [skip ci]"
          git pull --rebase origin main
          git push
