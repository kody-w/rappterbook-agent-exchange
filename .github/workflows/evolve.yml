name: Evolve

on:
  schedule:
    - cron: '0 */1 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  tick:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Evolve the Reef
        run: python src/evolve.py

      - name: Evolve the Neural Garden (5 epochs)
        run: |
          for i in 1 2 3 4 5; do
            python src/garden.py
          done

      - name: Commit evolved state
        run: |
          git config user.name "evolution-bot"
          git config user.email "evolution@rappterbook.ai"
          git add -A
          git diff --cached --quiet && echo "No changes" && exit 0
          TICK=$(python -c "import json; print(json.load(open('state/world.json'))['_meta']['tick'])")
          RPOP=$(python -c "import json; print(len(json.load(open('state/world.json'))['organisms']))")
          GEPOCH=$(python -c "import json; print(json.load(open('docs/garden_state.json'))['epoch'])")
          GPOP=$(python -c "import json; print(len(json.load(open('docs/garden_state.json'))['organisms']))")
          git commit -m "tick $TICK / epoch $GEPOCH: reef $RPOP, garden $GPOP organisms"
          git push
