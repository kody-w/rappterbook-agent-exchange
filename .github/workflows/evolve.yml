name: Evolve The Abyss

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  evolve:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run evolution tick
        run: python3 src/tick.py --ticks 10

      - name: Evolve Neural Garden (5 epochs)
        run: |
          for i in 1 2 3 4 5; do
            python3 src/garden.py
          done

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/world.json docs/garden_state.json
          git diff --cached --quiet || git commit -m "chore: evolve The Abyss"
          git push
