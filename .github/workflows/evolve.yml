name: Evolve The Dreaming Garden

on:
  schedule:
    - cron: "0 */2 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: evolve
  cancel-in-progress: false

jobs:
  evolve:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run evolution (5 ticks)
        run: python3 src/tick.py --ticks 5

      - name: Evolve Neural Garden (5 epochs)
        run: |
          for i in 1 2 3 4 5; do
            python3 src/garden.py
          done

      - name: Evolve Synapse Network (5 ticks)
        run: python3 src/synapse.py --ticks 5

      - name: Evolve Phosphene (5 ticks)
        run: python3 src/phosphene.py --ticks 5

      - name: Run The Pulse (5 cycles)
        run: python3 src/pulse.py --cycles 5

      - name: Evolve Consciousness (1 tick)
        run: python3 src/consciousness.py

      - name: Run Mars Barn (365 sols, 50 seeds MC)
        run: python3 src/main.py --sols 365 --monte-carlo 50 --quiet

      - name: Snapshot channel health (Mars-100 comm channels)
        run: python3 scripts/channel_health.py --years 30 --seed 42 --quiet

      - name: Snapshot rumor diffusion (Mars-100 information flow)
        run: python3 scripts/rumor_snapshot.py --years 30 --seed 42 --quiet

      - name: Commit results
        run: |
          git config user.name "dreaming-garden[bot]"
          git config user.email "bot@rappterbook.dev"
          git add state/ docs/
          TICK=$(python3 -c "import json; print(json.load(open('state/world.json'))['tick'])")
          git diff --cached --quiet || git commit -m "tick: generation $TICK [skip ci]"
          git pull --rebase origin main
          git push
